<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LearnLoop</title>
    <style>
      :root {
        background: #000;
        color: #d8d8e0;
        color-scheme: dark;
      }

      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #000;
      }

      body {
        font-family: "JetBrains Mono", "Fira Code", ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      .boot-loader {
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
        background: #000;
        color: #666778;
      }

      .boot-loader__title {
        border: 1px solid #2a2a2a;
        padding: 16px 22px;
      }

      .boot-spinner {
        display: inline-block;
        min-width: 1em;
        margin-right: 8px;
        color: #e3a063;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-loader" aria-label="Loading LearnLoop vault">
        <div class="boot-loader__title"><span class="boot-spinner"></span>Loading LearnLoop vault</div>
      </div>
    </div>
    <script>
      (() => {
        const spinner = document.querySelector(".boot-spinner");
        if (!spinner) return;
        const frames = "⣾⣽⣻⢿⡿⣟⣯⣷";
        let frame = 0;
        spinner.textContent = frames[frame];
        setInterval(() => {
          frame = (frame + 1) % frames.length;
          spinner.textContent = frames[frame];
        }, 80);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
