prompt: For n labeled cards in random order, let A_i be the event that card i is
  in position i. Set up the probability of at least one match and derive the 
  inclusion-exclusion expression through the alternating factorial sum.
expected_answer: Define the target as P(A_1 union ... union A_n). For k fixed 
  matching positions there are (n-k)! favorable permutations out of n!, and 
  there are binom(n,k) such intersections. Inclusion-exclusion gives sum_{k=1}^n
  (-1)^{k+1} binom(n,k)(n-k)!/n! = 1 - 1/2! + 1/3! - ... + (-1)^{n+1}/n!.
