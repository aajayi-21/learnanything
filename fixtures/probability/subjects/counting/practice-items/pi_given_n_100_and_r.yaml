prompt: Given n <- 100 and r <- replicate(10^4,sum(sample(n)==(1:n))), explain 
  what sum(r>=1)/10^4 estimates and why r>=1 is used.
expected_answer: It estimates the probability that at least one card is in its 
  original position across random shuffles; each r value is a count of 
  fixed-position matches, and r>=1 converts that count into the event of at 
  least one match.
