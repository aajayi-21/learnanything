prompt: For k people under the 365-day equally likely independent birthday model
  with k <= 365, derive the probability that at least two people share a 
  birthday.
expected_answer: 'Count the complement: no two people share a birthday. There are
  365·364·...·(365-k+1) no-match assignments and 365^k total assignments. Thus P(no
  match)=(365·364·...·(365-k+1))/365^k, so P(at least one match)=1-(365·364·...·(365-k+1))/365^k.'
