prompt: Given a finite probability problem, explain what must be identified 
  before using favorable outcomes divided by total outcomes, and name one 
  counting tool that might be used after the model is justified.
expected_answer: Identify the experiment, sample space, and event as a subset of
  outcomes; then verify all outcomes are equally likely before using a count 
  ratio. After that, use tools such as n! for permutations, 2^n for subsets, or 
  divide by a uniform overcount factor.
