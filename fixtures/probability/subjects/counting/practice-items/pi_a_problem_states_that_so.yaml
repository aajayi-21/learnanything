prompt: A problem states that some birthdays are more likely than others. 
  Explain why the equal-probability formula is not the supported approach here 
  and how the simulation should be adapted.
expected_answer: The equal-probability complement formula assumes probability 
  1/365 for each day, while the source says unequal probabilities make exact 
  calculation much more difficult. The simulation can be adapted by specifying a
  probability for each day in sample and then keeping the same sampling, 
  tabulation, repetition, and max-count event check.
