prompt: An experiment is drawing one card from a deck that may include jokers, 
  but a proposed sample space S contains only the 52 standard cards. Explain 
  what is wrong with S and how the issue relates to the definition of sample 
  space.
expected_answer: S is wrong because it omits an outcome that can actually occur.
  A sample space must be the set of all possible outcomes, so the model must 
  include jokers or redefine the experiment so jokers cannot be drawn.
