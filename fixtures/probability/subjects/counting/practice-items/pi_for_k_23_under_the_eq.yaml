prompt: For k <- 23 under the equal 365-day birthday model, write the R 
  expression for the probability of at least one shared birthday and explain the
  complement being subtracted.
expected_answer: Use 1-prod((365-k+1):365)/365^k. The product term counts the 
  assignments with all birthdays distinct, dividing by 365^k gives the no-match 
  probability, and subtracting from 1 gives at least one match.
