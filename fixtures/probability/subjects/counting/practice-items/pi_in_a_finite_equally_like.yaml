prompt: In a finite equally likely sample space, P_naive(A)=5/9. Compute 
  P_naive(A^c). Then explain when computing a complement is preferable to direct
  counting.
expected_answer: P_naive(A^c)=1−5/9=4/9. Complement counting is preferable when 
  A^c is easier to describe or count than A, especially when De Morgan's laws 
  simplify a compound event.
