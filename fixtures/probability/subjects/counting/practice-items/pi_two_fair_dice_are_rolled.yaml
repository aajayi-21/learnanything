prompt: Two fair dice are rolled. Explain why a sum of 11 is more likely than a 
  sum of 12, even though each seems to have one unordered way.
expected_answer: Label the dice, for example A and B. Then there are 36 equally 
  likely ordered pairs. Sum 11 has favorable outcomes (5,6) and (6,5), while sum
  12 has only (6,6), so the probabilities are 2/36=1/18 and 1/36.
