prompt: Write R code to simulate 10^4 runs of the n-card matching problem for n 
  <- 100 and estimate the probability of at least one match. Briefly explain 
  what sample(n)==(1:n) and sum(r>=1)/10^4 do.
expected_answer: n <- 100; r <- replicate(10^4, sum(sample(n)==(1:n))); 
  sum(r>=1)/10^4. The comparison sample(n)==(1:n) produces a logical indicator 
  for each position showing whether the sampled card matches that position. sum 
  counts matches in one run, r stores the counts over runs, and sum(r>=1)/10^4 
  estimates the fraction of runs with at least one match.
