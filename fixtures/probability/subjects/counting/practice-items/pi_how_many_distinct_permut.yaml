prompt: How many distinct permutations does the word STATISTICS have? State how 
  repeated letters are handled.
expected_answer: STATISTICS has 10 letters with repeated S's, T's, and I's. 
  Dividing the 10! labeled arrangements by 3! for the S's, 3! for the T's, and 
  2! for the I's gives 10!/(3!3!2!)=50400.
