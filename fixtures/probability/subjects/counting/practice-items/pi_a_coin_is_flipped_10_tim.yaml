prompt: 'A coin is flipped 10 times and A_j is the event that the jth flip is Heads.
  Write set-operation expressions for: at least one Heads, all Heads, and at least
  two consecutive Heads.'
expected_answer: At least one Heads is union over j=1 to 10 of A_j. All Heads is
  intersection over j=1 to 10 of A_j. At least two consecutive Heads is union 
  over j=1 to 9 of A_j intersection A_{j+1}.
