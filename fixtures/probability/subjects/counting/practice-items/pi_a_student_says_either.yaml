prompt: A student says, 'Either it will rain tomorrow or it will not, so the 
  probability of rain is 1/2.' Critique the reasoning using the conditions for 
  applying the naive definition.
expected_answer: The reasoning is invalid. Binary alternatives do not 
  automatically have equal likelihood. To use the naive definition, the sample 
  space must be finite and the outcomes must be equally likely, justified by 
  symmetry or design. Ignorance about which event will occur is not enough.
