prompt: Interpret the R expression 1/(1:100)^2, and explain why it is valid R 
  vector syntax.
expected_answer: 1:100 creates the integer vector from 1 to 100. R squares the 
  vector componentwise, then divides 1 by each squared entry, giving (1, 1/2^2, 
  1/3^2, ..., 1/100^2).
