prompt: A student simulates birthdays with r <- replicate(10^4, 
  max(tabulate(sample(1:365,23)))) and estimates sum(r>=1)/10^4. Identify two 
  problems and give corrected code structure.
expected_answer: The sampling omitted replace=TRUE, so repeated birthdays are 
  impossible, and r>=1 is the wrong threshold because every sampled group has a 
  maximum count at least 1. Use r <- replicate(10^4, 
  max(tabulate(sample(1:365,23,replace=TRUE)))) and estimate sum(r>=2)/10^4.
