  - id: facet_for_k_ordered_choices_from_n_objects_without_rep
    title:
    aliases: []
    description:
    tags: []
    concept_id: concept_sampling_without_replacement
    kind: procedure_contract
    claim: For k ordered choices from n objects without replacement, the choices
      decrease as n, n-1, ..., n-k+1 when k <= n, and no such sample exists when
      k > n.
    preconditions:
      - There are n objects.
      - Sampling is without replacement.
      - Order matters.
      - For the falling product formula, 1 <= k <= n.
    postconditions:
      - The ordered count is n(n-1)...(n-k+1), or 0 for k > n.
    applicability:
      - Race placements with no repeated winner.
      - Assigning distinct birthdays to k people for the no-match event.
      - Full permutations when k=n.
    positive_examples:
      - First, second, and third places among 10 runners give 10·9·8.
      - No-match birthday assignments for k people use 365·364·...·(365-k+1).
    negative_examples:
      - Sampling with replacement does not decrease the choice count after each 
        draw.
    non_goals:
      - Does not count unordered selections without an overcounting adjustment.
    error_signatures:
      - Using n^k when chosen objects cannot be reused.
      - Allowing k > n in a without-replacement sample.
    instructional_repairs:
      - After each fixed choice, reduce the available pool by one.
      - Check feasibility before writing the product.
    status: reviewed
    version: 1
