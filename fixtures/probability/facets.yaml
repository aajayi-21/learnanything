    concept_id: concept_r_vectors_and_indexing
    kind: procedure_contract
    claim: R applies many vector operations componentwise and recycles shorter 
      vectors in arithmetic; it computes factorials and binomial coefficients 
      with factorial(n) and choose(n,k), with lfactorial(n) and lchoose(n,k) 
      available for log-scale large values.
    preconditions:
      - R vector arithmetic or combinatorial function calls are being used.
    postconditions:
      - Vectorized expressions or combinatorial quantities are computed, with 
        log-scale alternatives for large values.
    applicability:
      - Numerical counting and probability computation in R.
    positive_examples:
      - 1/(1:100)^2 creates reciprocal squares componentwise.
      - factorial(n) computes n! when representable.
      - choose(n,k) computes a binomial coefficient.
    negative_examples:
      - Expecting factorial(n) to remain finite for arbitrarily large n.
    non_goals:
      - Does not define abstract mathematical vector powers.
    error_signatures:
      - Transferring R componentwise syntax to standard vector algebra.
      - Ignoring overflow to Inf for large factorials.
    instructional_repairs:
      - Distinguish R's componentwise computation rules from mathematical vector
        notation; use log-scale functions when raw values overflow.
