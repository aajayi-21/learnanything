  - id: facet_when_birthday_probabilities_differ_by_day_the_eq
    title:
    aliases:
      - non-uniform birthday simulation
      - sample probabilities
    description:
    tags: []
    concept_id: concept_unequal_birthday_probabilities
    kind: applicability_condition
    claim: When birthday probabilities differ by day, the equal-probability 
      exact calculation becomes much more difficult, but the simulation approach
      can be extended by supplying day-specific probabilities to R's sample 
      function; without such probabilities, sample uses equal probabilities by 
      default.
    preconditions:
      - A probability value is available for each day when modeling unequal 
        probabilities.
      - The simulation is implemented using R's sample function.
    postconditions:
      - The simulation reflects the specified non-uniform birthday distribution.
    applicability:
      - Birthday simulations with non-uniform day probabilities.
    positive_examples:
      - Keep the sampling-and-tabulation simulation structure, but specify 
        probabilities in sample when days are not equally likely.
    negative_examples:
      - Using the equal-probability formula unchanged for a non-uniform 
        distribution is unsupported by the source.
    non_goals:
      - Does not give the explicit R syntax for the probability vector argument.
    error_signatures:
      - Student assumes the 1/365 model after the problem states unequal day 
        probabilities.
      - Student forgets that sample defaults to equal probabilities.
    instructional_repairs:
      - Supply a probability for each day in the sampling step when modeling 
        unequal birthday probabilities.
    status: reviewed
