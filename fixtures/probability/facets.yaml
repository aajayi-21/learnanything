  - id: facet_under_the_equal_365_day_birthday_model_the_proba
    title:
    aliases:
      - birthday complement product
      - no-match complement
    description:
    tags: []
    concept_id: concept_birthday_match_probability
    kind: procedure_contract
    claim: Under the equal 365-day birthday model, the probability of at least 
      one shared birthday among k people is computed by subtracting the no-match
      probability prod((365-k+1):365)/365^k from 1.
    preconditions:
      - There are 365 possible birthdays.
      - Each birthday is equally likely.
      - The group size is k.
    postconditions:
      - The result is the probability that at least two people share a birthday.
    applicability:
      - Exact birthday-match calculations under the equal-probability 365-day 
        model.
    positive_examples:
      - For k <- 23, 1-prod((365-k+1):365)/365^k computes the probability of at 
        least one birthday match.
    negative_examples:
      - Applying the same expression unchanged when day probabilities are 
        unequal is unsupported by this source.
    non_goals:
      - Does not cover unequal day probabilities.
    error_signatures:
      - Student forgets the complement step.
      - Student uses an incorrect product range for distinct birthdays.
    instructional_repairs:
      - First compute the probability that all birthdays are distinct, then 
        subtract from 1.
