  - id: facet_represent_a_finite_sample_space_in_pebble_world_
    title:
    aliases: []
    description:
    tags: []
    concept_id: concept_pebble_world
    kind: procedure_contract
    claim: Represent a finite sample space in Pebble World by drawing each 
      outcome as a pebble and each event as a set of pebbles; performing the 
      experiment corresponds to selecting one pebble.
    preconditions:
      - The sample space is finite.
    postconditions:
      - Outcomes and events can be read visually as pebbles and regions or 
        collections of pebbles.
    applicability:
      - Introductory finite sample-space reasoning.
      - Visual interpretation of events, unions, intersections, and complements.
    positive_examples:
      - Figure-style models where A and B are spotlighted sets of pebbles.
    negative_examples:
      - Using Pebble World as a literal representation of infinite sample 
        spaces.
    non_goals:
      - Does not imply all outcomes are equally likely unless equal mass is also
        assumed.
    error_signatures:
      - Representing an event as one pebble rather than a set of pebbles.
      - Using the visualization without checking the finite-sample-space 
        condition.
    instructional_repairs:
      - State that S is finite, then map each outcome to one pebble and each 
        event to a set of pebbles.
