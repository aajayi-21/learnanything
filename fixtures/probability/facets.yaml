facets:
  - id: facet_when_solving_for_an_event_probability_compare_di
    title:
    aliases:
      - solve by complement
    description:
    tags: []
    concept_id: concept_complement_strategy
    kind: procedure_contract
    claim: When solving for an event probability, compare direct counting with 
      counting the complement; use the complement when it is easier, applying De
      Morgan's laws when they simplify unions or intersections.
    preconditions:
      - Complement probabilities are valid in the probability framework being 
        used.
      - The target event or its complement can be described or counted.
    postconditions:
      - The target probability is obtained either directly or by subtracting the
        complement probability from 1.
    applicability:
      - Events whose complements have simpler descriptions or counts.
      - Compound events involving unions or intersections.
    positive_examples:
      - Counting no occurrence rather than at least one occurrence when the 
        complement is simpler.
    negative_examples:
      - Computing both event and complement unnecessarily when one count 
        suffices.
    non_goals:
      - Does not replace the need to verify the assumptions of the probability 
        model.
    error_signatures:
      - Ignoring an easier complement.
      - Failing to use De Morgan's laws when complementing compound events.
    instructional_repairs:
      - Compare event and complement complexity before counting.
    status: reviewed
    version: 1
