  - id: facet_if_an_easier_counting_method_counts_every_valid_
    title:
    aliases: []
    description:
    tags: []
    concept_id: concept_adjusting_for_overcounting
    kind: procedure_contract
    claim: If an easier counting method counts every valid possibility exactly c
      times, divide the redundant count by c to obtain the correct count.
    preconditions:
      - Each valid possibility is counted exactly the same number c of times.
      - The redundant count is known.
    postconditions:
      - The adjusted count counts each valid possibility once.
    applicability:
      - Counting committees by ordered selection and dividing by orderings.
      - Splitting four people into two unlabeled teams after choosing one team.
      - Counting repeated-letter permutations by dividing by repeated-letter 
        factorials.
    positive_examples:
      - A two-person committee from four people can be counted as 4·3/2=6.
      - If each team split is represented by choosing either team first, divide 
        by 2.
    negative_examples:
      - Do not divide by a single c when different possibilities have different 
        class sizes, such as unordered pairs with repetition before separating 
        repeated pairs.
    non_goals:
      - Does not identify c automatically; the overcounting factor must be 
        justified.
    error_signatures:
      - Dividing by 2 when some equivalence classes have size 1 and others have 
        size 2.
      - Forgetting to divide by k! when ordered selections represent unordered 
        k-subsets.
    instructional_repairs:
      - Trace how many redundant representations one fixed valid possibility 
        has.
      - Verify that the same count holds for every possibility before dividing.
    status: reviewed
