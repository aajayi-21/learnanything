  - id: facet_for_events_a_and_b_a_union_b_occurs_iff_at_least
    title:
    aliases:
      - or
      - and
      - not
    description:
    tags: []
    concept_id: concept_event_operations
    kind: interpretation
    claim: For events A and B, A union B occurs iff at least one of A or B 
      occurs, A intersection B occurs iff both occur, and A complement occurs 
      iff A does not occur.
    preconditions:
      - A and B are events in a common sample space S.
    postconditions:
      - Set notation can be translated into English occurrence statements.
    applicability:
      - Interpreting compound event expressions.
      - Building events from simpler events.
    positive_examples:
      - At least one Heads is represented by a union of per-flip events.
      - All Heads is represented by an intersection of per-flip events.
    negative_examples:
      - Interpreting union as exclusive-or and excluding overlap.
    non_goals:
      - Does not assign numerical probabilities without an additional 
        probability model.
    error_signatures:
      - Using intersection for 'at least one'.
      - Dropping outcomes that lie in both events from a union.
    instructional_repairs:
      - Map 'or' and 'at least one' to union, 'and' and 'both' to intersection, 
        and 'not' to complement.
    status: reviewed
    version: 1
