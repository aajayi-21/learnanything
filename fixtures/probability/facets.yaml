  - id: facet_in_a_finite_sample_space_with_equally_likely_out
    title:
    aliases:
      - naive definition of probability
    description:
    tags: []
    concept_id: concept_naive_probability_by_counting
    kind: procedure_contract
    claim: In a finite sample space with equally likely outcomes, probability 
      can be computed as the number of favorable outcomes divided by the number 
      of total outcomes; equal likelihood must be justified before using this 
      count ratio.
    preconditions:
      - The sample space is finite.
      - All outcomes are equally likely.
    postconditions:
      - A probability is computed by a count ratio.
    applicability:
      - Finite probability calculations by counting.
    positive_examples:
      - Pebble World with equal-mass pebbles.
    negative_examples:
      - Counting outcomes as equally likely when distinguishability or 
        probability weights differ.
    non_goals:
      - Does not apply when equal likelihood is unjustified.
    error_signatures:
      - Implicitly assuming equal likelihood.
      - Treating distinguishable objects as indistinguishable.
    instructional_repairs:
      - Label objects when needed and explicitly verify the uniform sample-space
        model.
