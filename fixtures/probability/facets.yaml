  - id: facet_for_k_ordered_draws_from_n_objects_with_replacem
    title:
    aliases: []
    description:
    tags: []
    concept_id: concept_sampling_with_replacement
    kind: procedure_contract
    claim: For k ordered draws from n objects with replacement, each draw has n 
      choices, so the number of ordered samples is n^k.
    preconditions:
      - There are n objects or possible outcomes.
      - There are k sequential choices.
      - Replacement is used, so prior choices do not remove options.
      - Order matters.
    postconditions:
      - The ordered sample count is n^k.
    applicability:
      - Sampling balls one at a time with replacement.
      - Birthday assignments for k people under the 365-day independent equally 
        likely model.
      - Repeated cone choices when each position has the same six possibilities.
    positive_examples:
      - Total birthday assignments for k people are 365^k.
      - Two ordered cone choices from six single-cone outcomes give 6^2=36.
    negative_examples:
      - Sampling without replacement uses decreasing choices, not n^k.
    non_goals:
      - Does not count unordered samples.
      - Does not require k <= n.
    error_signatures:
      - Imposing k <= n even though replacement is allowed.
      - Using a falling product when objects are returned after each draw.
    instructional_repairs:
      - Check whether a chosen object becomes available again before the next 
        draw.
      - Write n choices above each of the k ordered positions.
    status: reviewed
    version: 1
    semantic_fingerprint: sf_bac22df8fd0c0989
