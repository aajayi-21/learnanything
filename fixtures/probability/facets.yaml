  - id: facet_the_binomial_coefficient_binom_n_k_is_the_number
    title:
    aliases:
      - n choose k
    description:
    tags: []
    concept_id: concept_binomial_coefficient
    kind: definition
    claim: The binomial coefficient binom(n,k) is the number of k-element 
      subsets of an n-element set; for k <= n it equals n(n-1)...(n-k+1)/k! = 
      n!/((n-k)!k!), and for k > n it is 0.
    preconditions:
      - n and k are nonnegative integers.
      - For the product and factorial formulas, k <= n.
    postconditions:
      - The unordered subset count is computed by the binomial coefficient.
    applicability:
      - Counting committees.
      - Counting untitled officer selections.
      - Counting pairs of people.
    positive_examples:
      - binom(4,2)=6.
      - binom(100,2)=100·99/2=4950.
      - Untitled three-officer selections are binom(n,3).
    negative_examples:
      - The factorial expression is not used with k>n because negative 
        factorials are undefined.
    non_goals:
      - Does not count ordered role assignments unless adjusted from an ordered 
        count.
    error_signatures:
      - Using the factorial formula when k>n.
      - Computing large factorials mechanically instead of using cancellation or
        the product expression.
    instructional_repairs:
      - Derive the numerator as ordered choices without replacement, then divide
        by k! orderings per subset.
      - Use the product expression for small k.
    status: reviewed
    version: 1
