  - id: facet_under_the_naive_definition_p_naive_a_c_1_p_naive
    title:
    aliases:
      - complement rule
    description:
    tags: []
    concept_id: concept_complement_strategy
    kind: proposition
    claim: Under the naive definition, P_naive(A^c)=1−P_naive(A).
    preconditions:
      - A is an event in finite sample space S.
      - Naive probability applies.
    postconditions:
      - The probability of a complement can be computed by subtracting the event
        probability from 1.
    applicability:
      - Computing complements of events in finite equally likely models.
    positive_examples:
      - Using |A^c|=|S|-|A| to derive the complement probability.
    negative_examples:
      - Forgetting that the complement is relative to S.
    non_goals:
      - The cited derivation is under the naive definition, though the text 
        notes the result later holds more generally.
    error_signatures:
      - Counting A and A^c as overlapping.
      - Computing a complement relative to the wrong sample space.
    instructional_repairs:
      - Identify S, A, and A^c, then use |A^c|=|S|-|A| or 1−P_naive(A).
    status: reviewed
    version: 1
