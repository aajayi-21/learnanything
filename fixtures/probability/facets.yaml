  - id: facet_the_sample_space_s_of_an_experiment_is_the_set_o
    title:
    aliases:
      - S
    description:
    tags: []
    concept_id: concept_sample_space
    kind: definition
    claim: The sample space S of an experiment is the set of all possible 
      outcomes of the experiment.
    preconditions:
      - An experiment has possible outcomes.
    postconditions:
      - Events can be defined as subsets of S.
      - Any actual outcome of the modeled experiment should be an element of S.
    applicability:
      - Modeling probability experiments before assigning probabilities.
    positive_examples:
      - For ten coin flips, S can be all length-10 H/T strings.
      - For drawing one standard card, S can be the 52 cards.
    negative_examples:
      - Using the 52-card sample space when a joker can actually be drawn.
    non_goals:
      - Does not by itself assign probabilities to outcomes.
    error_signatures:
      - An actual outcome falls outside S.
      - The sample space omits plausible outcomes.
    instructional_repairs:
      - Revise S so that it includes all possible outcomes of the experiment.
    status: reviewed
    version: 1
