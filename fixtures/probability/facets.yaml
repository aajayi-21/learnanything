  - id: facet_equal_likelihood_must_be_justified_by_symmetry_o
    title:
    aliases:
      - symmetry justification
      - design-based equal likelihood
    description:
    tags: []
    concept_id: concept_equal_likelihood_assumptions
    kind: applicability_condition
    claim: Equal likelihood must be justified by symmetry or by a randomizing 
      design; ignorance or binary wording alone does not justify assigning 
      probability 1/2.
    preconditions:
      - A probability problem has been modeled with outcomes and events.
    postconditions:
      - The naive definition is accepted or rejected based on whether equal 
        likelihood is warranted.
    applicability:
      - Deciding whether naive probability can be used.
      - Evaluating 50-50 claims.
    positive_examples:
      - A physically symmetric coin is commonly modeled as approximately equally
        likely Heads or Tails.
      - A simple random sample is designed so all size-n subsets are equally 
        likely.
    negative_examples:
      - Saying an event has probability 1/2 merely because it either happens or 
        does not happen.
    non_goals:
      - Does not claim real-world designs always succeed in producing equal 
        likelihood.
    error_signatures:
      - Ignorance mistaken for equal likelihood.
      - Treating any binary event as 50-50.
    instructional_repairs:
      - 'Ask what mechanism makes the outcomes equally likely: symmetry, randomization
        design, or neither.'
    status: reviewed
    version: 1
