  - id: facet_to_simulate_the_matching_problem_in_r_use_sample
    title:
    aliases:
      - R Monte Carlo matching simulation
    description:
    tags: []
    concept_id: concept_r_sampling_and_simulation
    kind: procedure_contract
    claim: To simulate the matching problem in R, use sample(n) for a random 
      card order, compare it elementwise to 1:n, sum TRUE/FALSE match indicators
      to count matches in one run, use replicate for many runs, and estimate the
      at-least-one-match probability with the proportion of runs where r >= 1.
    preconditions:
      - A deck size n and number of simulation runs are chosen.
      - R commands sample, sum, and replicate are available.
    postconditions:
      - An empirical estimate of the probability of at least one match is 
        computed.
    applicability:
      - Monte Carlo simulation of permutation fixed-point problems.
    positive_examples:
      - r <- replicate(10^4,sum(sample(n)==(1:n))).
      - sum(r>=1)/10^4 estimates the probability of at least one match.
    negative_examples:
      - Using sum(r) as the numerator for the probability of at least one match.
    non_goals:
      - Does not prove the exact inclusion-exclusion result or provide 
        confidence intervals.
    error_signatures:
      - Reading sample(n)==(1:n) as a single global comparison.
      - Counting total matches across runs instead of runs with at least one 
        match.
    instructional_repairs:
      - Interpret logical comparisons as indicator vectors; convert per-run 
        counts to an event indicator with r>=1 before averaging.
    status: reviewed
    version: 1
    semantic_fingerprint: sf_457424ce4d30993b
