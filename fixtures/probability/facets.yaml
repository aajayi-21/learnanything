  - id: facet_r_s_sample_command_draws_pseudo_random_samples_s
    title:
    aliases:
      - R sample syntax
    description:
    tags: []
    concept_id: concept_r_sampling_and_simulation
    kind: procedure_contract
    claim: "R's sample command draws pseudo-random samples: sample(n,k) samples k
      values from 1 to n without replacement by default, replace=TRUE allows repeated
      values, prob=... supplies sampling weights, and sample(n) can generate a random
      permutation."
    preconditions:
      - A population and sample size or permutation goal are specified.
    postconditions:
      - A sample or permutation is generated according to the requested 
        replacement and weighting settings.
    applicability:
      - Simulation and random sampling workflows in R.
    positive_examples:
      - sample(n,k) for without replacement.
      - sample(n,k,replace=TRUE) for with replacement.
      - sample(4,3,replace=TRUE,prob=c(0.1,0.2,0.3,0.4)) for weighted sampling.
    negative_examples:
      - Omitting replace=TRUE when repeated values should be possible.
    non_goals:
      - Does not describe the pseudo-random generator implementation.
    error_signatures:
      - Assuming sample(n,k) samples with replacement by default.
      - Assuming sample only works with numeric vectors.
    instructional_repairs:
      - State the population, sample size, replacement rule, and weights before 
        writing the sample call.
