    concept_id: concept_r_vectors_and_indexing
    kind: procedure_contract
    claim: In R, vectors can be created with c(...), assigned with <- or =, 
      summarized with sum/max/min/length, generated as integer sequences with 
      m:n, and indexed with v[i], included-index vectors, or negative indices 
      for exclusion.
    preconditions:
      - The desired vector entries or indices are known.
    postconditions:
      - A vector is created, summarized, sequenced, or subsetted.
    applicability:
      - Introductory R vector manipulation for probability computation.
    positive_examples:
      - v <- c(3,1,4,1,5,9).
      - v[c(1,3,5)] selects listed entries.
      - v[-(2:4)] excludes entries 2 through 4.
    negative_examples:
      - Reading v[-(2:4)] as selecting entries 2 through 4.
    non_goals:
      - Does not provide a complete R tutorial.
    error_signatures:
      - Assuming m:n is always increasing.
      - Omitting parentheses in negative sequence exclusion when needed.
    instructional_repairs:
