  - id: facet_if_an_outcome_is_formed_through_stages_with_a_fi
    title:
    aliases:
      - basic counting principle
    description:
    tags: []
    concept_id: concept_multiplication_rule
    kind: procedure_contract
    claim: If an outcome is formed through stages with a fixed number of 
      available choices at each stage after prior choices are fixed, the total 
      count is the product of the stage counts.
    preconditions:
      - The outcome can be specified through staged or component choices.
      - Each relevant branch count is known and constant for the stage, or is 
        correctly updated after earlier choices.
    postconditions:
      - The total number of outcomes is obtained by multiplying the stage 
        counts.
    applicability:
      - Two-stage experiments such as cone type and flavor.
      - Grid cell counts such as choosing row and column.
      - Ordered race placements where later choices decrease after earlier 
        placements are fixed.
    positive_examples:
      - An 8 by 8 chessboard has 8·8=64 squares.
      - Choosing 2 cone types and 3 flavors gives 2·3=6 possibilities.
      - First, second, and third race placements among 10 runners give 
        10·9·8=720.
    negative_examples:
      - A crossword grid with unequal row counts does not admit direct 
        multiplication by a single row count.
      - A missing branch such as a forbidden cone-flavor combination requires 
        casework rather than the original product.
    non_goals:
      - Does not require the chosen analysis order to match chronological order.
      - Does not apply directly when branch counts vary without casework.
    error_signatures:
      - Adding stage counts instead of multiplying them.
      - Applying a single row or branch count when rows or branches differ.
      - Rejecting a valid counting order because it is not chronological.
    instructional_repairs:
      - Represent the outcome as a tuple of component choices.
      - Check that each first-stage option has the same number of second-stage 
        options, or update later counts after earlier fixed choices.
      - Use a tree diagram to see equal branching.
    status: reviewed
    version: 1
    semantic_fingerprint: sf_023667360bf2ac6a
