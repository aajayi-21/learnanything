  - id: facet_a_sample_space_can_be_finite_countably_infinite_
    title:
    aliases: []
    description:
    tags: []
    concept_id: concept_sample_space
    kind: proposition
    claim: A sample space can be finite, countably infinite, or uncountably 
      infinite.
    preconditions:
      - Possible outcomes of an experiment are represented as a set.
    postconditions:
      - The modeling context is not restricted to finite sets, even though some 
        visualizations and the naive definition are finite-only.
    applicability:
      - Classifying probability models by sample-space size.
    positive_examples:
      - A 52-card deck is finite.
      - Ten coin flips form a finite sample space.
    negative_examples:
      - Assuming Pebble World implies every sample space is finite.
    non_goals:
      - Does not explain countable and uncountable sets in detail.
    error_signatures:
      - Applying finite-sample-space tools without checking finiteness.
    instructional_repairs:
      - First classify S as finite, countably infinite, or uncountably infinite 
        before selecting a probability method.
    status: reviewed
    version: 1
