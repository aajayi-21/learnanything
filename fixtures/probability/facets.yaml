  - id: facet_distinct_permutations_of_a_word_with_repeated_id
    title:
    aliases: []
    description:
    tags: []
    concept_id: concept_repeated_letter_permutations
    kind: procedure_contract
    claim: Distinct permutations of a word with repeated identical letters can 
      be counted by choosing positions for each repeated letter type or by 
      dividing the total labeled-letter factorial by the factorials of 
      repeated-letter multiplicities.
    preconditions:
      - Repeated copies of the same letter are indistinguishable.
      - The total number of letters and each repeated-letter multiplicity are 
        known.
    postconditions:
      - The count of distinct word arrangements is computed without 
        distinguishing identical copies.
    applicability:
      - Words with two repeated letter types.
      - Words with several repeated letter types.
    positive_examples:
      - LALALAAA has binom(8,5)=binom(8,3)=56 distinct permutations.
      - STATISTICS has 10!/(3!3!2!)=50400 distinct permutations.
    negative_examples:
      - Using 10! for STATISTICS treats identical S's, T's, and I's as distinct.
    non_goals:
      - Does not count arrangements of physically labeled letter tiles unless 
        labels matter.
    error_signatures:
      - Failing to divide by all repeated-letter factorials.
      - Counting repeated copies as distinct objects.
    instructional_repairs:
      - List the multiplicities of each repeated letter before writing a 
        formula.
      - Choose positions for one repeated type at a time as a check on the 
        factorial-division method.
