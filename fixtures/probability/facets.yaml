  - id: facet_for_k_specified_matching_positions_in_the_n_card
    title:
    aliases:
      - fixed-position intersection counting
    description:
    tags: []
    concept_id: concept_de_montmort_s_matching_problem
    kind: procedure_contract
    claim: For k specified matching positions in the n-card matching problem, 
      fixing those positions leaves (n-k)! favorable orderings out of n!, so 
      same-size intersection probabilities are reciprocal falling-factorial 
      terms that can be grouped by symmetry.
    preconditions:
      - All n! deck orderings are equally likely.
      - The specified matching positions are distinct.
    postconditions:
      - Intersection probabilities needed for inclusion-exclusion are computable
        by fixed-position permutation counts.
    applicability:
      - Symmetric matching events in random permutations.
    positive_examples:
      - P(A_i cap A_j)=1/[n(n-1)].
      - P(A_i cap A_j cap A_k)=1/[n(n-1)(n-2)].
    negative_examples:
      - Using 1/n for a two-position intersection.
    non_goals:
      - Does not apply to non-uniform card orderings.
    error_signatures:
      - Fixing only one card when two or more positions are required.
      - Failing to group equal intersection terms by symmetry.
    instructional_repairs:
      - Count fixed positions first, then count the remaining free cards by 
        factorials.
    status: reviewed
    version: 1
