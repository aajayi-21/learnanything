  - id: facet_for_finite_events_a_1_a_n_compute_p_a_1_union_un
    title:
    aliases:
      - finite inclusion-exclusion
    description:
    tags: []
    concept_id: concept_inclusion_exclusion_for_finite_unions
    kind: procedure_contract
    claim: For finite events A_1, ..., A_n, compute P(A_1 union ... union A_n) 
      by summing one-event probabilities, subtracting all pairwise 
      intersections, adding all triple intersections, and continuing with 
      alternating signs through the n-way intersection.
    preconditions:
      - A finite collection of events is specified.
      - The needed intersection probabilities are known or computable.
    postconditions:
      - The probability of the finite union is expressed in terms of 
        intersection probabilities.
    applicability:
      - Finite union probabilities, especially when overlaps matter.
    positive_examples:
      - P(A_1 union A_2)=P(A_1)+P(A_2)-P(A_1 cap A_2).
    negative_examples:
      - Adding P(A_i) alone when events can occur together.
    non_goals:
      - Does not provide the deferred proof of the general theorem.
    error_signatures:
      - Treating A_i as disjoint without evidence.
      - Omitting higher-order intersection terms.
      - Using the wrong alternating sign pattern.
    instructional_repairs:
      - Identify the target event as a union first, then list intersection terms
        by size and alternate signs.
