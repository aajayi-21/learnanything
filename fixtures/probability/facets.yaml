  - id: facet_by_inclusion_exclusion_and_symmetry_the_probabil
    title:
    aliases:
      - matching probability limit
    description:
    tags: []
    concept_id: concept_de_montmort_s_matching_problem
    kind: proposition
    claim: By inclusion-exclusion and symmetry, the probability of at least one 
      match in the n-card matching problem is 1 - 1/2! + 1/3! - ... + 
      (-1)^{n+1}/n!, which approaches 1 - 1/e for large n.
    preconditions:
      - The matching problem has been modeled as a union of symmetric events.
      - The finite inclusion-exclusion expression has been derived.
    postconditions:
      - The finite and large-n winning probabilities are identified.
    applicability:
      - Large-n interpretation of the matching problem.
    positive_examples:
      - For large n, the winning probability is approximately 0.63.
    negative_examples:
      - Concluding the limiting probability is 0 or 1 from only one competing 
        effect.
    non_goals:
      - Does not claim arbitrary increasing sample spaces have nonzero nonone 
        limits.
    error_signatures:
      - Reasoning only from individual match probabilities decreasing.
      - Reasoning only from the number of possible matches increasing.
    instructional_repairs:
      - Compare the alternating factorial sum to the Taylor series for e^{-1}.
    status: reviewed
    version: 1
