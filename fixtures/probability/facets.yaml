  - id: facet_to_simulate_fixed_position_matches_in_a_shuffled
    title:
    aliases:
      - fixed point simulation
      - card matching simulation
    description:
    tags: []
    concept_id: concept_card_fixed_point_simulation
    kind: procedure_contract
    claim: To simulate fixed-position matches in a shuffled deck of n indexed 
      cards, generate random permutations with sample(n), count matches with 
      sum(sample(n)==(1:n)), repeat many times, and estimate the probability of 
      at least one match using the proportion with count at least 1.
    preconditions:
      - n is defined as the number of indexed objects.
      - The simulation environment supports R functions sample, replicate, sum, 
        and vector comparison.
    postconditions:
      - The empirical proportion estimates the probability of at least one 
        fixed-position match.
    applicability:
      - Monte Carlo approximation of card matching or fixed-point probabilities 
        for shuffled indexed objects.
    positive_examples:
      - For n <- 100, r <- replicate(10^4,sum(sample(n)==(1:n))); sum(r>=1)/10^4
        estimates the probability of at least one match.
    negative_examples:
      - Using sum(r)/10^4 estimates the mean number of matches, not the 
        probability of at least one match.
    non_goals:
      - Does not derive the exact symbolic derangement probability.
    error_signatures:
      - Student averages match counts rather than thresholding at at least one 
        match.
      - Student compares the permutation to an incorrectly indexed vector.
    instructional_repairs:
      - Use r>=1 to turn match counts into an event indicator for at least one 
        match.
