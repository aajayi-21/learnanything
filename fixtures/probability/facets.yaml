  - id: facet_an_event_a_is_a_subset_of_the_sample_space_s_and
    title:
    aliases:
      - A subset of S
    description:
    tags: []
    concept_id: concept_event
    kind: definition
    claim: An event A is a subset of the sample space S, and A occurs if the 
      actual outcome is in A.
    preconditions:
      - A sample space S has been specified.
      - The experiment has an actual outcome.
    postconditions:
      - Occurrence of A can be checked by membership of the actual outcome in A.
    applicability:
      - Translating probability statements into set language.
    positive_examples:
      - The event that the first coin flip is Heads is a subset of the coin-flip
        sample space.
      - The event H in a card draw consists of the hearts.
    negative_examples:
      - Treating an event as a single outcome when it may contain many outcomes.
    non_goals:
      - Does not require every event to be written only in symbolic set 
        notation.
    error_signatures:
      - Identifying A with the actual outcome rather than with a subset of S.
    instructional_repairs:
      - Name S, identify A as a subset, then test whether the actual outcome is 
        an element of A.
