  - id: facet_to_simulate_the_birthday_problem_for_23_people_s
    title:
    aliases:
      - birthday simulation with tabulate
      - Monte Carlo birthday problem
    description:
    tags: []
    concept_id: concept_birthday_monte_carlo_simulation
    kind: procedure_contract
    claim: To simulate the birthday problem for 23 people, sample birthdays from
      1:365 with replacement, tabulate counts, repeat the experiment, and 
      estimate the probability of at least one shared birthday by the proportion
      of runs whose maximum count is at least 2.
    preconditions:
      - Birthdays are represented by integers 1 through 365.
      - Sampling uses replace=TRUE so multiple people can share a birthday.
      - At least one shared birthday corresponds to some tabulated count being 
        at least 2.
    postconditions:
      - The empirical proportion estimates the probability of at least one 
        birthday match.
    applicability:
      - Monte Carlo simulation of birthday-match probabilities.
    positive_examples:
      - b <- sample(1:365,23,replace=TRUE); tabulate(b); r <- replicate(10^4, 
        max(tabulate(sample(1:365,23,replace=TRUE)))); sum(r>=2)/10^4.
    negative_examples:
      - sample(1:365,23) without replacement prevents any birthday match in the 
        generated group.
      - Using r>=1 with maximum tabulated counts is always true when birthdays 
        are sampled.
    non_goals:
      - Does not provide a closed-form exact calculation.
    error_signatures:
      - Student omits replace=TRUE.
      - Student estimates sum(r>=1)/10^4 from maximum tabulated counts.
    instructional_repairs:
      - Use replace=TRUE and threshold max counts at 2 or higher for a pair 
        match.
