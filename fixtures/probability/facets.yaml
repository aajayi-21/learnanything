  - id: facet_ordered_outcomes_distinguish_positions_or_time_o
    title:
    aliases: []
    description:
    tags: []
    concept_id: concept_ordered_sampling
    kind: interpretation
    claim: Ordered outcomes distinguish positions or time order, while unordered
      outcomes identify arrangements that differ only by ordering; the counting 
      method must match the outcome representation.
    preconditions:
      - The problem specifies whether positions, roles, times, or labels make 
        order meaningful.
    postconditions:
      - The selected counting method preserves or removes order consistently.
    applicability:
      - Race placements and titled officers are ordered.
      - Committees, untitled officer sets, and unordered pairs are not ordered.
      - Two dice can be modeled by ordered pairs when the dice are labeled.
    positive_examples:
      - Afternoon then evening cone choices are ordered pairs counted by 6^2.
      - President, vice president, and treasurer selections are counted as 
        n(n-1)(n-2).
      - A two-person committee from four people has 6 unordered possibilities.
    negative_examples:
      - Treating (5,6) and (6,5) as the same outcome for two labeled fair dice 
        undercounts sum 11.
      - Counting untitled officers as titled role assignments overcounts by 3!.
    non_goals:
      - Does not assert that all physical orderings are equally likely without a
        probability model.
    error_signatures:
      - Collapsing ordered outcomes when labels or roles distinguish them.
      - Counting unordered selections with an ordered formula and forgetting to 
        divide by the number of orderings.
    instructional_repairs:
      - Identify whether role labels, time labels, or object labels are part of 
        the outcome.
      - Represent ordered outcomes as tuples and unordered outcomes as sets or 
        equivalence classes.
    status: reviewed
    version: 1
