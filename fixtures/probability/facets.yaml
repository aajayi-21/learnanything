  - id: facet_under_the_365_day_equally_likely_independent_bir
    title:
    aliases: []
    description:
    tags: []
    concept_id: concept_birthday_problem_complement_counting
    kind: procedure_contract
    claim: Under the 365-day equally likely independent birthday model, compute 
      the probability of at least one shared birthday by counting no-match 
      assignments with a falling product, dividing by 365^k, and subtracting 
      from 1.
    preconditions:
      - There are k people.
      - February 29 is excluded.
      - Each person's birthday is equally likely among 365 days.
      - Birthdays are independent under the model.
      - For the falling-product no-match count as stated, k <= 365.
    postconditions:
      - P(at least one birthday match)=1-(365·364·...·(365-k+1))/365^k.
    applicability:
      - Birthday-problem probability calculations.
      - Cases where direct counting of overlapping match configurations is 
        difficult.
    positive_examples:
      - The first k for which the match probability exceeds 0.5 is 23.
      - At k=57, the match probability exceeds 0.99.
    negative_examples:
      - The product ratio alone is P(no birthday match), not P(at least one 
        birthday match).
      - Directly listing match cases risks overlaps among pairs and groups.
    non_goals:
      - Does not model leap years or nonuniform birthday probabilities.
      - Does not derive the non-equal birthday case.
    error_signatures:
      - Reporting the no-match ratio as the match probability.
      - Trying to enumerate all possible matching configurations directly.
      - Using 365^k as the favorable no-match count.
    instructional_repairs:
      - Name the complement event before counting.
      - Count distinct birthdays as sampling without replacement.
      - Subtract the no-match probability from 1 at the end.
    status: reviewed
    version: 1
    semantic_fingerprint: sf_cbcd6f3bfb606bfa
