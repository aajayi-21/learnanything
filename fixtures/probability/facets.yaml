  - id: facet_when_the_intended_sample_space_model_distinguish
    title:
    aliases: []
    description:
    tags: []
    concept_id: concept_labeling_objects_for_counting
    kind: procedure_contract
    claim: When the intended sample-space model distinguishes individual objects
      or sub-experiments, assign labels or identities before counting so 
      physically similar objects are not mistakenly collapsed.
    preconditions:
      - Objects, people, dice, or sub-experiments may otherwise be treated as 
        indistinguishable.
      - The probability or counting model treats them as distinguishable.
    postconditions:
      - Outcomes are represented in a labeled space suitable for counting.
    applicability:
      - Dice sum probabilities with two fair dice.
      - Sampling from a population of people or balls.
      - Birthday-problem reasoning where people are assigned IDs.
    positive_examples:
      - Labeling two dice A and B gives 36 equally likely ordered pairs.
      - For sum 11, (5,6) and (6,5) are distinct labeled-dice outcomes.
    negative_examples:
      - Treating two fair dice as indistinguishable leads to the false claim 
        that sums 11 and 12 are equally likely.
    non_goals:
      - Does not claim labels physically change the objects.
      - Does not justify naive probability unless equally likely outcomes are 
        also checked.
    error_signatures:
      - Collapsing (5,6) and (6,5) in a labeled-dice model.
      - Treating people or balls as an undifferentiated mass when individual 
        identities matter.
    instructional_repairs:
      - Introduce labels such as die A and die B or person ID numbers.
      - Represent each outcome with the labels before counting favorable cases.
    status: reviewed
    version: 1
    semantic_fingerprint: sf_040b834de72625e2
