  - id: facet_for_an_event_a_in_a_finite_sample_space_s_with_e
    title:
    aliases:
      - P_naive(A)
      - '|A|/|S|'
    description:
    tags: []
    concept_id: concept_naive_probability
    kind: definition
    claim: For an event A in a finite sample space S with equally likely 
      outcomes, the naive probability of A is |A| divided by |S|, the number of 
      favorable outcomes divided by the total number of outcomes.
    preconditions:
      - A is an event in sample space S.
      - S is finite.
      - Outcomes in S are equally likely.
    postconditions:
      - P_naive(A) is computed as a ratio of cardinalities.
    applicability:
      - Finite equally likely sample spaces.
      - Counting favorable outcomes.
    positive_examples:
      - Counting pebbles in a finite equal-mass Pebble World.
      - Computing probabilities in symmetric coin or well-shuffled deck models 
        when equal likelihood is justified.
    negative_examples:
      - Applying |A|/|S| in infinite sample spaces.
      - Applying |A|/|S| when outcomes are not equally likely.
    non_goals:
      - Does not justify equal likelihood by itself.
      - Does not cover the later general definition of probability.
    error_signatures:
      - Using the ratio after merely listing outcomes but without 
        equal-likelihood justification.
    instructional_repairs:
      - Verify finiteness and equal likelihood, then count favorable and total 
        outcomes.
    status: reviewed
    version: 1
