  - id: facet_for_events_a_and_b_the_complement_of_a_union_is_
    title:
    aliases:
      - De Morgan identities
    description:
    tags: []
    concept_id: concept_event_operations
    kind: proposition
    claim: For events A and B, the complement of a union is the intersection of 
      complements, and the complement of an intersection is the union of 
      complements.
    preconditions:
      - A and B are events in a common sample space S.
    postconditions:
      - Complements of compound events can be rewritten by complementing each 
        component and switching union with intersection.
    applicability:
      - Simplifying event descriptions.
      - Using complements to compute probabilities.
    positive_examples:
      - Rewriting (A union B)^c as A^c intersection B^c in card-event contexts.
    negative_examples:
      - Writing the complement of a union as the union of complements.
    non_goals:
      - Does not by itself compute probabilities.
    error_signatures:
      - Keeping the same operation when moving the complement inside.
    instructional_repairs:
      - Complement each component event and switch union to intersection or 
        intersection to union.
    status: reviewed
