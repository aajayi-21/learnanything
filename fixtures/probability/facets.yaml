  - id: facet_a_permutation_is_an_ordered_arrangement_of_all_n
    title:
    aliases: []
    description:
    tags: []
    concept_id: concept_permutations_and_factorials
    kind: definition
    claim: A permutation is an ordered arrangement of all n distinct objects, 
      counted by n!, where n! = n(n-1)...1 and 0! = 1.
    preconditions:
      - There are n distinct objects.
      - All objects are arranged in order.
    postconditions:
      - The number of full arrangements is n!.
    applicability:
      - Counting ways n people can line up.
      - Viewing a full arrangement as sampling without replacement with k=n.
    positive_examples:
      - There are n! ways for n people to line up.
    negative_examples:
      - Repeated indistinguishable letters require overcounting adjustment 
        rather than n! alone.
    non_goals:
      - Does not count partial arrangements where k<n.
      - Does not count unordered groups.
    error_signatures:
      - Using n^n for a permutation of distinct objects without replacement.
      - Ignoring indistinguishable repeats in word permutations.
    instructional_repairs:
      - Model the arrangement as filling ordered positions from a shrinking 
        pool.
      - Use factorial notation after deriving the falling product.
    status: reviewed
    version: 1
    semantic_fingerprint: sf_298db6fbd59e9b66
