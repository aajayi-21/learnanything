  - id: facet_in_r_pbirthday_k_returns_the_probability_of_at_l
    title:
    aliases:
      - pbirthday and qbirthday
      - R birthday functions
    description:
    tags: []
    concept_id: concept_r_birthday_built_in_functions
    kind: procedure_contract
    claim: In R, pbirthday(k) returns the probability of at least one birthday 
      match for k people, qbirthday(p) returns the number of people needed to 
      reach probability p, and adding coincident=3 changes the event to an 
      at-least-one triple birthday match.
    preconditions:
      - R's pbirthday and qbirthday functions are available.
      - The desired event is either a pair birthday match by default or a triple
        birthday match when coincident=3 is supplied.
    postconditions:
      - The function call returns either a probability from a group size or a 
        required group size from a target probability.
    applicability:
      - Using R built-ins for standard birthday problem probability, threshold, 
        and triple-match questions.
    positive_examples:
      - pbirthday(23) is reported as 0.507; qbirthday(0.5) is reported as 23; 
        pbirthday(23,coincident=3) is reported as 0.014; 
        qbirthday(0.5,coincident=3) is reported as 88.
    negative_examples:
      - Interpreting qbirthday(0.5) as a probability is invalid because 
        qbirthday returns a number of people.
    non_goals:
      - Does not describe the internal implementation of pbirthday or qbirthday.
    error_signatures:
      - Student uses qbirthday when a probability is requested.
      - Student omits coincident=3 for a triple-match question.
    instructional_repairs:
      - Choose pbirthday for probability from group size and qbirthday for group
        size from target probability; add coincident=3 for triples.
