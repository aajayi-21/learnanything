  - id: facet_in_de_montmort_s_matching_problem_define_a_i_as_
    title:
    aliases:
      - matching event setup
    description:
    tags: []
    concept_id: concept_de_montmort_s_matching_problem
    kind: procedure_contract
    claim: In de Montmort's matching problem, define A_i as the event that card 
      i appears in position i; winning means at least one A_i occurs, so the 
      target probability is P(A_1 union ... union A_n).
    preconditions:
      - A deck of n labeled cards is randomly ordered.
      - A win occurs when at least one card label matches its position.
    postconditions:
      - The verbal win condition is represented as a union of matching-position 
        events.
    applicability:
      - Permutation matching and fixed-point problems.
    positive_examples:
      - A match in position 7 is event A_7.
    negative_examples:
      - Using P(A_i) for one fixed i as the whole win probability.
    non_goals:
      - Does not by itself compute the final numerical win probability.
    error_signatures:
      - Confusing a single matching-position probability with the 
        at-least-one-match probability.
    instructional_repairs:
      - Translate 'at least one' into a union over all positions before 
        computing.
    status: reviewed
    version: 1
