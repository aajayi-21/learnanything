prompt: Let A be symmetric. Suppose u and v are eigenvectors with Au = lambda u 
  and Av = mu v, where lambda != mu. Prove that u dot v = 0.
expected_answer: Because A is symmetric, (Au) dot v = u dot (Av). Substituting 
  the eigenvalue equations gives lambda (u dot v) = mu (u dot v). Thus (lambda -
  mu)(u dot v) = 0. Since lambda != mu, it follows that u dot v = 0, so the 
  eigenvectors are orthogonal.
