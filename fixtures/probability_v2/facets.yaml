  - id: facet_for_events_a_and_b_a_b_c_a_c_b_c_and_a_b_c_a_c_b
    title:
    aliases:
      - De Morgan's laws for events
    description:
    tags: []
    concept_id: concept_event_operations
    kind: proposition
    claim: For events A and B, (A∪B)^c=A^c∩B^c and (A∩B)^c=A^c∪B^c; the same 
      logical pattern extends to unions and intersections of more events.
    preconditions:
      - A and B are events in a common sample space.
    postconditions:
      - A complemented union or intersection can be rewritten by exchanging 
        union and intersection and complementing each component.
    applicability:
      - Rewriting compound events.
      - Complement-based probability calculations.
    positive_examples:
      - Not(A or B) is equivalent to not A and not B.
    negative_examples:
      - Replacing a union by an intersection without also complementing the 
        component events.
    non_goals:
      - Claiming that union and intersection are interchangeable.
    error_signatures:
      - The outer operation is changed but individual events are not 
        complemented.
      - The complement is distributed without switching union and intersection.
    instructional_repairs:
      - Restate the event in ordinary language using 'not', 'or', and 'and' 
        before rewriting symbolically.
