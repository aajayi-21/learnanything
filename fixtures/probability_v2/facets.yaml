    claim: Use pbirthday(k) when group size is known and a match probability is 
      desired; use qbirthday(p) when a target probability is known and the 
      required group size is desired; add coincident=3 for at least one triple 
      match.
    preconditions:
      - The desired output and coincidence order are identified.
    postconditions:
      - The appropriate birthday-problem query is performed.
    applicability:
      - Pair or triple birthday-match probability and group-size queries.
    positive_examples:
      - pbirthday(23)
      - qbirthday(0.5)
      - pbirthday(23,coincident=3)
      - qbirthday(0.5,coincident=3)
    negative_examples:
      - Using qbirthday when a probability is required.
      - Omitting coincident=3 when the event is a triple match.
    non_goals:
      - Computing the probability of exactly one triple while excluding larger 
        coincidences.
    error_signatures:
      - A returned group size is interpreted as a probability or vice versa.
      - A pair-match query is used for a triple-match question.
    instructional_repairs:
