  - id: facet_to_estimate_an_event_probability_by_monte_carlo_
    title:
    aliases:
      - Monte Carlo proportion estimate
    description:
    tags: []
    concept_id: concept_monte_carlo_probability_estimation
    kind: procedure_contract
    claim: To estimate an event probability by Monte Carlo simulation, encode 
      one random experiment, repeat it many times, count repetitions in which 
      the event occurs, and divide by the number of repetitions.
    preconditions:
      - The random experiment and target event can be represented in executable 
        R code.
      - The number of repetitions is known.
    postconditions:
      - A simulation-based relative-frequency estimate of the event probability 
        is produced.
    applicability:
      - Probability problems admitting repeated computational simulation.
    positive_examples:
      - replicate(10^4,...)
      - sum(r>=1)/10^4
    negative_examples:
      - Presenting the simulated proportion as an exact symbolic proof.
    non_goals:
      - Deriving an exact probability formula.
    error_signatures:
      - The event count is divided by something other than the number of 
        repetitions.
      - One simulated outcome is reported as a probability estimate.
    instructional_repairs:
      - Make the event indicator explicit and normalize its repeated count by 
        the total number of trials.
