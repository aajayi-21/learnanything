  - id: facet_to_compute_naive_probability_identify_a_finite_s
    title:
    aliases:
      - counting-based probability
    description:
    tags: []
    concept_id: concept_naive_probability
    kind: procedure_contract
    claim: To compute naive probability, identify a finite sample space S, 
      verify that its outcomes are equally likely, represent the target event A 
      as a subset of S, count |A| and |S|, and calculate P_naive(A)=|A|/|S|.
    preconditions:
      - S is finite.
      - All outcomes in S are equally likely.
      - A is an event in S.
    postconditions:
      - The probability is expressed as the ratio of favorable outcomes to total
        outcomes.
    applicability:
      - Finite experiments with equal probability mass on every outcome.
      - Experiments whose symmetry or design justifies equal likelihood.
    positive_examples:
      - A well-shuffled standard deck modeled with all deck orders equally 
        likely.
      - A successfully implemented simple random sample in which all subsets of 
        the required size are equally likely.
    negative_examples:
      - Two verbal possibilities with no symmetry or design argument.
      - A sample space whose outcomes have unequal probability mass.
    non_goals:
      - Inferring equal likelihood from ignorance.
      - Applying the ratio to arbitrary infinite sample spaces.
    error_signatures:
      - The count ratio is used without checking equal likelihood.
      - The denominator counts outcomes from a different sample space.
      - The numerator does not match the target event.
    instructional_repairs:
      - State the equal-likelihood justification before counting.
      - Write A and S explicitly and check A⊆S.
    status: reviewed
