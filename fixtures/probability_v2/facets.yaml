  - id: facet_the_binomial_coefficient_c_n_k_counts_size_k_sub
    title:
    aliases:
      - n choose k
    description:
    tags: []
    concept_id: concept_binomial_coefficients
    kind: proposition
    claim: The binomial coefficient C(n,k) counts size-k subsets of an n-element
      set; for 0≤k≤n it equals n(n-1)···(n-k+1)/k!=n!/((n-k)!k!), and it equals 
      0 for k>n.
    preconditions:
      - n and k are nonnegative integers.
      - Selection is without replacement and order is irrelevant.
    postconditions:
      - The unordered selection count is C(n,k).
    applicability:
      - Committees, subsets of fixed size, and untitled selections.
    positive_examples:
      - C(4,2)=6 two-person committees from four distinct people.
    negative_examples:
      - Assignments to distinct titled roles.
    non_goals:
      - Ordered selections and selections with replacement.
    error_signatures:
      - Retaining all k! orders as different outcomes.
      - Attempting to evaluate (n-k)! when k>n.
    instructional_repairs:
      - Count ordered selections, divide by k!, and use zero when k>n.
    status: reviewed
    version: 1
