  - id: facet_if_a_compound_outcome_is_specified_through_stage
    title:
    aliases:
      - product rule procedure
    description:
    tags: []
    concept_id: concept_multiplication_rule_for_counting
    kind: procedure_contract
    claim: If a compound outcome is specified through stages, with a choices at 
      the first stage and b choices at the second stage for every first-stage 
      choice, then there are ab compound outcomes; extend the same reasoning 
      across additional stages.
    preconditions:
      - Each complete outcome is specified by one choice at every stage.
      - The number of available choices at each stage is known for the relevant 
        prior choices.
    postconditions:
      - The total number of compound outcomes is obtained by multiplying the 
        successive choice counts.
    applicability:
      - Compound experiments with uniform branching.
      - Ordered selections without replacement, using decreasing choice counts.
      - Cartesian combinations in which every option from one category can pair 
        with every option from another.
    positive_examples:
      - Ten choices for first place, nine for second, and eight for third give 
        10·9·8=720 ordered placements.
      - Two cone types and three flavors give 2·3=6 combinations.
    negative_examples:
      - Multiplying the number of rows by one row's target count when different 
        rows contain different numbers of targets.
    non_goals:
      - Requiring the conceptual stages to occur chronologically.
      - Using a fixed factor when the available count varies across branches 
        without accounting for that variation.
    error_signatures:
      - Stage counts are added instead of multiplied.
      - An already-selected object is allowed to occupy another distinct 
        position.
      - A uniform branch count is assumed without checking it.
      - The order-sensitive outcomes are treated as unordered.
    instructional_repairs:
      - Describe how one complete outcome is assembled from stage choices.
      - Update the available choice count after each selection without 
        replacement.
      - Use a tree diagram to check whether every branch has the assumed number 
        of continuations.
    status: reviewed
