  - id: facet_simulate_birthday_matches_by_sampling_one_day_pe
    title:
    aliases:
      - Monte Carlo birthday simulation
    description:
    tags: []
    concept_id: concept_birthday_matching_problem
    kind: procedure_contract
    claim: Simulate birthday matches by sampling one day per person with 
      replacement, tabulating day frequencies, testing whether the maximum 
      frequency reaches the desired coincidence threshold, and repeating the 
      experiment to estimate its probability.
    preconditions:
      - The group size, possible days, coincidence threshold, and number of 
        repetitions are specified.
      - Sampling with replacement is used so birthdays may coincide.
    postconditions:
      - A Monte Carlo estimate of the requested birthday-match probability is 
        produced.
    applicability:
      - Pair or higher-order birthday-match simulation.
      - Equal or explicitly weighted day distributions.
    positive_examples:
      - max(tabulate(sample(1:365,23,replace=TRUE)))
      - replicate(10^4,...)
    negative_examples:
      - Sampling birthdays without replacement.
      - Leaving prob unspecified when a nonuniform birthday distribution is 
        intended.
    non_goals:
      - Providing an exact symbolic probability.
    error_signatures:
      - No matches occur because birthdays were sampled without replacement.
      - A nonuniform model is simulated using equal default probabilities.
    instructional_repairs:
      - Enable replacement and pass an explicit day-probability vector when the 
        model is nonuniform.
