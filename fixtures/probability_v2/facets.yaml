  - id: facet_for_a_finite_multistage_choice_process_identify_
    title:
    aliases:
      - basic counting principle
    description:
    tags: []
    concept_id: concept_multiplication_rule_for_counting
    kind: procedure_contract
    claim: For a finite multistage choice process, identify the number of 
      choices at each stage, verify that the stated continuation count applies 
      across the relevant branches, and multiply the stage counts.
    preconditions:
      - The choice process has finitely many stages and options.
      - The factor used at a stage is valid for every relevant preceding branch.
    postconditions:
      - The product equals the number of represented outcomes.
    applicability:
      - Sequential choices with constant applicable branch counts.
      - Repeated choices whose availability remains unchanged.
    positive_examples:
      - Two cone choices followed by three flavors available for either cone 
        give 2·3=6 outcomes.
    negative_examples:
      - If one cone permits three flavors and another permits only two, the 
        unqualified product 2·3 is invalid.
    non_goals:
      - Counting unequal branches without first decomposing them.
    error_signatures:
      - Multiplying fixed stage counts even though later availability depends on
        an earlier choice.
    instructional_repairs:
      - Inspect each branch; if continuation counts differ, count branches 
        separately and add their totals.
    status: reviewed
