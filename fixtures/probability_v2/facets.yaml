  - id: facet_under_the_equal_probability_365_day_model_comput
    title:
    aliases:
      - birthday-match complement calculation
    description:
    tags: []
    concept_id: concept_birthday_matching_problem
    kind: procedure_contract
    claim: Under the equal-probability 365-day model, compute the probability of
      at least one shared birthday as one minus the probability that all 
      birthdays are distinct.
    preconditions:
      - Birthdays are independent and equally likely across 365 days.
      - The group size is specified.
    postconditions:
      - The probability of at least one birthday match is returned.
    applicability:
      - The standard birthday problem.
    positive_examples:
      - 1-prod((365-k+1):365)/365^k
      - pbirthday(k)
    negative_examples:
      - Using the all-distinct product itself as the probability of at least one
        match.
      - Applying the equal-probability expression unchanged to a nonuniform day 
        model.
    non_goals:
      - Closed-form treatment of unequal birthday probabilities.
    error_signatures:
      - The complement subtraction from 1 is omitted.
    instructional_repairs:
      - Identify the easier no-match event, calculate its probability, and 
        subtract it from 1.
