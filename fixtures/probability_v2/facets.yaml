    concept_id: concept_ordered_sampling
    kind: proposition
    claim: Making k ordered selections from n objects with replacement produces 
      n^k outcomes because all n objects remain available at every position.
    preconditions:
      - There are n objects.
      - There are k distinguishable selection positions.
      - Selections are made with replacement.
    postconditions:
