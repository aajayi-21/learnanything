  - id: facet_the_number_of_verbal_possibilities_does_not_dete
    title:
    aliases:
      - equal-likelihood validity check
    description:
    tags: []
    concept_id: concept_unjustified_equiprobability
    kind: applicability_condition
    claim: The number of verbal possibilities does not determine their 
      probabilities; equal likelihood must be justified by the probability 
      model, symmetry, or experimental design before favorable outcomes are 
      divided by total outcomes.
    preconditions:
      - A counting-based probability calculation is proposed.
    postconditions:
      - The equal-likelihood assumption is either justified or the naive 
        probability method is rejected.
    applicability:
      - Selecting a probability method for finite sample spaces.
    positive_examples:
      - A symmetric model or randomization design explicitly makes the modeled 
        outcomes equally likely.
    negative_examples:
      - Assigning probability 1/2 because an event either happens or does not 
        happen.
    non_goals:
      - Claiming that binary events can never have probability 1/2.
    error_signatures:
      - A binary wording is the only support offered for probability 1/2.
      - Nested events are each assigned probability 1/2 independently.
      - An intended random sampling design is assumed to work despite an 
        incomplete sampling frame.
    instructional_repairs:
      - Identify the elementary outcomes and explain why their probability 
        masses are equal.
      - If equal likelihood is provisional, label it as a model assumption and 
        compare its predictions with observations.
