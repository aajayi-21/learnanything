facets:
  - id: facet_when_the_complement_is_easier_to_characterize_or
    title:
    aliases:
      - complement method
    description:
    tags: []
    concept_id: concept_naive_probability
    kind: procedure_contract
    claim: When the complement is easier to characterize or count than the 
      target event, compute the complement and use P_naive(A^c)=1-P_naive(A), 
      applying De Morgan's laws when useful.
    preconditions:
      - The naive probability model applies.
      - The target event has a well-defined complement.
    postconditions:
      - The target probability is obtained by subtracting the complement 
        probability from 1.
    applicability:
      - At-least-one events.
      - Compound events whose complements have simpler set descriptions.
    positive_examples:
      - Compute the probability of at least one occurrence by counting no 
        occurrences and subtracting from 1.
    negative_examples:
      - Assuming the complement is always easier without comparing the two 
        routes.
    non_goals:
      - Replacing every direct calculation with a complement calculation.
    error_signatures:
      - The complement is counted but not subtracted from 1.
      - The wrong complemented event is constructed.
    instructional_repairs:
      - Write the target event and its complement in words before choosing a 
        route.
      - Check that the target and complement partition the sample space.
    status: reviewed
