  - id: facet_translate_or_or_at_least_one_with_union_and_or_s
    title:
    aliases:
      - English-to-set-notation translation
    description:
    tags: []
    concept_id: concept_event_operations
    kind: procedure_contract
    claim: Translate 'or' or 'at least one' with union, 'and' or simultaneous 
      requirements with intersection, and 'not' with complement, combining these
      operations to match the logical structure of the event description.
    preconditions:
      - A sample space and the relevant basic events are defined.
    postconditions:
      - The verbal event description is represented by a set expression.
    applicability:
      - Compound event descriptions.
      - Repeated-trial and card-property events.
    positive_examples:
      - At least one of A and B is A∪B.
      - Both A and B is A∩B.
      - A does not occur is A^c.
      - At least two consecutive Heads in ten flips can be written as a union of
        adjacent intersections.
    negative_examples:
      - Using intersection for 'at least one'.
      - Using union for 'both'.
    non_goals:
      - Computing the event's probability.
    error_signatures:
      - Union and intersection are interchanged.
      - A negation is omitted.
      - The available basic events are too coarse to express the requested 
        property.
    instructional_repairs:
      - Identify each logical connective before writing symbols.
      - Test the expression on a concrete outcome.
      - Introduce a finer-grained basic event when the existing event vocabulary
        cannot distinguish the requested cases.
    status: reviewed
