  - id: facet_for_a_finite_union_add_single_event_terms_subtra
    title:
    aliases: []
    description:
    tags: []
    concept_id: concept_inclusion_exclusion
    kind: procedure_contract
    claim: For a finite union, add single-event terms, subtract pairwise 
      intersections, add triple intersections, and continue with alternating 
      signs through the full intersection; when same-order intersections are 
      equal by symmetry, group them using binomial coefficients.
    preconditions:
      - A finite family of sets or events is given.
      - The needed intersection counts or probabilities can be determined.
    postconditions:
      - Each element of the union contributes exactly once.
    applicability:
      - Overlapping unions, especially symmetric families of events.
    positive_examples:
      - Fixed-position match events in a random permutation can be grouped by 
        intersection order.
    negative_examples:
      - Simply adding sizes or probabilities when the component sets overlap.
    non_goals:
      - Treating inclusion-exclusion as automatically efficient for nonsymmetric
        families.
    error_signatures:
      - Omitting intersection corrections.
      - For three sets, failing to add back the triple intersection.
    instructional_repairs:
      - Track how many times each overlap region has been added or subtracted 
        and apply the alternating correction.
