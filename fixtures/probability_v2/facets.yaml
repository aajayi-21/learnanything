  - id: facet_if_a_convenient_construction_counts_every_desire
    title:
    aliases: []
    description:
    tags: []
    concept_id: concept_uniform_overcounting_correction
    kind: procedure_contract
    claim: If a convenient construction counts every desired possibility exactly
      c times, divide the raw count by c; this correction is valid only when the
      multiplicity c is uniform.
    preconditions:
      - Every desired possibility is represented.
      - Every desired possibility has the same representation multiplicity c.
    postconditions:
      - Dividing the raw count by c counts every target possibility once.
    applicability:
      - Ordered constructions used to count unordered selections.
      - Counts containing uniform swaps or reorderings.
    positive_examples:
      - A two-person committee is generated twice by ordered selection, so 
        divide by 2.
    negative_examples:
      - Unordered pairs with repetition obtained from ordered pairs, where 
        diagonal and off-diagonal pairs have different multiplicities.
    non_goals:
      - Nonuniform overcounting without a case split.
    error_signatures:
      - Dividing by a factor without verifying equal multiplicity.
    instructional_repairs:
      - Determine the number of representations of each target object; split 
        into cases if the multiplicity varies.
