  - id: facet_sample_n_k_draws_k_distinct_values_from_1_throug
    title:
    aliases:
      - sample defaults and replacement
    description:
    tags: []
    concept_id: concept_random_sampling_in_r
    kind: procedure_contract
    claim: sample(n,k) draws k distinct values from 1 through n by default; 
      replace=TRUE permits repeated values, and sample(n) generates a random 
      permutation of 1 through n.
    preconditions:
      - The population and desired sample size are specified.
      - For default sampling without replacement, the requested size is 
        feasible.
    postconditions:
      - A pseudo-random ordered sample or permutation is generated.
    applicability:
      - Sampling without replacement.
      - Sampling with replacement.
      - Generating random permutations.
    positive_examples:
      - sample(n,k)
      - sample(n,k,replace=TRUE)
      - sample(n)
    negative_examples:
      - Expecting repetitions from sample(n,k) without replace=TRUE.
    non_goals:
      - Guaranteeing a particular realized random output.
    error_signatures:
      - Repeated values are expected but replace=TRUE is omitted.
      - A permutation is modeled by sampling with replacement.
    instructional_repairs:
      - Choose the replacement setting from the experiment's repeatability 
        assumptions.
      - Use sample(n) when every value from 1 through n must appear exactly 
        once.
