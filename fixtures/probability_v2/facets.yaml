    title:
    aliases:
      - falling-product count
    description:
    tags: []
    concept_id: concept_ordered_sampling
    kind: proposition
    claim: Making k ordered selections from n objects without replacement 
      produces n(n-1)···(n-k+1) outcomes for 1≤k≤n and zero outcomes for k>n.
    preconditions:
      - There are n distinct objects.
      - Order matters.
      - Selected objects are not replaced.
    postconditions:
      - The successive stage counts decrease by one.
      - The count is zero when more than n selections are required.
    applicability:
      - Ordered samples without replacement.
    positive_examples:
      - The available counts are n,n-1,…,n-k+1.
    negative_examples:
      - Using n^k when selected objects cannot recur.
    non_goals:
      - Unordered selections.
    error_signatures:
      - Keeping n choices at every position.
      - Returning a positive count for k>n.
    instructional_repairs:
      - Decrease availability after each selection and check whether k exceeds 
        n.
