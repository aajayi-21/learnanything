  - id: facet_to_count_an_at_least_one_collision_event_with_ov
    title:
    aliases: []
    description:
    tags: []
    concept_id: concept_complement_counting
    kind: procedure_contract
    claim: To count an at-least-one collision event with overlapping direct 
      cases, identify the no-collision complement, count its outcomes, and 
      subtract from the total; in a finite equally likely model, divide by the 
      total and subtract the complement probability from 1.
    preconditions:
      - The target and its complement partition the sample space.
      - The complement is easier to count.
      - Equal likelihood is established before converting counts to 
        probabilities.
    postconditions:
      - The target count or probability is obtained without separately adding 
        overlapping collision patterns.
    applicability:
      - Birthday-type collision problems and other at-least-one events with an 
        accessible no-occurrence complement.
    positive_examples:
      - For k≤365, count distinct-day assignments as 365·364···(365-k+1), divide
        by 365^k, then subtract from 1.
    negative_examples:
      - Using favorable-over-total when the modeled elementary outcomes are not 
        equally likely.
    non_goals:
      - Claiming every at-least-one problem must use a complement.
    error_signatures:
      - Adding overlapping match configurations as though they were disjoint.
      - Counting only configurations with exactly one matching pair.
    instructional_repairs:
      - Define the no-match event and verify that it is the exact complement of 
        at least one match.
