  - id: facet_for_n_positions_containing_indistinguishable_gro
    title:
    aliases:
      - multiset permutation formula
    description:
    tags: []
    concept_id: concept_permutations_with_repeated_objects
    kind: procedure_contract
    claim: For N positions containing indistinguishable groups of multiplicities
      m1,…,mr, count distinct arrangements as N!/(m1!···mr!), equivalently by 
      choosing positions successively for the repeated types.
    preconditions:
      - The total number of positions and every type multiplicity are known.
      - Occurrences of the same type are indistinguishable.
    postconditions:
      - Reorderings among identical occurrences are removed from the count.
    applicability:
      - Repeated-letter words and other multiset arrangements.
    positive_examples:
      - STATISTICS has 10!/(3!3!2!) distinct arrangements.
    negative_examples:
      - Permutations of N fully distinct objects.
    non_goals:
      - Objects with partially defined or context-dependent equivalence.
    error_signatures:
      - Counting swaps of identical occurrences as distinct.
      - Omitting a repeated-type factorial from the denominator.
    instructional_repairs:
      - List every multiplicity and divide N! by the factorial of each.
