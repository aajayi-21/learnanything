  - id: facet_the_sample_space_s_is_the_set_of_all_possible_ou
    title:
    aliases:
      - sample-space model
    description:
    tags: []
    concept_id: concept_sample_spaces_and_events
    kind: definition
    claim: The sample space S is the set of all possible outcomes of an 
      experiment; an event A is a subset of S and occurs exactly when the actual
      outcome belongs to A.
    preconditions:
      - An experiment and its possible outcomes are specified.
    postconditions:
      - Every modeled outcome is represented as an element of S.
      - A verbal condition can be represented as a subset of S.
    applicability:
      - Set-based probability models.
    positive_examples:
      - For ten coin flips, outcomes may be represented as length-10 H/T strings
        or binary sequences.
      - For one draw from a standard deck, each of the 52 cards is an outcome.
    negative_examples:
      - A proposed sample space that omits a genuinely possible outcome of the 
        experiment.
    non_goals:
      - Assigning numerical probabilities to outcomes or events.
    error_signatures:
      - Treating an event as necessarily one outcome rather than a subset.
      - Defining S so that an observed possible outcome is absent.
    instructional_repairs:
      - List the experiment's possible outcomes before defining events.
      - Check that each verbal event selects a subset of the stated sample 
        space.
    status: reviewed
    version: 1
