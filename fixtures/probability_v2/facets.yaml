    concept_id: concept_permutations_and_factorials
    kind: definition
    claim: A permutation is an arrangement of n distinct objects using every 
      object exactly once; there are n! such arrangements, where n!=n(n-1)···1 
      and 0!=1.
    preconditions:
      - n is a nonnegative integer.
      - All arranged objects are distinct.
    postconditions:
      - The permutation count is n!.
    applicability:
      - Linear arrangements of distinct objects.
      - Full ordered samples without replacement.
    positive_examples:
      - Arranging n people in a line gives n! orders.
    negative_examples:
      - Arrangements containing indistinguishable repeated objects.
    non_goals:
      - Partial selections and repeated-object arrangements.
    error_signatures:
      - Using n! when objects are omitted, repeated, or indistinguishable.
    instructional_repairs:
