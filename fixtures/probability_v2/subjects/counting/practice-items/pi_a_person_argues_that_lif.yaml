prompt: A person argues that life on a planet has probability 1/2 because either
  life exists or it does not. Decide whether P_naive(A)=|A|/|S| is justified. 
  State the missing condition and describe one kind of evidence that could 
  justify an equally likely model.
expected_answer: The argument is not justified. Two verbal possibilities do not 
  imply equal probabilities. The naive ratio requires a finite sample space 
  whose elementary outcomes are equally likely. Equal likelihood could be 
  supported by an appropriate symmetry argument or guaranteed by a valid 
  randomization design.
