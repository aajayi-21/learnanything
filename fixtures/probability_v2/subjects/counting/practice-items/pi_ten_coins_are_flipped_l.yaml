prompt: Ten coins are flipped. Let A_j be the event that flip j is Heads. Write 
  set expressions for (a) at least one Head, (b) all Heads, and (c) at least two
  consecutive Heads. Briefly explain the role of union and intersection in each 
  expression.
expected_answer: (a) ⋃_{j=1}^{10}A_j. (b) ⋂_{j=1}^{10}A_j. (c) 
  ⋃_{j=1}^{9}(A_j∩A_{j+1}). Union represents at least one qualifying occurrence;
  intersection represents simultaneous requirements.
