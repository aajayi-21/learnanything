prompt: 'Explain how the following structure estimates the probability of at least
  one fixed-position match in a shuffled deck: r <- replicate(10^4, sum(sample(n)==(1:n)));
  sum(r>=1)/10^4. Identify the random experiment, the position indicators, the per-run
  count, the event test, and the final normalization.'
expected_answer: sample(n) creates one random permutation. Comparing it 
  elementwise with 1:n produces TRUE/FALSE indicators for fixed-position 
  matches. sum counts matches in one run. replicate repeats the run 10,000 times
  and stores the counts. r>=1 identifies runs with at least one match, and 
  dividing their count by 10,000 gives the simulated relative frequency.
