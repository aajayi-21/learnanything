prompt: For a uniformly random permutation of n labeled cards, let A_i be the 
  event that card i is in position i. Explain how inclusion–exclusion and 
  symmetry produce the probability of at least one fixed point through the 
  third-order term.
expected_answer: The target is P(A_1∪···∪A_n). There are n single events with 
  probability 1/n, C(n,2) pair intersections with probability 1/[n(n-1)], and 
  C(n,3) triple intersections with probability 1/[n(n-1)(n-2)]. 
  Inclusion–exclusion gives 1-1/2!+1/3! through third order.
