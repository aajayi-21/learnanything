prompt: 'Write R calls for: (a) five distinct integers from 1 through 10; (b) five
  integers from 1 through 10 with repetitions allowed; (c) a random permutation of
  1 through 10; and (d) three draws with replacement from values 1 through 4 using
  probabilities 0.1, 0.2, 0.3, and 0.4. Briefly explain the replacement behavior of
  each call.'
expected_answer: (a) sample(10,5), without replacement by default; (b) 
  sample(10,5,replace=TRUE); (c) sample(10) or sample(10,10), a permutation 
  without replacement; (d) sample(4,3,replace=TRUE,prob=c(0.1,0.2,0.3,0.4)).
