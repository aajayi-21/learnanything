prompt: 'For each request, give the appropriate R function call and state whether
  its output is direct or logarithmic: (a) n!, when representable; (b) a binomial
  coefficient, when representable; (c) log(n!) for a value whose factorial overflows;
  (d) the logarithm of a binomial coefficient.'
expected_answer: (a) factorial(n), direct; (b) choose(n,k), direct; (c) 
  lfactorial(n), logarithmic; (d) lchoose(n,k), logarithmic. The l-prefixed 
  functions must not be interpreted as returning the untransformed quantities.
