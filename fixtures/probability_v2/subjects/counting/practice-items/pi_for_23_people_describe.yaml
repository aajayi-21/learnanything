evidence_weights: {}
criterion_facet_weights: {}
prompt: 'For 23 people, describe two valid ways to obtain the probability of at least
  one shared birthday under the equal-probability 365-day model: one complement-based
  calculation and one Monte Carlo simulation. Then state how the simulation must change
  if day probabilities are unequal, and name the R query for the group size giving
  a target probability p of at least one triple match.'
expected_answer: For the calculation, compute one minus the all-distinct 
  probability, for example 1-prod((365-23+1):365)/365^23, or use pbirthday(23). 
  For simulation, repeatedly sample 23 days from 1:365 with replace=TRUE, 
  tabulate frequencies, test whether the maximum is at least 2, and take the 
  qualifying proportion. For unequal probabilities, pass the day-probability 
  vector through prob. For the target group size for a triple match, use 
  qbirthday(p,coincident=3).
