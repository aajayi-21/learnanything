prompt: In the simplified 365-day birthday model, set up the probability that at
  least two of k people share a birthday for k≤365. Explain why complement 
  counting is preferable to adding match configurations directly.
expected_answer: 'Direct match configurations overlap. Count the complement in which
  all birthdays are distinct: 365·364···(365-k+1) assignments out of 365^k total.
  Therefore P(at least one match)=1-[365·364···(365-k+1)]/365^k.'
