prompt: A grid has eight rows, but different rows contain different numbers of 
  white cells. A student counts the white cells by taking the number of white 
  cells in the first row and multiplying by eight. Diagnose the error and state 
  when a rows-times-cells-per-row product would be valid.
expected_answer: The student assumed a uniform number of white cells per row 
  without checking it. Multiplying the number of rows by one common per-row 
  count is valid only when every counted row contributes that same number of 
  white cells. With varying row counts, the rows must be handled according to 
  their actual contributions or another valid decomposition must be used.
