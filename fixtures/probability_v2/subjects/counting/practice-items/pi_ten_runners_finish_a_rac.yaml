prompt: Ten runners finish a race with no ties. How many ordered assignments of 
  first, second, and third place are possible? Show the available choice count 
  at each stage, and explain why the stage counts change.
expected_answer: There are 10 choices for first place, 9 remaining choices for 
  second, and 8 remaining choices for third. By the multiplication rule, the 
  total is 10·9·8=720. The counts decrease because one runner cannot occupy more
  than one finishing place.
