grading_rubric:
  max_points: 4
  criteria:
    - id: opening_direction
      points: 0.5
      description: Correctly states that the parabola opens upward because a is 
        positive.
    - id: vertex_x_formula
      points: 0.5
      description: Uses x = -b/(2a) to find x = 2.
    - id: vertex_y_evaluation
      points: 0.625
      description: Evaluates f(2) = -1.
    - id: vertex_pair
      points: 0.375
      description: Reports the vertex as (2, -1).
    - id: axis_symmetry
      points: 0.5
      description: Reports the axis of symmetry as x = 2.
    - id: x_intercepts
      points: 0.75
      description: Finds x-intercepts (1, 0) and (3, 0).
    - id: y_intercept
      points: 0.5
      description: Finds y-intercept (0, 3).
    - id: graph_feature_coherence
      points: 0.25
      description: Features are mutually consistent for an upward-opening 
        parabola.
  fatal_errors:
    - id: axis_as_point
      description: Reports the axis of symmetry as an ordered point instead of a
        vertical line x = constant.
      max_grade: 3
    - id: intercepts_swapped
      description: Confuses x-intercepts with the y-intercept in a way that 
        makes the sketch unusable.
      max_grade: 3
    - id: wrong_vertex_formula_graphing
      description: Uses an incorrect vertex x-coordinate formula leading to 
        inconsistent graph features.
      max_grade: 3
