criterion_facet_weights: {}
prompt: For f(x) = x^2 - 4x + 3, list the opening direction, vertex, axis of 
  symmetry, x-intercepts, and y-intercept. These features should be enough to 
  sketch the parabola.
expected_answer: Since a = 1 > 0, it opens upward. The vertex x-coordinate is 
  -b/(2a) = 4/2 = 2, and f(2) = -1, so the vertex is (2, -1). The axis of 
  symmetry is x = 2. The x-intercepts come from x^2 - 4x + 3 = 0 = (x - 1)(x - 
  3), so they are (1, 0) and (3, 0). The y-intercept is f(0) = 3, so it is (0, 
  3).
difficulty: 0.62
difficulty_source: llm_estimate
tags:
  - parabolas
  - graphing
  - standard-form
  - intercepts
  - axis-of-symmetry
hints:
  - Start with the sign of a.
  - The vertex and axis share the same x-value.
  - For x-intercepts, set f(x) equal to zero. For the y-intercept, set x = 0.
hint_policy:
  max_useful_hints: 0
  fsrs_rating_cap_by_hint: {}
  mastery_alpha_dampening_by_hint: {}
  coverage_surface_dampening_by_hint: {}
