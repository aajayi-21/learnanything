  criteria:
    - id: identifies_a_b
      points: 0.75
      description: Correctly identifies a = -1 and b = -2.
    - id: uses_vertex_formula
      points: 1.0
      description: Uses x = -b/(2a) for the vertex x-coordinate.
    - id: computes_x_vertex
      points: 1.0
      description: Computes x = -1 correctly.
    - id: evaluates_y_vertex
      points: 1.0
      description: Substitutes x = -1 into the function and gets y = 2.
    - id: states_vertex_ordered_pair
      points: 0.25
      description: States the vertex as (-1, 2).
  fatal_errors:
    - id: wrong_sign_formula
      description: Uses b/(2a) as the vertex formula without correcting the 
        sign.
      max_grade: 3
    - id: reports_only_x_value
      description: Does not compute or report the y-coordinate of the vertex.
      max_grade: 3
