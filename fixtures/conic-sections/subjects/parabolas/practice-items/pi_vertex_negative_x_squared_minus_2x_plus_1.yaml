prompt: Find the vertex of f(x) = -x^2 - 2x + 1. Show the calculation for the 
  x-coordinate.
expected_answer: a = -1 and b = -2, so x = -b/(2a) = -(-2)/(2(-1)) = -1. Then 
  f(-1) = -(-1)^2 - 2(-1) + 1 = 2, so the vertex is (-1, 2).
