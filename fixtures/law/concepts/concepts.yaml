schema_version: 1
concepts:
  concept_civpro_forum_defendant_rule:
    title: Forum defendant rule in removal
    type: concept
    aliases:
      - in-state defendant removal bar
      - 28 USC 1441(b)(2)
    description: A diversity case otherwise removable may not be removed by a 
      properly joined and served defendant who is a citizen of the forum state.
    tags:
      - mbe
      - civil-procedure
    created_at: '2026-05-31T20:23:11Z'
    updated_at: '2026-05-31T20:23:11Z'
    id: concept_civpro_forum_defendant_rule
  concept_civpro_new_trial_instruction_error:
    title: New trial for prejudicial instruction error
    type: concept
    aliases:
      - erroneous jury instruction
      - substantial rights new trial
    description: A party may seek a new trial when an erroneous jury instruction
      affects substantial rights, even if judgment as a matter of law is 
      unavailable due to conflicting evidence.
    tags:
      - mbe
      - civil-procedure
    created_at: '2026-05-31T20:23:13Z'
    updated_at: '2026-05-31T20:23:13Z'
    id: concept_civpro_new_trial_instruction_error
  concept_conspiracy_feigned_agreement:
    title: Feigned agreement and conspiracy
    type: concept
    aliases:
      - unilateral conspiracy problem
      - common law conspiracy agreement
    description: At common law, conspiracy requires a genuine agreement between 
      at least two persons with criminal intent; a person who feigns agreement 
      to expose the crime lacks liability.
    tags:
      - mbe
      - criminal-law
    created_at: '2026-05-31T20:23:16Z'
    updated_at: '2026-05-31T20:23:16Z'
    id: concept_conspiracy_feigned_agreement
  concept_const_privileges_immunities_travel:
    title: Durational residency and right to travel
    type: concept
    aliases:
      - right to travel
      - Fourteenth Amendment privileges or immunities
    description: State durational residency requirements imposed solely to 
      reduce expenditures may violate constitutional protections for new 
      residents.
    tags:
      - mbe
      - constitutional-law
    created_at: '2026-05-31T20:23:18Z'
    updated_at: '2026-05-31T20:23:18Z'
    id: concept_const_privileges_immunities_travel
  concept_contracts_guardianship_void:
    title: Contracts by persons under guardianship
    type: concept
    aliases:
      - adjudicated incompetence contract
      - void incapacity contract
    description: A contract made by a person under guardianship for mental 
      incompetence is void, even if the person appears lucid and the other party
      lacks notice.
    tags:
      - mbe
      - contracts
    created_at: '2026-05-31T20:23:20Z'
    updated_at: '2026-05-31T20:23:20Z'
    id: concept_contracts_guardianship_void
  concept_contracts_modification_unanticipated:
    title: Modification for unanticipated circumstances
    type: concept
    aliases:
      - fair and equitable modification
      - Restatement 89 modification
    description: A contract modification may be enforceable without new 
      consideration if it is fair and equitable in view of unanticipated 
      circumstances.
    tags:
      - mbe
      - contracts
    created_at: '2026-05-31T20:23:22Z'
    updated_at: '2026-05-31T20:23:22Z'
    id: concept_contracts_modification_unanticipated
  concept_crim_depraved_heart_murder:
    title: Reckless murder and acceleration of death
    type: concept
    aliases:
      - depraved heart murder
      - causation acceleration of death
    description: Extremely reckless conduct showing disregard for human life can
      support murder, and causing a victim to die sooner can satisfy causation 
      even if death was otherwise expected.
    tags:
      - mbe
      - criminal-law
    created_at: '2026-05-31T20:23:23Z'
    updated_at: '2026-05-31T20:23:23Z'
    id: concept_crim_depraved_heart_murder
  concept_crim_self_defense_imperfect_belief:
    title: Self-defense instruction based on reasonable apparent danger
    type: concept
    aliases:
      - apparent necessity self-defense
      - mistaken self-defense belief
    description: A defendant is entitled to a self-defense instruction when 
      evidence could support a reasonable belief in imminent unlawful force, 
      even if the perceived danger was mistaken.
    tags:
      - mbe
      - criminal-law
    created_at: '2026-05-31T20:23:25Z'
    updated_at: '2026-05-31T20:23:25Z'
    id: concept_crim_self_defense_imperfect_belief
  concept_evidence_prior_inconsistent_oath:
    title: Prior inconsistent statements under oath
    type: concept
    aliases:
      - FRE 801(d)(1)(A)
      - grand jury prior inconsistent statement
    description: A witness's prior inconsistent statement given under oath at a 
      formal proceeding is admissible both for impeachment and substantively.
    tags:
      - mbe
      - evidence
    created_at: '2026-05-31T20:23:28Z'
    updated_at: '2026-05-31T20:23:28Z'
    id: concept_evidence_prior_inconsistent_oath
  concept_evidence_routine_practice:
    title: Routine practice evidence
    type: concept
    aliases:
      - habit evidence for organizations
      - FRE 406 routine practice
    description: Evidence of an organization's routine practice may be admitted 
      to show conduct in conformity on a particular occasion.
    tags:
      - mbe
      - evidence
    created_at: '2026-05-31T20:23:31Z'
    updated_at: '2026-05-31T20:23:31Z'
    id: concept_evidence_routine_practice
  concept_evidence_sequestration_party_rep:
    title: Witness sequestration and party representatives
    type: concept
    aliases:
      - Rule 615 representative exception
      - government case agent
    description: A party's designated representative, including a government 
      investigating agent, is exempt from witness exclusion even if the 
      representative will testify.
    tags:
      - mbe
      - evidence
    created_at: '2026-05-31T20:23:33Z'
    updated_at: '2026-05-31T20:23:33Z'
    id: concept_evidence_sequestration_party_rep
  concept_mortgage_assumption_release:
    title: Mortgage assumption and deficiency liability
    type: concept
    aliases:
      - assuming grantee liability
      - release of mortgagor
    description: A grantee who assumes a mortgage becomes personally liable on 
      the debt, and the lender's release of the original mortgagor does not 
      discharge the assuming grantee.
    tags:
      - mbe
      - real-property
    created_at: '2026-05-31T20:23:34Z'
    updated_at: '2026-05-31T20:23:34Z'
    id: concept_mortgage_assumption_release
  concept_first_amendment_content_based:
    title: Content-based speech restrictions
    type: concept
    aliases:
      - strict scrutiny speech
      - political speech regulation
    description: A law restricting speech based on subject matter or viewpoint, 
      especially political speech, must satisfy strict scrutiny.
    tags:
      - mbe
      - constitutional-law
      - first-amendment
    created_at: '2026-05-31T20:23:36Z'
    updated_at: '2026-05-31T20:23:36Z'
    id: concept_first_amendment_content_based
  concept_privacy_newsworthiness:
    title: Newsworthiness defense to privacy claims
    type: concept
    aliases:
      - public disclosure newsworthy matter
      - privacy tort newsworthiness
    description: Publication of truthful images or facts connected to a 
      newsworthy event generally defeats privacy liability, even if disclosure 
      causes embarrassment or economic harm.
    tags:
      - mbe
      - torts
    created_at: '2026-05-31T20:23:39Z'
    updated_at: '2026-05-31T20:23:39Z'
    id: concept_privacy_newsworthiness
  concept_property_fixtures:
    title: Fixtures in real-property conveyances
    type: concept
    aliases:
      - fixture test
      - attached chattels
    description: Personal property attached to real estate with sufficient 
      permanence and adaptation may become a fixture that passes with conveyance
      of the land.
    tags:
      - mbe
      - real-property
    created_at: '2026-05-31T20:23:42Z'
    updated_at: '2026-05-31T20:23:42Z'
    id: concept_property_fixtures
  concept_property_fsd_adverse_possession:
    title: Fee simple determinable and adverse possession
    type: concept
    aliases:
      - possibility of reverter adverse possession
      - commercial use condition breach
    description: When a fee simple determinable ends automatically on breach, 
      possession adverse to the holder of the possibility of reverter can ripen 
      into title after the limitations period.
    tags:
      - mbe
      - real-property
    created_at: '2026-05-31T20:23:43Z'
    updated_at: '2026-05-31T20:23:43Z'
    id: concept_property_fsd_adverse_possession
  concept_rule_11_safe_harbor:
    title: Rule 11 safe harbor
    type: concept
    aliases:
      - sanctions safe harbor
      - FRCP 11 motion procedure
    description: A Rule 11 sanctions motion generally must be served on the 
      opposing party and not filed unless the challenged paper is not withdrawn 
      or corrected within the safe-harbor period.
    tags:
      - mbe
      - civil-procedure
    created_at: '2026-05-31T20:23:46Z'
    updated_at: '2026-05-31T20:23:46Z'
    id: concept_rule_11_safe_harbor
  concept_scotus_state_court_federal_ground:
    title: Supreme Court review of state judgments
    type: concept
    aliases:
      - adequate and independent state grounds
      - certiorari from state court
    description: The U.S. Supreme Court may review a final state-court judgment 
      when the judgment rests on federal law and no adequate independent state 
      ground supports it.
    tags:
      - mbe
      - constitutional-law
      - federal-courts
    created_at: '2026-05-31T20:23:48Z'
    updated_at: '2026-05-31T20:23:48Z'
    id: concept_scotus_state_court_federal_ground
  concept_torts_known_danger_animals:
    title: Known dangerous animals and assumption of risk
    type: concept
    aliases:
      - vicious animal strict liability
      - assumption of risk animal attack
    description: An owner may be strictly liable for animals known to be 
      dangerous, but a plaintiff's knowing and voluntary exposure to the danger 
      can bar recovery.
    tags:
      - mbe
      - torts
    created_at: '2026-05-31T20:23:53Z'
    updated_at: '2026-05-31T20:23:53Z'
    id: concept_torts_known_danger_animals
  concept_torts_no_duty_ejection:
    title: Negligence duty after refusing service
    type: concept
    aliases:
      - tavern duty intoxicated patron
      - no breach public accommodation
    description: A business that refuses service and escorts out an intoxicated 
      person is not liable absent evidence that it breached a legal duty causing
      later injury.
    tags:
      - mbe
      - torts
    created_at: '2026-05-31T20:23:55Z'
    updated_at: '2026-05-31T20:23:55Z'
    id: concept_torts_no_duty_ejection
  concept_ucc_perfect_tender:
    title: Perfect tender rule
    type: concept
    aliases:
      - UCC buyer rejection
      - nonconforming goods
    description: In a sale of goods, a buyer generally may reject goods if they 
      fail in any respect to conform to the contract, subject to cure rules.
    tags:
      - mbe
      - contracts
      - ucc
    created_at: '2026-05-31T20:23:57Z'
    updated_at: '2026-05-31T20:23:57Z'
    id: concept_ucc_perfect_tender
