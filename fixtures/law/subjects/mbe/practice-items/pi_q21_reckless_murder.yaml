prompt: A drug-company president knowingly ships under-strength cancer 
  medication. A patient dies sooner than she would have with full-strength 
  medication, though she would have died soon anyway. Should a murder conviction
  be reversed?
expected_answer: B. No. A jury could find sufficiently reckless conduct for 
  murder, and accelerating death can satisfy causation.
