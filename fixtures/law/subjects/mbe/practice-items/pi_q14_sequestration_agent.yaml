prompt: In a federal criminal trial, witnesses are excluded. The government 
  designates the investigating agent as its representative, and the agent will 
  testify. Must the agent also be excluded?
expected_answer: B. No. The government may have its designated representative 
  remain in the courtroom throughout trial.
