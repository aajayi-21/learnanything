grading_rubric:
  max_points: 4
  criteria:
    - id: crit_corporate_citizenship
      points: 1.5
      description: Identifies that a corporation is a citizen of both its state 
        of incorporation and the state of its principal place of business, 
        making DeltaCo a State Y citizen.
    - id: crit_forum_defendant_rule
      points: 1.5
      description: Applies the forum defendant rule to conclude that an in-state
        defendant may not remove a diversity case filed in that forum state 
        court.
    - id: crit_correct_choice
      points: 1.0
      description: States the correct bottom-line result that removal is 
        improper despite diversity amount and otherwise diverse parties.
  fatal_errors:
    - id: fatal_treats_ppb_as_irrelevant
      description: Concludes removal is proper because DeltaCo is incorporated 
        outside the forum while ignoring principal-place-of-business 
        citizenship.
      max_grade: 2
    - id: fatal_omits_forum_defendant_rule
      description: Analyzes only ordinary diversity jurisdiction and does not 
        address the forum defendant removal bar.
      max_grade: 2
