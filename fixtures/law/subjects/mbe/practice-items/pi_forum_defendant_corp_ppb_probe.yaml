criterion_facet_weights: {}
prompt: A citizen of State X files a state-court negligence action in State Y 
  against DeltaCo, seeking $150,000. DeltaCo is incorporated in State Z and has 
  its headquarters and principal place of business in State Y. DeltaCo files a 
  notice of removal in federal court before any defendant has been served. In 
  one or two sentences, state whether removal is proper and explain why.
expected_answer: Removal is not proper. DeltaCo is a citizen of both State Z and
  State Y, and because State Y is the forum state, the forum defendant rule bars
  removal by an in-state defendant even though complete diversity and the amount
  in controversy are otherwise satisfied.
