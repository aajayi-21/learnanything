prompt: After an attorney files a weak age-discrimination complaint, the 
  defendant immediately files a Rule 11 sanctions motion without first giving a 
  chance to withdraw. Is the motion likely granted?
expected_answer: B. No. A party seeking Rule 11 sanctions must first serve the 
  motion and allow the safe-harbor period for withdrawal or correction before 
  filing it.
