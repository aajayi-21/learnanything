prompt: Land is conveyed so long as used residentially. A later owner uses it 
  commercially for more than the 10-year adverse possession period, then an heir
  continues commercial use. Can the original grantor recover possession?
expected_answer: A. No. The heir prevails with fee simple absolute because 
  adverse possession ran against the grantor after the determinable fee ended.
