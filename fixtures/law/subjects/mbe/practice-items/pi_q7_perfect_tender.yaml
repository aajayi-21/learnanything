prompt: A retailer orders posters of a golfer. Delivered posters reverse the 
  image so the golfer appears left-handed, although value is not significantly 
  affected. May the retailer reject?
expected_answer: C. Yes. Under the UCC perfect tender rule, the buyer may reject
  goods that do not conform to the contract.
