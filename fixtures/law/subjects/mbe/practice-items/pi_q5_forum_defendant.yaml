    - id: corporate_citizenship
      points: 1.0
      description: Identifies the corporation as a citizen of both incorporation
        and principal-place-of-business states.
    - id: forum_defendant_rule
      points: 2.0
      description: Applies the rule barring removal by a served forum-state 
        defendant in diversity.
  fatal_errors:
