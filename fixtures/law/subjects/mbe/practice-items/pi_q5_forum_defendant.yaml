criterion_facet_weights: {}
prompt: A State A plaintiff sues a corporation in State B state court for 
  $100,000. The corporation is incorporated in State C and has its principal 
  place of business in State B. It removes within 20 days. Was removal proper?
expected_answer: B. No. The corporation is a citizen of State B, the forum 
  state, so the forum defendant rule bars removal despite diversity and timely 
  filing.
difficulty: 0.5
difficulty_source: llm_estimate
