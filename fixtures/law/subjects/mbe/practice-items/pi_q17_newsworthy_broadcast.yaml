prompt: TV broadcasts passengers leaving a plane after a hijacking attempt. The 
  footage reveals a businessman's location, causing job loss and embarrassment. 
  Is his privacy claim likely to succeed?
expected_answer: D. No. The broadcast showed a newsworthy scene connected to a 
  public event.
