grading_rubric:
  max_points: 4
  criteria:
    - id: correct_choice
      points: 1.0
      description: Selects B or states that the instruction should be given.
    - id: apparent_danger_rule
      points: 2.0
      description: Explains that self-defense can rest on reasonable apparent 
        imminent danger, even if the danger was mistaken.
    - id: distinguish_wrong_answers
      points: 1.0
      description: Rejects actual-danger and excessive-force rationales as bars 
        to the instruction on these facts.
  fatal_errors:
    - id: requires_actual_danger
      description: Treats actual imminent danger as required before any 
        self-defense instruction may be given.
      max_grade: 2
