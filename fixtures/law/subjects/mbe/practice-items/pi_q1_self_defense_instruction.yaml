criterion_facet_weights: {}
prompt: A fearful parent kills an adult child entering after past abuse, 
  mistakenly believing an imminent beating is about to occur. Should the jury 
  receive a self-defense instruction? Choose the best answer and explain.
expected_answer: B. Give the instruction because the evidence is sufficient to 
  raise self-defense; actual danger is not required if the apparent danger could
  be found reasonable.
difficulty: 0.56
difficulty_source: llm_estimate
tags:
  - mbe
  - criminal-law
hints:
  - Ask whether the evidence permits a jury to find a reasonable belief in 
    imminent harm.
hint_policy:
