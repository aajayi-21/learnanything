schema_version: 1
concepts:
  concept_autonomic_dysreflexia_immediate_check:
    title: Autonomic dysreflexia immediate trigger check
    type: procedure
    aliases:
      - AD catheter blockage
      - autonomic dysreflexia management
      - SCI hypertensive emergency
    description: In a patient with high spinal cord injury, pounding headache, 
      restlessness, hypertension, and bradycardia suggest autonomic dysreflexia;
      immediate management includes identifying noxious triggers such as bladder
      distension or catheter blockage.
    tags:
      - physical-therapy
      - spinal-cord-injury
      - medical-emergency
    created_at: '2026-07-01T18:02:45Z'
    updated_at: '2026-07-01T18:02:54Z'
    id: concept_autonomic_dysreflexia_immediate_check
  concept_beta_blocker_rpe_exercise_monitoring:
    title: Use RPE when beta blockers blunt heart rate response
    type: concept
    aliases:
      - beta blocker exercise intensity
      - RPE cardiac rehab
      - propranolol exercise monitoring
    description: Because beta blockers can blunt heart rate response to 
      exercise, perceived exertion is often a more appropriate way to guide 
      exercise intensity outside supervised settings.
    tags:
      - physical-therapy
      - cardiopulmonary
      - exercise-prescription
    created_at: '2026-07-01T18:02:45Z'
    updated_at: '2026-07-01T18:02:55Z'
    id: concept_beta_blocker_rpe_exercise_monitoring
  concept_initial_paraplegia_gait_training_parallel_bars:
    title: Initial paraplegia gait training in parallel bars
    type: procedure
    aliases:
      - SCI first gait session
      - swing-to parallel bars
      - paraplegia gait training progression
    description: For an initial gait training session in paraplegia, parallel 
      bars and a more controlled swing-to pattern provide a safer starting point
      before progressing to crutches or swing-through gait.
    tags:
      - physical-therapy
      - spinal-cord-injury
      - gait-training
    created_at: '2026-07-01T18:02:45Z'
    updated_at: '2026-07-01T18:03:03Z'
    id: concept_initial_paraplegia_gait_training_parallel_bars
  concept_knee_extension_mobilization_tibial_glide:
    title: Anterior tibial glide for knee extension limitation
    type: procedure
    aliases:
      - knee extension mobilization
      - tibiofemoral anterior glide
      - grade III knee mobilization
    description: When tibiofemoral knee extension is limited, anterior glide of 
      the tibia on the femur at the limit of available motion is used to improve
      extension, commonly with small-amplitude oscillations into resistance for 
      stiffness.
    tags:
      - physical-therapy
      - orthopedics
      - joint-mobilization
    created_at: '2026-07-01T18:02:45Z'
    updated_at: '2026-07-01T18:03:06Z'
    id: concept_knee_extension_mobilization_tibial_glide
  concept_saddle_anesthesia_red_flag:
    title: Saddle anesthesia as a spine red flag
    type: concept
    aliases:
      - cauda equina red flag
      - perineal anesthesia
      - low back referral red flag
    description: Saddle anesthesia in a patient with low back pain is a serious 
      neurologic red flag suggesting possible cauda equina involvement and 
      warrants medical referral.
    tags:
      - physical-therapy
      - red-flags
      - lumbar-spine
    created_at: '2026-07-01T18:02:45Z'
    updated_at: '2026-07-01T18:02:58Z'
    id: concept_saddle_anesthesia_red_flag
  concept_lumbar_stenosis_neurogenic_claudication:
    title: Lumbar stenosis neurogenic claudication pattern
    type: concept
    aliases:
      - spinal stenosis leg pain
      - neurogenic claudication
      - stenosis downhill walking
    description: Lumbar spinal stenosis can present as bilateral posterior leg 
      aching with walking, often worse during lumbar extension-biased activities
      such as downhill walking, and relieved by sitting or flexion.
    tags:
      - physical-therapy
      - lumbar-spine
      - differential-diagnosis
    created_at: '2026-07-01T18:02:45Z'
    updated_at: '2026-07-01T18:02:56Z'
    id: concept_lumbar_stenosis_neurogenic_claudication
  concept_pvd_dependent_position_relief:
    title: Peripheral arterial disease pain relieved by dependency
    type: concept
    aliases:
      - PVD dependent relief
      - arterial insufficiency dependent position
      - claudication dependent relief
    description: In peripheral arterial disease, leg symptoms may improve when 
      the limb is placed in a dependent position because gravity assists 
      arterial perfusion.
    tags:
      - physical-therapy
      - vascular
      - differential-diagnosis
    created_at: '2026-07-01T18:02:46Z'
    updated_at: '2026-07-01T18:03:01Z'
    id: concept_pvd_dependent_position_relief
  concept_vestibular_gaze_stabilization_symptoms:
    title: Vestibular involvement with head-turn dizziness
    type: concept
    aliases:
      - vestibular dizziness
      - head-turn dizziness
      - gaze stabilization symptoms
    description: Dizziness or blurred vision that appears during gait with head 
      turns, but not when the head is still, suggests vestibular system 
      involvement rather than a primary visual, somatosensory, musculoskeletal, 
      or strength limitation.
    tags:
      - physical-therapy
      - vestibular
      - examination
    created_at: '2026-07-01T18:02:46Z'
    updated_at: '2026-07-01T18:02:57Z'
    id: concept_vestibular_gaze_stabilization_symptoms
