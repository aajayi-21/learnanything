criterion_facet_weights: {}
prompt: 'For a first gait-training session with a patient who has paraplegia and is
  just beginning upright ambulation practice, choose the most appropriate initial
  setup from these options and briefly name the two key features: A. walker with swing-through
  gait, B. parallel bars with swing-to gait, C. axillary crutches with four-point
  gait, D. body-weight-supported treadmill with reciprocal stepping.'
expected_answer: B. Parallel bars with a swing-to gait. The environment should 
  be the parallel bars for maximum initial support and control, and the initial 
  gait pattern should be swing-to rather than a faster or less controlled 
  pattern.
