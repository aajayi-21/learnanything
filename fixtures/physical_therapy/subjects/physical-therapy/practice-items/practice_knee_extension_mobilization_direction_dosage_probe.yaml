  criteria:
    - id: direction_anterior_tibial_glide
      points: 2.0
      description: Identifies anterior tibial glide on the femur as the 
        mobilization direction for improving knee extension.
    - id: dosage_end_range_small_amplitude
      points: 2.0
      description: Specifies small-amplitude oscillations at end range into 
        tissue resistance, appropriate for firm end-range stiffness rather than 
        midrange pain modulation.
  fatal_errors:
    - id: fatal_wrong_glide_direction
      description: Selects posterior tibial glide or another direction that 
        would not target the missing knee extension.
      max_grade: 2
