criterion_facet_weights: {}
prompt: A patient lacks the final 12 degrees of passive knee extension after 
  surgery. End feel is firm and symptoms occur mainly at the end of the 
  available range. Name the tibiofemoral glide direction you would use and the 
  mobilization dosage that best matches this presentation.
expected_answer: Glide the tibia anteriorly on the femur and use small-amplitude
  end-range oscillations into tissue resistance, such as grade III/IV dosing, to
  address firm end-range stiffness.
