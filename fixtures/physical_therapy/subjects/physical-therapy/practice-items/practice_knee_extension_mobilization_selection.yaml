prompt: Six weeks after knee arthroscopy, a patient has passive ROM from 20° of 
  flexion to 120° of flexion with firm pain at end range. Which tibiofemoral 
  mobilization direction and dosage would best target the missing extension?
expected_answer: Use small-amplitude end-range oscillations into tissue 
  resistance while gliding the tibia anteriorly on the femur.
