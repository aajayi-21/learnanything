prompt: A patient says leg aching begins after several minutes of standing or 
  walking upright, improves when leaning forward on a shopping cart, and eases 
  after sitting. What diagnosis pattern does this suggest, and what symptom 
  mechanism explains the posture-dependent relief?
expected_answer: Lumbar spinal stenosis with neurogenic claudication. Upright 
  standing and lumbar extension reduce the space available for neural structures
  and can provoke bilateral leg symptoms, while lumbar flexion or sitting opens 
  the canal/foramina enough to relieve symptoms.
