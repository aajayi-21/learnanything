schema_version: 1
error_types:
  - id: recall_failure
    title: Recall failure
    description: The learner could not retrieve the answer from memory, for 
      example an "I don't know" attempt. This is a retrieval lapse rather than a
      conceptual misunderstanding.
    related_concepts: []
    severity_default: 0.4
    is_misconception: false
    tags:
      - recall
    created_at: '2026-07-01T17:41:26Z'
    updated_at: '2026-07-01T17:41:26Z'
  - id: scaffold_failure
    title: Scaffold failure
    description: The learner could not reconstruct the answer after hints or 
      other support.
    related_concepts: []
    severity_default: 0.65
    is_misconception: false
    tags:
      - recall
      - scaffold
    created_at: '2026-07-01T17:41:26Z'
    updated_at: '2026-07-01T17:41:26Z'
  - id: arithmetic_slip
    title: Arithmetic slip
    description: The learner used the right concept but made a local numeric or 
      algebraic error.
    related_concepts: []
    severity_default: 0.15
    is_misconception: false
    tags:
      - calculation
    created_at: '2026-07-01T17:41:26Z'
    updated_at: '2026-07-01T17:41:26Z'
  - id: fatal_wrong_glide_direction
    title: Fatal Wrong Glide Direction
    description: The learner states the mobilization direction would be a 
      posterior glide, while the expected answer is anterior tibial glide for 
      extension.
    related_concepts:
      - concept_knee_extension_mobilization_tibial_glide
    severity_default: 1.0
    is_misconception: true
    tags:
      - grading_proposal
    created_at: '2026-07-01T18:51:39Z'
    updated_at: '2026-07-01T18:51:39Z'
