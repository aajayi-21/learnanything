prompt: Suppose the columns of Q form an orthonormal basis of eigenvectors for a
  matrix A, and D is the diagonal matrix of the corresponding eigenvalues. 
  Explain why A = QDQ^T.
expected_answer: Since the columns of Q are an eigenbasis, A = QDQ^{-1}. Because
  the columns are orthonormal, Q is orthogonal, so Q^{-1} = Q^T. Therefore A = 
  QDQ^T.
