prompt: 'In the setting of the Spectral Theorem, a student says: "Two eigenvectors
  are orthogonal because the matrix A is symmetric, meaning A^T = A." Give the precise
  dot-product condition that must be true for two vectors u and v to be orthogonal,
  and briefly explain why the statement confuses a property of vectors with a property
  of the matrix.'
expected_answer: Vectors u and v are orthogonal when u dot v = 0. The condition 
  A^T = A says that A is a symmetric matrix; it is not itself the definition of 
  two vectors being orthogonal. Symmetry of A can be used in a proof about 
  eigenvectors, but the orthogonality conclusion is the vector condition u dot v
  = 0.
