prompt: Let u1 and u2 be an orthonormal basis for R^2. Explain why the total 
  variance V of demeaned two-dimensional data equals V_u1 + V_u2, the sum of the
  variances of the projections onto the two basis directions.
expected_answer: Each demeaned data point d_j decomposes as (d_j dot u1)u1 + 
  (d_j dot u2)u2. Since u1 and u2 are orthonormal, the Pythagorean theorem gives
  |d_j|^2 = (d_j dot u1)^2 + (d_j dot u2)^2. Averaging over all data points 
  gives V = V_u1 + V_u2.
