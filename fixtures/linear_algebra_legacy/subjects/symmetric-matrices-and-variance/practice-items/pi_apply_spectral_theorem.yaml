prompt: Determine whether A = [[2, 5], [5, -7]] is orthogonally diagonalizable. 
  Justify your answer using the Spectral Theorem.
expected_answer: 'Yes. The matrix is symmetric because A^T = A: its off-diagonal entries
  are both 5. By the Spectral Theorem, a real matrix is orthogonally diagonalizable
  if and only if it is symmetric.'
