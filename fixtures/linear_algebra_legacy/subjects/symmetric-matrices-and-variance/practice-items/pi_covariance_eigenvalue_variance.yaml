prompt: Suppose C is the covariance matrix of a demeaned dataset. If u is a unit
  eigenvector of C with eigenvalue lambda, explain why the variance in direction
  u is lambda.
expected_answer: The directional variance is V_u = u dot C u. Since u is an 
  eigenvector, C u = lambda u. Therefore V_u = u dot (lambda u) = lambda (u dot 
  u). Because u has unit length, u dot u = 1, so V_u = lambda.
