prompt: For the demeaned data points d1 = (-1,-1), d2 = (0,-1), d3 = (1,2), form
  the demeaned data matrix A with these points as columns. Compute C = 
  (1/3)AA^T, then compute the variance in the unit direction u = (1/sqrt(5), 
  2/sqrt(5)) using V_u = u dot C u.
expected_answer: A = [[-1,0,1],[-1,-1,2]]. Then AA^T = [[2,3],[3,6]], so C = 
  [[2/3,1],[1,2]]. For u = (1/sqrt(5),2/sqrt(5)), V_u = u^T C u = (2/3)(1/5) + 
  2(1)(2/5) + 2(4/5) = 38/15.
