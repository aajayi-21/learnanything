prompt: Let q1 and q2 be orthonormal eigenvectors of a 2 by 2 matrix A, with Aq1
  = 3q1 and Aq2 = -q2. Define Q = [q1 q2] and D = [[3, 0], [0, -1]]. In two or 
  three sentences, explain why Q^T A Q = D and then state the equivalent formula
  for A.
expected_answer: 'Because q1 and q2 are eigenvectors, multiplying A by Q gives AQ
  = QD: each column is scaled by its eigenvalue. Since q1 and q2 are orthonormal,
  Q is orthogonal, so Q^{-1} = Q^T, which gives Q^T A Q = D. Equivalently, A = Q D
  Q^T.'
