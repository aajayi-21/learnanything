schema_version: 1
concepts:
  concept_covariance_matrix:
    title: Covariance Matrix of Demeaned Data
    type: concept
    aliases:
      - C = 1/N AA^T
      - data covariance matrix
    description: For a demeaned data matrix A with data points as columns, the 
      covariance matrix is C = (1/N)AA^T; it is symmetric and determines 
      directional variances by V_u = u dot C u for unit vectors u.
    tags:
      - linear-algebra
      - data
      - variance
      - symmetric-matrices
    created_at: '2026-05-26T00:00:25Z'
    updated_at: '2026-05-26T00:00:57Z'
    id: concept_covariance_matrix
  concept_orthogonal_diagonalization:
    title: Orthogonal Diagonalization
    type: concept
    aliases:
      - orthogonally diagonalizable
      - A = QDQ^T
    description: A diagonalization A = QDQ^T in which Q is an orthogonal matrix 
      whose columns form an orthonormal basis of eigenvectors and D contains the
      corresponding eigenvalues.
    tags:
      - linear-algebra
      - eigenvectors
      - orthogonality
    created_at: '2026-05-26T00:00:25Z'
    updated_at: '2026-05-26T00:01:03Z'
    id: concept_orthogonal_diagonalization
  concept_spectral_theorem_real_symmetric:
    title: Spectral Theorem for Real Symmetric Matrices
    type: concept
    aliases:
      - spectral theorem
      - symmetric iff orthogonally diagonalizable
    description: A real matrix is orthogonally diagonalizable if and only if it 
      is symmetric.
    tags:
      - linear-algebra
      - theorem
      - symmetric-matrices
    created_at: '2026-05-26T00:00:25Z'
    updated_at: '2026-05-26T00:01:06Z'
    id: concept_spectral_theorem_real_symmetric
  concept_variance_additivity:
    title: Additivity of Variance Across Orthonormal Directions
    type: concept
    aliases:
      - variance additivity
      - Pythagorean variance decomposition
    description: When a subspace has an orthonormal basis, the variance of 
      projected data onto the subspace is the sum of the variances in those 
      basis directions.
    tags:
      - linear-algebra
      - variance
      - orthogonality
      - projection
    created_at: '2026-05-26T00:00:25Z'
    updated_at: '2026-05-26T00:01:11Z'
    id: concept_variance_additivity
  concept_symmetric_matrix:
    title: Symmetric Matrix
    type: concept
    aliases:
      - self-adjoint real matrix
      - A equals A transpose
    description: A square real matrix satisfying A = A^T.
    tags:
      - linear-algebra
      - matrices
      - spectral-theorem
    created_at: '2026-05-26T00:01:09Z'
    updated_at: '2026-05-26T00:01:09Z'
    id: concept_symmetric_matrix
