schema_version: 1
concepts:
  concept_transformer_architecture:
    title: Transformer architecture
    type: concept
    aliases:
      - Transformer
      - attention-only sequence transduction model
    description: A sequence transduction architecture that uses stacked 
      self-attention and position-wise feed-forward layers in an encoder-decoder
      structure, dispensing with recurrence and convolution.
    tags:
      - attn
      - transformer
      - sequence-transduction
    created_at: '2026-05-28T21:15:29Z'
    updated_at: '2026-05-28T21:15:29Z'
    id: concept_transformer_architecture
  concept_multihead_attention:
    title: Multi-Head Attention
    type: concept
    aliases:
      - multiheaded attention
      - attention block
      - concept_multi_head_attention
      - Multi-head attention
      - attention heads
      - parallel attention heads
    description: A transformer attention block that runs many attention heads in
      parallel, each with distinct Q/K/V maps, then combines their proposed 
      embedding updates.
    tags:
      - attn
      - transformers
      - parallelism
      - attention
      - transformer
    created_at: '2026-05-28T21:29:08Z'
    updated_at: '2026-05-28T21:31:16Z'
    id: concept_multihead_attention
  concept_query_key:
    title: Queries And Keys
    type: concept
    aliases:
      - query vectors
      - key vectors
      - QK scores
    description: Lower-dimensional vectors computed from embeddings; query-key 
      dot products measure how relevant one token is to another for attention.
    tags:
      - attn
      - qkv
      - transformers
    created_at: '2026-05-28T21:31:38Z'
    updated_at: '2026-05-28T21:31:38Z'
    id: concept_query_key
  concept_value_vectors:
    title: Value Vectors
    type: concept
    aliases:
      - value matrix
      - value projection
      - V vectors
    description: Vectors derived from token embeddings that carry the 
      information to be added to other embeddings, scaled by attention weights.
    tags:
      - attn
      - qkv
      - transformers
    created_at: '2026-05-28T21:31:46Z'
    updated_at: '2026-05-28T21:31:46Z'
    id: concept_value_vectors
  concept_contextual_embedding:
    title: Contextual Embedding
    type: concept
    aliases:
      - refined embedding
      - context-rich embedding
    description: A token vector after transformer layers have incorporated 
      information from surrounding tokens, so it represents more than the 
      token's standalone meaning.
    tags:
      - attn
      - transformers
      - embeddings
    created_at: '2026-05-28T21:31:51Z'
    updated_at: '2026-05-28T21:31:51Z'
    id: concept_contextual_embedding
  concept_attention_head:
    title: Single Attention Head
    type: concept
    aliases:
      - self-attention head
      - attention head
    description: A transformer subcomponent that forms queries, keys, and values
      from embeddings, scores token relevance, and produces proposed embedding 
      updates.
    tags:
      - attn
      - transformers
      - self-attention
    created_at: '2026-05-28T21:31:54Z'
    updated_at: '2026-05-28T21:31:54Z'
    id: concept_attention_head
  concept_attention_pattern:
    title: Attention Pattern
    type: concept
    aliases:
      - attention weights
      - softmax attention grid
    description: The normalized grid of weights produced from scaled query-key 
      dot products, indicating how much each token contributes to updating each 
      other token.
    tags:
      - attn
      - softmax
      - transformers
    created_at: '2026-05-28T21:31:58Z'
    updated_at: '2026-05-28T21:31:58Z'
    id: concept_attention_pattern
  concept_causal_mask:
    title: Causal Masking
    type: concept
    aliases:
      - attention mask
      - autoregressive mask
    description: A masking step that prevents later tokens from influencing 
      earlier tokens by setting forbidden attention logits to negative infinity 
      before softmax.
    tags:
      - attn
      - gpt
      - training
    created_at: '2026-05-28T21:32:01Z'
    updated_at: '2026-05-28T21:32:01Z'
    id: concept_causal_mask
  concept_positional_encoding:
    title: Positional encoding
    type: concept
    aliases:
      - sinusoidal positional encoding
      - position embeddings
    description: Information added to token embeddings so an attention-only 
      model can use sequence order; the paper uses sinusoidal encodings and 
      compares them with learned positional embeddings.
    tags:
      - attn
      - transformer
      - position
    created_at: '2026-05-28T21:32:55Z'
    updated_at: '2026-05-28T21:32:55Z'
    id: concept_positional_encoding
  concept_scaled_dot_product_attention:
    title: Scaled dot-product attention
    type: procedure
    aliases:
      - scaled attention
      - QK attention
    description: An attention computation that scores queries against keys with 
      dot products, scales the scores by the key dimension factor, applies 
      softmax, and uses the result to weight values.
    tags:
      - attn
      - attention
      - transformer
    created_at: '2026-05-28T21:32:58Z'
    updated_at: '2026-05-28T21:32:58Z'
    id: concept_scaled_dot_product_attention
  concept_self_attention_advantages:
    title: Self-attention advantages
    type: concept
    aliases:
      - why self-attention
      - parallel attention benefits
    description: The Transformer motivates self-attention by comparing 
      computational complexity, parallelizability, and maximum path length for 
      long-range dependencies against recurrent and convolutional layers.
    tags:
      - attn
      - self-attention
      - model-comparison
    created_at: '2026-05-28T21:33:01Z'
    updated_at: '2026-05-28T21:33:01Z'
    id: concept_self_attention_advantages
  concept_autoregressive_decoder_masking:
    title: Autoregressive decoder masking
    type: procedure
    aliases:
      - causal masking
      - future-token masking
    description: A decoder self-attention mask that prevents a position from 
      attending to subsequent positions so predictions depend only on earlier 
      known outputs.
    tags:
      - attn
      - transformer
      - decoder
    created_at: '2026-05-28T21:33:05Z'
    updated_at: '2026-05-28T21:33:05Z'
    id: concept_autoregressive_decoder_masking
