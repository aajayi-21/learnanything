prompt: The source says GPT-3 was trained with a context size of 2048. What does
  context size limit, and why can this make long conversations feel like the 
  model is losing the thread?
expected_answer: Context size is the fixed number of token vectors the network 
  can process at once. It limits how much previous text can be incorporated when
  predicting the next token, so material outside that window cannot directly 
  inform the prediction, making long conversations feel as if earlier context 
  has been lost.
