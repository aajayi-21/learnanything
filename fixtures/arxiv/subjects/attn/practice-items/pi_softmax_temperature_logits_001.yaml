prompt: A language model produces logits for possible next tokens before 
  sampling. What are logits, and what does softmax change about them so they can
  be used as a next-token distribution?
expected_answer: Logits are raw, unnormalized scores for candidate next tokens. 
  Softmax exponentiates and normalizes those scores into nonnegative 
  probabilities that sum to 1, so they can be interpreted as a probability 
  distribution for sampling or choosing the next token.
