prompt: Suppose a query vector has a high positive dot product with key A, a 
  near-zero dot product with key B, and a negative dot product with key C. In 
  plain language, rank the keys by compatibility with the query and explain the 
  alignment idea behind your ranking.
expected_answer: Key A is most compatible because a high positive dot product 
  indicates strong alignment with the query. Key B is roughly neutral because a 
  near-zero dot product indicates little directional alignment. Key C is least 
  compatible because a negative dot product suggests it points against the query
  in the relevant vector dimensions.
