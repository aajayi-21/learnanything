prompt: 'Imagine two Transformer inputs contain the same token embeddings but in different
  orders. The self-attention block has no recurrence, no convolution, and no positional
  signal added. What information about order is missing from the computation? Then
  compare learned positional embeddings with sinusoidal positional encodings in the
  original paper: how did their performance compare, and why was the sinusoidal version
  still attractive for longer sequences?'
expected_answer: Without recurrence, convolution, or added positional signals, 
  self-attention has no built-in way to know token order from the embeddings 
  alone. Learned positional embeddings performed nearly the same as sinusoidal 
  encodings in the paper's experiments. Sinusoidal encodings were attractive 
  because their fixed pattern may allow the model to handle or extrapolate to 
  sequence lengths longer than those seen during training.
