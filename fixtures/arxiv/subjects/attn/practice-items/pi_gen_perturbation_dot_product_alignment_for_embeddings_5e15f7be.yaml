prompt: "For the learning object \"Interpret Dot Products As Vector Alignment,\" treat
  these three feature-weight rows as embedding vectors:\n\n| item | novelty | rigor
  | speed |\n|---|---:|---:|---:|\n| query q | 2 | -1 | 3 |\n| note A | 1 | 4 | 0
  |\n| note B | 3 | -2 | 1 |\n\nUsing dot product alignment, compute q . A and q .
  B. Which note is more aligned with the query, and why does this table-style representation
  not change the alignment interpretation?"
expected_answer: q . A = -2 and q . B = 11, so note B is more aligned with q. 
  The representation as named feature columns does not change the 
  multiply-then-sum dot product; the larger positive score indicates stronger 
  same-direction alignment.
