prompt: A model has next-token logits where one token is clearly highest. As 
  temperature approaches 0, what happens to the softmax distribution? Explain 
  why this resembles argmax while still referring to probabilities.
expected_answer: As temperature approaches 0, dividing logits by a tiny 
  temperature greatly amplifies the gaps between them. Softmax puts probability 
  approaching 1 on the highest-logit token and probability approaching 0 on the 
  others. This resembles argmax because the highest-logit token is effectively 
  selected, but it is described as a limiting probability distribution.
