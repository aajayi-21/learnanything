prompt: Softmax has already produced attention weights [0.75, 0.25] over value 
  vectors v1 = [2, 0] and v2 = [0, 4]. Compute the attention output and explain 
  why this step uses values rather than keys.
expected_answer: The output is 0.75*[2,0] + 0.25*[0,4] = [1.5, 1]. This step 
  uses values because the attention weights decide how much information/content 
  to take from each position; keys were used earlier only to compute 
  compatibility with the query.
