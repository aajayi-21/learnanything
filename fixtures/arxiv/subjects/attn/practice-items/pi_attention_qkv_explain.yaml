prompt: In the Transformer paper’s attention formulation, what roles do the 
  query, keys, and values play when computing an attention output?
expected_answer: A query is compared with each key by a compatibility function 
  to produce weights; those weights are normalized and used to form a weighted 
  sum of the corresponding values, producing the attention output.
