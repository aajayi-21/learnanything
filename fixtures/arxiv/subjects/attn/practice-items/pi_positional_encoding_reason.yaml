prompt: Why does the Transformer add positional encodings to token embeddings, 
  and why did the paper choose sinusoidal encodings as the main version?
expected_answer: Because the model has no recurrence or convolution, token order
  is not otherwise built into the architecture, so positional information must 
  be added to embeddings. The paper uses sinusoidal encodings because they may 
  let the model learn relative positions and extrapolate to sequence lengths 
  longer than those seen during training, while learned positional embeddings 
  performed nearly identically in experiments.
