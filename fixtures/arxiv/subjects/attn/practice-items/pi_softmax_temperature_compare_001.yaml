prompt: For the same logits, compare a low-temperature softmax with a 
  high-temperature softmax. Which one is more peaked, which one is more uniform,
  and how does that affect sampling variability?
expected_answer: Low temperature makes the distribution more peaked, increasing 
  probability on the highest-logit tokens and lowering probability on weaker 
  tokens. High temperature makes the distribution more uniform, giving 
  lower-scoring tokens more chance. Sampling is usually less variable at low 
  temperature and more variable at high temperature.
