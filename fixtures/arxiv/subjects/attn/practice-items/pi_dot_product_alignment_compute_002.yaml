prompt: Compute a . b and a . c for a = [2, -1], b = [4, 2], and c = [-1, 3]. 
  Which vector is more aligned with a, and what does the sign of the other dot 
  product suggest?
expected_answer: a . b = 2*4 + (-1)*2 = 6. a . c = 2*(-1) + (-1)*3 = -5. b is 
  more aligned with a because it has the larger positive dot product. The 
  negative dot product with c suggests c points more against a than with it.
