prompt: Compute the dot products a . b and a . c for a = [1, 2], b = [3, 4], and
  c = [-2, 1]. Which vector, b or c, is more aligned with a according to the 
  dot-product intuition in the source?
expected_answer: a . b = 1*3 + 2*4 = 11. a . c = 1*(-2) + 2*1 = 0. b is more 
  aligned with a because it has the larger positive dot product, while c is 
  perpendicular to a in this example.
