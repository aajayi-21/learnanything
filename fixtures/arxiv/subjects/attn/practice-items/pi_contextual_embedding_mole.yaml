prompt: Why would the initial embedding for the word 'mole' be the same in 
  'American shrew mole', 'one mole of carbon dioxide', and 'biopsy of the mole',
  and what is attention supposed to change about it?
expected_answer: 'The initial token embedding is effectively a lookup for the token
  itself, so it has no access to the surrounding words and starts the same in all
  three phrases. Attention lets surrounding embeddings pass information into it so
  the vector moves toward a context-specific meaning: animal, chemistry amount, or
  skin mark.'
