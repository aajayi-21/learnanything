      points: 1.0
      description: Mentions that the model produces a probability distribution 
        over possible next tokens.
    - id: mentions_sampling
      points: 1.0
      description: Mentions sampling or choosing a token from that distribution.
    - id: mentions_append
      points: 1.0
      description: Mentions appending the selected token to the existing text.
    - id: mentions_repeat
      points: 1.0
      description: Mentions repeating the prediction process using the updated 
