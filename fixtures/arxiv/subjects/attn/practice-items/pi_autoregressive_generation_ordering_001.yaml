prompt: A model has just produced a probability distribution over possible next 
  tokens for a seed text. In one or two sentences, describe how this prediction 
  model can generate a longer passage.
expected_answer: Sample one token from the predicted distribution, append that 
  token to the text, then run the model again on the updated text to produce the
  next distribution; repeating this loop generates a longer passage.
difficulty: 0.38
difficulty_source: llm_estimate
tags:
  - autoregressive_generation
  - next_token_prediction
hints:
  - The source describes a loop, not a one-time prediction.
  - After choosing a token, the model uses the text including that new token.
