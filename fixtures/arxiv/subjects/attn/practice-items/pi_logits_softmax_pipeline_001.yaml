prompt: In the source's vocabulary, what are logits, and why is softmax applied 
  to them before sampling a next token?
expected_answer: Logits are the raw, unnormalized output scores produced after 
  the final multiplication with the unembedding matrix. Softmax is applied 
  because those raw numbers may be negative, larger than 1, and not sum to 1; 
  softmax converts them into a valid probability distribution for sampling or 
  choosing a next token.
