prompt: If a self-attention pattern stores one score for every pair of positions
  in a context, what happens to the number of attention scores when the context 
  length doubles, and why does this matter?
expected_answer: The number of scores grows by a factor of four, because the 
  attention pattern has size proportional to context length squared. This 
  matters because memory and computation for attention can become a bottleneck 
  when increasing context windows.
