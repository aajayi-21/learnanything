evidence_weights: {}
criterion_facet_weights: {}
prompt: 'Compare self-attention with recurrent and convolutional layers using the
  paper’s three motivation criteria: computational complexity, parallelization, and
  path length for long-range dependencies.'
expected_answer: The paper evaluates layers by per-layer computational 
  complexity, how much computation can be parallelized, and maximum path length 
  between positions. Self-attention connects all positions with a constant 
  number of sequential operations and short paths, which helps long-range 
  dependency learning. Recurrent layers impose sequential computation across 
  positions. Convolutional layers can parallelize better than recurrence but 
  need stacks or dilation to connect distant positions, increasing maximum path 
  length; they can also be more expensive depending on kernel width and 
  separability.
difficulty: 0.68
difficulty_source: llm_estimate
tags:
  - attn
  - self-attention
  - comparison
hints:
  - The paper’s comparison is not just about speed; include path length.
  - Separate parallelization from total arithmetic cost.
hint_policy:
  max_useful_hints: 0
  fsrs_rating_cap_by_hint: {}
