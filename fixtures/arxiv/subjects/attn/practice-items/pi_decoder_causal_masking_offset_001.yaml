prompt: During training, a decoder is given shifted target inputs so each 
  position is used to predict the next token. Why is causal masking still needed
  even though the inputs are offset?
expected_answer: Offsetting sets up the next-token prediction target, but 
  without causal masking a decoder self-attention layer could still look at 
  later target positions that contain answers for other steps. The mask ensures 
  each position's computation only uses the current and previous shifted inputs,
  preserving the autoregressive training condition.
