prompt: In decoder self-attention over the target tokens [A, B, C, D], which 
  token positions may the representation at position C attend to under causal 
  masking? Briefly explain why D is treated differently.
expected_answer: Position C may attend to A, B, and C, but not D. The causal 
  mask allows the current and previous target positions while blocking future 
  positions so the decoder cannot use tokens that should not be known yet.
