prompt: In scaled dot-product attention, explain the different jobs of queries, 
  keys, and values. Your answer should say which vectors determine the attention
  weights and which vectors are mixed to produce the output.
expected_answer: 'Queries and keys determine attention weights: each query is compared
  with keys using dot products, the scores are scaled, and softmax turns them into
  weights. Values carry the information that gets mixed; the output is the weighted
  sum of value vectors using those attention weights.'
