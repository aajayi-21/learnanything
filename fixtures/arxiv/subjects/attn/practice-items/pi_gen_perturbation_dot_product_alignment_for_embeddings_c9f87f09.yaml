prompt: "In a scaled dot-product attention setup, a query is written as a row vector
  q = [1, -2, 2]. Two keys are stored as columns of a key matrix:\n\nK = [[3, -1],
  [1, 4], [-2, 0]]\n\nUse the alignment_interpretation facet of dot products to compute
  qK, treating each column as one key. Which key column is more compatible with the
  query, and what does the sign of each score indicate?"
expected_answer: qK = [-3, -9]. Key column 1 is more compatible because -3 is 
  greater than -9, but both scores are negative, so both keys point against the 
  query overall rather than aligning with it.
