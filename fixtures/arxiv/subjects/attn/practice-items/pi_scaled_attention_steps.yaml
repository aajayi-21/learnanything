prompt: Put the main operations of scaled dot-product attention in order, 
  starting from queries, keys, and values.
expected_answer: Compute query-key dot products; scale the scores by the square 
  root of the key dimension; apply softmax to obtain attention weights; multiply
  the weights by the values to produce the output.
