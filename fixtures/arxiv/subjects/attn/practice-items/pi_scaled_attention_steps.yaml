grading_rubric:
  max_points: 4
  criteria:
    - id: dot_products
      points: 0.8
      description: Includes dot products between queries and keys.
    - id: scaling
      points: 0.8
      description: Includes scaling by the key-dimension factor.
    - id: softmax
      points: 0.8
      description: Includes softmax normalization.
    - id: value_weighting
      points: 0.8
      description: Includes weighting values to compute outputs.
    - id: correct_order
      points: 0.8
      description: Orders the steps correctly.
  fatal_errors:
