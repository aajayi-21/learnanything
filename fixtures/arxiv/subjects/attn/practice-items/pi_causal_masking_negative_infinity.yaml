prompt: In GPT-style attention, why are forbidden future-token scores set to 
  negative infinity before softmax instead of simply setting their final weights
  to zero first?
expected_answer: The model must prevent later tokens from influencing earlier 
  positions. Setting the forbidden logits to negative infinity before softmax 
  makes their softmax weights become zero while the allowed entries are still 
  renormalized to add up to one. Simply zeroing entries directly would disrupt 
  the normalization unless followed by an additional normalization step.
