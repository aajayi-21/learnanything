prompt: Two embedding directions are x = [3, 1] and y = [1, -3]. Compute x . y. 
  If this dot product appeared as an attention compatibility score before other 
  transformations, what would the score say about alignment?
expected_answer: x . y = 3*1 + 1*(-3) = 0. A zero dot product means the vectors 
  are neither positively aligned nor negatively opposed in this simple alignment
  sense; the compatibility evidence from their direction is neutral before 
  scaling and softmax.
