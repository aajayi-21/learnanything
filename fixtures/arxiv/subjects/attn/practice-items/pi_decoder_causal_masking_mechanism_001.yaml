prompt: A decoder attention row has raw scores for positions 1 through 4, but 
  position 4 is future information for the current token. Describe what the mask
  changes before softmax and what effect that has after softmax.
expected_answer: The mask changes the forbidden future score so it is 
  effectively negative infinity or otherwise impossible before softmax. After 
  softmax, that position gets probability/attention weight 0, and the remaining 
  probability mass is normalized over only the allowed current and past 
  positions.
