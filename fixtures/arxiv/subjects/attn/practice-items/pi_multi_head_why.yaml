prompt: Why does the Transformer use multi-head attention instead of a single 
  attention head with the full model dimension?
expected_answer: Multi-head attention lets the model attend jointly to 
  information from different representation subspaces and different positions. 
  Each head works in a reduced dimension, so the total computation can remain 
  similar to full-dimensional single-head attention, while avoiding the 
  averaging limitation of a single head.
