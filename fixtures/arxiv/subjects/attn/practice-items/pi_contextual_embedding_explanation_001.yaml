prompt: Why is a token vector near the end of a transformer not merely the 
  original embedding of that token? Answer using the source's idea of context.
expected_answer: At the start, the vector is just pulled from the embedding 
  matrix for that token, so it mainly represents the token itself. As it passes 
  through attention and other transformer blocks, it can incorporate information
  from surrounding tokens, becoming a richer contextual embedding.
