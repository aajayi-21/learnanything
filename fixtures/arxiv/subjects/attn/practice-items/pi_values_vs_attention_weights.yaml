evidence_weights: {}
criterion_facet_weights: {}
prompt: In one attention head, what different roles do the attention pattern and
  the value vectors play when updating the embedding for a token such as 
  'creature'?
expected_answer: The attention pattern supplies the weights saying which source 
  tokens are relevant to updating 'creature' and by how much. The value vectors,
  produced by applying the value matrix to embeddings such as 'fluffy' and 
  'blue', contain the actual update directions or information to add. The update
  is a weighted sum of value vectors for that column, then added to the original
  embedding.
difficulty: 0.6
difficulty_source: llm_estimate
tags:
