prompt: Why does a transformer attention block run many attention heads in 
  parallel instead of relying on a single head?
expected_answer: Different heads can learn different query, key, and value maps,
  so they can capture different kinds of contextual relationships and propose 
  different updates to each token's embedding. Running them in parallel gives 
  the model capacity to represent many ways that context changes meaning, and 
  the resulting proposed changes are combined for each position.
