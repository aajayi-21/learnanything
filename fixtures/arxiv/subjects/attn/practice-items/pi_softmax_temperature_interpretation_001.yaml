prompt: A next-token sampler uses softmax with temperature. What happens to the 
  output distribution when temperature is increased? What happens when it is 
  decreased toward zero?
expected_answer: Increasing temperature gives relatively more weight to 
  lower-logit tokens, making the distribution more uniform and sampling less 
  predictable. Decreasing temperature makes the highest-logit tokens dominate 
  more strongly; in the limit near zero, all weight goes to the maximum value.
