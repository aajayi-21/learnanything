prompt: For one query q = [1, 1, 0, 0] and two keys k1 = [1, 1, 0, 0], k2 = [1, 
  -1, 0, 0], compute the raw dot products and the scaled scores when d_k = 4. 
  Then name the next two operations in scaled dot-product attention.
expected_answer: The raw dot products are q.k1 = 2 and q.k2 = 0. Since sqrt(d_k)
  = 2, the scaled scores are [1, 0]. Next, apply softmax to turn the scaled 
  scores into attention weights, then use those weights to form a weighted sum 
  of the value vectors.
