prompt: Compare the embedding matrix W_E and the unembedding matrix W_U in a 
  GPT-style transformer. What direction does each mapping go?
expected_answer: The embedding matrix W_E maps each vocabulary token to its 
  initial vector, often by selecting the column for that token. The unembedding 
  matrix W_U maps a final context-rich vector back to one raw score or logit for
  each vocabulary token before softmax.
