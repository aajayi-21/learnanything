prompt: An implementation caches every prior query, key, and value vector and 
  recomputes all prior keys and values for each new token. Diagnose both errors.
  Then state the factors needed to estimate the corrected cache memory.
expected_answer: Prior queries should not be persistent cache entries, and prior
  keys and values should be reused rather than recomputed. Correct cache memory 
  depends on cached key-plus-value dimensionality, bytes per element, number of 
  distinct KV heads or groups, layer count, and cached sequence length.
