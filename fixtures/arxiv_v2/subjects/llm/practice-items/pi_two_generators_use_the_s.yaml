prompt: Two generators use the same model and seed. Generator A uses a lower 
  temperature; Generator B uses a higher temperature. Describe the generation 
  loop both execute, then compare their likely next-token distributions and 
  explain why higher temperature is not a guarantee of better text.
expected_answer: Both repeatedly predict a next-token distribution from the 
  current sequence, sample a token, append it, and predict again from the 
  expanded sequence. Lower temperature sharpens the distribution around the 
  largest logits, while higher temperature gives lower-valued logits relatively 
  more weight and increases unpredictability. That may increase variety but can 
  also reduce coherence, so it does not guarantee better text.
