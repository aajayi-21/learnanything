evidence_weights: {}
criterion_facet_weights: {}
prompt: "Given a new next-token table containing the correct token, the model's top
  prediction, and the probability assigned to the correct token at each scored position:
  compute every token cross-entropy, average the token losses, identify the highest-
  and lowest-loss positions, and explain a possible framework mismatch by checking
  token inclusion and label shifting."
expected_answer: Each token loss equals -ln(P_correct); the example loss is the 
  arithmetic mean of the included token losses; extrema are explained by inverse
  probability-loss behavior; any mismatch diagnosis refers to scoring positions 
  rather than substituting top-token probabilities.
