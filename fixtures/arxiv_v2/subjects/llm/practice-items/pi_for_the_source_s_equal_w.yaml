prompt: For the source's equal-width ReLU architecture, compute the theoretical 
  maximum region count when D=2 neurons per layer, D_i=2 inputs, and K=2 hidden 
  layers. Then compute the shallow K=1 maximum when D=8 and D_i=2. Show 
  substitutions, state whether the output layer is included in K, and explain 
  why neither result predicts the number of regions training will realize.
expected_answer: "For D=2, D_i=2, K=2: N_r=((2/2)+1)^(2(2-1))((2^2+2+2)/2)=2^2·4=16.
  K counts hidden layers and excludes the output layer. For the shallow case K=1,
  the exponential factor cancels and N_r=(8^2+8+2)/2=74/2=37. Both values are theoretical
  maxima under the formula's assumptions, not expected or guaranteed learned counts;
  for example, the illustrated D=2, K=2 network learned ten rather than sixteen regions."
