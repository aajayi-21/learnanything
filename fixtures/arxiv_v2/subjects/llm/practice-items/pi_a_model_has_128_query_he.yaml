prompt: A model has 128 query heads. Compare the number of distinct cached KV 
  representations per token and layer for standard MHA, MQA, and GQA with 16 KV 
  groups. State the cache-reduction factors relative to MHA and recommend a 
  variant when some head-specific KV capacity must be retained under a reduced 
  cache budget.
expected_answer: MHA caches 128 distinct KV representations, MQA caches 1, and 
  16-group GQA caches 16. Relative to MHA, MQA reduces this component by 128 
  times and GQA by 8 times. GQA is the appropriate compromise when more than one
  KV representation is required but full MHA storage is too costly.
