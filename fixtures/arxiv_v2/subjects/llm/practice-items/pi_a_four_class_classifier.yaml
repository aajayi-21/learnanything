prompt: A four-class classifier receives two features x_1 and x_2. Write the 
  indexed affine score for class i, determine the total number of slopes and 
  biases, and explain whether applying softmax moves an argmax decision 
  boundary.
expected_answer: h_i=m_{i1}x_1+m_{i2}x_2+b_i. Four classes require eight slopes 
  and four biases, for twelve parameters. Softmax changes scores to normalized 
  probabilities but preserves score ordering and equality, so the argmax class 
  and equal-score decision boundaries do not move.
