prompt: Trace the persistent cache path in MLA from a token representation to 
  the attention heads. Identify what is compressed, what is cached, what is 
  reconstructed, and why compressing queries alone would not produce the stated 
  KV-cache saving.
expected_answer: A learned down-projection compresses the token representation 
  into a latent key-value vector. That latent vector is cached. Learned 
  up-projections reconstruct distinct keys and values for the attention heads 
  when needed. Query compression may affect other memory or computation, but it 
  does not replace the persistent cached keys and values, so it is not the 
  source of KV-cache reduction.
