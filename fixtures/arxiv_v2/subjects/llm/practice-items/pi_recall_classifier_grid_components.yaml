prompt: In one short response, recall the ordered PyTorch layer sequence for a 
  two-input classifier with hidden widths [8, 8] and two output logits, then 
  name the operation and axis used to convert flattened grid logits into class 
  predictions before reshaping them into a decision-region map.
expected_answer: Linear(2,8) → ReLU → Linear(8,8) → ReLU → Linear(8,2); take 
  argmax over the class/logit axis (dimension 1) and reshape the resulting flat 
  class predictions to the grid's height and width.
