prompt: A diagram shows four parallel attention heads followed by concatenation 
  and an output matrix. Explain what distinguishes the heads, how their outputs 
  are combined, and why this is not equivalent to a single projection set.
expected_answer: Each head has its own learned query, key, and value projections
  and can operate in a different representation subspace. The head outputs are 
  concatenated and transformed by an output projection. A single projection set 
  supplies only one attention subspace and lacks these distinct per-head 
  projections.
