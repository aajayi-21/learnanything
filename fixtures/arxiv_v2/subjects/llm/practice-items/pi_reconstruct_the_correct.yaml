prompt: Reconstruct the correct order of operations for one single-example 
  PyTorch training update using cross-entropy and Adam. Then explain how to 
  compute periodic accuracy on all samples and why checkpoint loss and accuracy 
  may fluctuate rather than improve monotonically.
expected_answer: Select one example and label, run the model to obtain logits, 
  compute cross-entropy loss, call optimizer.zero_grad(), call loss.backward(), 
  and then optimizer.step(). For periodic evaluation, run all feature samples 
  through the model, take argmax across the two class logits, compare 
  predictions with all labels, and average the correct indicators. The displayed
  loss is for a selected stochastic example while accuracy is computed across 
  the full sample, and successive single-example updates can help some examples 
  while hurting others, so both logged quantities may fluctuate.
