prompt: 'Compare three proposed training strategies for a large neural model: optimizing
  one parameter at a time to completion, enumerating all parameter combinations, and
  repeatedly updating all parameters using a backpropagated gradient. Diagnose the
  first two strategies and explain what information makes the third more suitable.'
expected_answer: Independent optimization ignores parameter interactions in the 
  joint loss; exhaustive enumeration is infeasible in a continuous 
  high-dimensional space; a full gradient provides coordinated local loss-change
  information for all parameters and supports scaled updates opposite the 
  gradient.
