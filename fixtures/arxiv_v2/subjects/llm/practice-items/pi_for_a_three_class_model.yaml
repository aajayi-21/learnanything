prompt: 'For a three-class model with supplied input, affine weights, biases, and
  a one-hot correct class: compute all logits, apply softmax across the three logits,
  identify the predicted class, and calculate the cross-entropy loss. Show the shared
  softmax denominator and use the correct-class probability for the loss.'
expected_answer: Three correctly evaluated logits; three positive probabilities 
  sharing one denominator and summing to one; the class with the largest 
  probability; and L=-ln(hat_y_correct).
