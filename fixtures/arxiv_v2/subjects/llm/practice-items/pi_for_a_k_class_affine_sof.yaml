prompt: For a K-class affine softmax classifier h_i=Σ_j m_{ij}x_j+b_i with a 
  one-hot target, derive the gradients of cross-entropy with respect to every 
  m_{ij} and b_i. Explicitly show the logit derivative and the affine local 
  derivatives before assembling the gradient vector.
expected_answer: The derivation states ∂L/∂h_i=hat_y_i-y_i, ∂h_i/∂m_{ij}=x_j, 
  and ∂h_i/∂b_i=1, then applies the chain rule to obtain 
  ∂L/∂m_{ij}=x_j(hat_y_i-y_i) and ∂L/∂b_i=hat_y_i-y_i for all parameters.
