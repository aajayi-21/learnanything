prompt: For a three-token autoregressive prefix, describe the ordered operations
  that produce the attention output for the second token. Identify which key 
  positions are allowed, where scaling and masking occur, and how the value 
  vectors are combined.
expected_answer: Project features into Q, K, and V; compute the second query's 
  dot products with keys; divide logits by sqrt(d_k); mask the third position 
  before softmax; normalize the first two logits; form the weighted sum of the 
  first two value vectors; and apply any required output projection.
