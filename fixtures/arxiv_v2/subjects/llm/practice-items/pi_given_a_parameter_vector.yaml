prompt: Given a parameter vector, its aligned gradient vector, and a positive 
  learning rate, perform one gradient-descent update. Then explain the direction
  of change for one positive-gradient parameter and one negative-gradient 
  parameter, and diagnose a proposed update that adds the gradient.
expected_answer: Each parameter is updated as θ_new=θ_old-αg; a positive 
  gradient decreases its parameter, a negative gradient increases its parameter,
  and adding the gradient moves locally toward increasing rather than decreasing
  loss.
