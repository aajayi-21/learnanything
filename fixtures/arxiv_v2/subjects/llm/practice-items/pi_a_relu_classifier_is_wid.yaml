prompt: A ReLU classifier is wide enough to represent a useful decision 
  boundary, but after an unfavorable initialization several relevant units 
  output zero for all training inputs and their gradients remain zero. Explain 
  why the Universal Approximation Theorem does not guarantee that continued 
  gradient descent will find the useful boundary. Separate the representation 
  claim from the optimization diagnosis.
expected_answer: 'The theorem supplies a conditional existence claim: a sufficiently
  wide network can represent the relevant continuous functions or surfaces to arbitrary
  precision. It does not specify a successful initialization, required practical width,
  or a convergent training path. Here the affected inputs lie in zero-gradient ReLU
  regions, so backpropagation supplies no update signal through those units. A good
  parameter setting may therefore exist while remaining unreachable from this initialization
  by the stated updates.'
