prompt: An engineer says, 'MLA is just multi-query attention with an extra 
  reconstruction matrix, so all heads use the same keys and values and inference
  must perform extra reconstruction for every token.' Diagnose both errors and 
  explain why MLA cache storage is not multiplied directly by the number of 
  heads in the described implementation.
expected_answer: MLA shares a compressed latent representation, but learned 
  head-specific up-projections allow heads to realize distinct key and value 
  behavior, unlike the single shared K and V of multi-query attention. At 
  inference, fixed key up-projection weights can be absorbed into query-side 
  computation and fixed value up-projection weights into output-side 
  computation, so explicit per-token reconstruction is not mandatory. The cache 
  stores the shared latent representation, making its size depend on 
  latent-cache dimensions rather than a separate cached K and V for every head.
