prompt: A causally masked Transformer has cached attention state for n tokens 
  and appends token n+1. Identify which Q, K, and V rows must be newly computed,
  which prior rows must be retained, which attention-score row is required for 
  the new output, and one resource cost that KV caching does not remove.
expected_answer: Compute only q_(n+1), k_(n+1), and v_(n+1). Retain the prior K 
  and V rows, append the new K and V rows, and use q_(n+1) against all 
  cached-and-new keys to form the new bottom causal-attention row. Prior queries
  need not be cached for this update. KV caching still requires storing and 
  reading keys and values for prior tokens across heads and layers.
