prompt: A dataset expands from three classes and one input feature to five 
  classes and three input features. Specify the indexed affine-logit equations, 
  state the softmax normalization, count all trainable affine parameters and 
  gradient components, give the general weight and bias gradient formulas, and 
  describe the decision rule.
expected_answer: Five logits h_i=Σ_{j=1}^3m_{ij}x_j+b_i; softmax normalized over
  all five logits; 5(3+1)=20 trainable parameters and 20 gradient components; 
  ∂L/∂m_{ij}=x_j(hat_y_i-y_i), ∂L/∂b_i=hat_y_i-y_i; prediction selects the class
  with the largest logit or softmax probability.
