prompt: Design a probe to compare intermediate representations for contexts 
  whose next token is one of three target city tokens. Specify the sampled model
  state, token position, dimensionality-reduction step, and two cautions 
  required when interpreting the resulting clusters.
expected_answer: Run labeled contexts through the model to a selected 
  intermediate layer, sample the final residual-stream position for each 
  context, collect the high-dimensional vectors, and project them to two 
  dimensions with UMAP. The plot is a reduced visualization rather than the 
  original representation space, and separate intermediate context clusters may 
  later map toward the same target-token embedding.
