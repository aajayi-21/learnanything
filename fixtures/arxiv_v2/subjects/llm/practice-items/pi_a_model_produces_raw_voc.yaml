evidence_weights: {}
criterion_facet_weights: {}
prompt: A model produces raw vocabulary scores [-1, 2, 0.5]. A learner calls 
  them probabilities because the largest score indicates the favored token. 
  Diagnose the error and describe the operations needed to obtain probabilities.
  Exact decimal values are not required.
expected_answer: 'The scores are logits, not probabilities: they include a negative
  value and do not form a positive sum-one distribution. Exponentiate each logit,
  sum the exponentials, and divide each exponential by that sum. The logit 2 receives
  the largest probability, but the other tokens generally retain nonzero probability.'
