prompt: 'Put these stages in a valid high-level next-token inference order and identify
  the representation produced at each transition: softmax, tokenization, unembedding/output
  projection, embedding lookup, repeated attention and position-wise feed-forward
  processing.'
expected_answer: Tokenization produces token identities; embedding lookup 
  produces initial token vectors; repeated attention and position-wise 
  feed-forward processing produces contextualized representations; 
  unembedding/output projection produces vocabulary logits; softmax produces a 
  next-token probability distribution.
