prompt: The same vocabulary token appears in two sentences with different 
  meanings. Explain which vector is supplied by the embedding lookup and where 
  the context-dependent difference is introduced. Also state whether the 
  position-wise MLP exchanges information between the two token positions.
expected_answer: The embedding lookup supplies the token’s learned initial 
  vector; later attention and transformer processing introduce context-dependent
  refinement. The position-wise MLP applies its operation independently at each 
  position and does not itself exchange information between positions.
