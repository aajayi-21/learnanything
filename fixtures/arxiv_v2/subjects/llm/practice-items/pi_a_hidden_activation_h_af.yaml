prompt: A hidden activation h affects the cost through two downstream neurons. 
  For training example i, the two path contributions to ∂C_i/∂h are p_i and q_i.
  The hidden activation is h=σ(z), with z=wx+b. Derive ∂C_i/∂w in terms of p_i, 
  q_i, σ'(z), and x. Then state how the exact gradient for a training set of N 
  examples differs from a gradient computed from a mini-batch B.
expected_answer: "First add alternative path contributions: ∂C_i/∂h=p_i+q_i. Continue
  along the upstream dependency path: ∂C_i/∂w=(p_i+q_i)σ'(z)x. The exact full-data
  gradient is (1/N)Σ_i ∂C_i/∂w over all N examples. A mini-batch gradient averages
  the same per-example derivatives only over B and is an approximation to the full-data
  gradient."
