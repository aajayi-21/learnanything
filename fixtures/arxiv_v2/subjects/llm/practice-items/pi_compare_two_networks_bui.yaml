prompt: 'Compare two networks built from affine layers: Network A has no activation
  between layers, while Network B applies ReLU between layers. Explain algebraically
  what happens in A and geometrically how B can form a more complex decision boundary.'
expected_answer: Substituting A's affine layer equations into one another and 
  collecting coefficients yields one affine mapping, so added depth alone does 
  not create nonlinear boundaries. In B, ReLU clips negative regions of each 
  affine plane to zero and preserves nonnegative regions, creating folds and 
  piecewise-linear surfaces that later affine combinations can assemble into 
  more complex decision regions.
