prompt: Design a PyTorch workflow for a classifier with hidden widths [8, 8], 
  two input coordinates, and two output logits. Describe the exact layer 
  sequence and forward method, then describe how to produce a 256-by-256 
  decision-region map over [-1,1] in each coordinate. Include tensor shapes, the
  class axis used by argmax, and necessary device-to-NumPy handling.
expected_answer: The network sequence is Linear(2,8), ReLU, Linear(8,8), ReLU, 
  Linear(8,2), stored in an nn.Sequential; forward returns self.model(x). For 
  visualization, build a 256×256×2 coordinate grid over [-1,1], reshape it to 
  65,536×2, convert it to a float tensor on the model's device, and evaluate the
  model to obtain 65,536×2 logits. Detach the logits, move them to CPU, convert 
  to NumPy, and reshape to 256×256×2. Take argmax over the last axis to obtain 
  the class map, then render it with an extent and orientation consistent with 
  the coordinate grid.
