  - id: facet_for_softmax_probabilities_hat_y_followed_by_one_
    title:
    aliases:
      - softmax-cross-entropy gradient
    description:
    tags: []
    concept_id: concept_backpropagation
    kind: proposition
    claim: For softmax probabilities hat_y followed by one-hot cross-entropy 
      with target y, the derivative of the loss with respect to each logit is 
      ∂L/∂h_i=hat_y_i-y_i.
    preconditions:
      - The output layer uses softmax.
      - The target is represented as a one-hot vector.
      - The loss is cross-entropy.
    postconditions:
      - The correct-class logit derivative is hat_y_i-1.
      - Each non-correct-class logit derivative is hat_y_i.
    applicability:
      - Softmax classifiers trained with one-hot cross-entropy.
    positive_examples:
      - If the correct-class probability is 0.09, its logit derivative is 
        0.09-1=-0.91.
    negative_examples:
      - Using hat_y_i-1 for every class.
    non_goals:
      - The identity is not asserted for arbitrary activation-loss combinations.
    error_signatures:
      - Dropping the negative sign for the correct class.
      - Subtracting one from every class probability.
    instructional_repairs:
      - Write the one-hot target explicitly and subtract it componentwise from 
        the probability vector.
