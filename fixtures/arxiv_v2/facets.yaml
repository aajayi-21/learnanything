  - id: facet_causal_masking_assigns_disallowed_future_positio
    title:
    aliases:
      - causal attention mask
    description:
    tags: []
    concept_id: concept_causal_masking
    kind: procedure_contract
    claim: Causal masking assigns disallowed future-position logits a value 
      whose softmax weight is zero, so each autoregressive position attends only
      to itself and preceding positions.
    preconditions:
      - Attention logits are available before softmax.
      - Positions have an autoregressive ordering.
    postconditions:
      - Future-token attention weights are zero.
    applicability:
      - Autoregressive Transformer training and generation.
    positive_examples:
      - Masking future logits with negative infinity before softmax.
    negative_examples:
      - Applying unrestricted attention across all target positions.
    non_goals:
      - Preventing parallel computation over all positions during training or 
        prefill.
    error_signatures:
      - A position receives nonzero attention weight from a later position.
      - Masking is applied after softmax without renormalization.
    instructional_repairs:
      - Apply the causal mask to logits before softmax and verify the resulting 
        attention matrix is lower triangular.
