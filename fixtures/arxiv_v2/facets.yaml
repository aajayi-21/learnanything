  - id: facet_an_unfavorable_initialization_can_place_relevant
    title:
    aliases:
      - initialization-sensitive ReLU failure
    description:
    tags: []
    concept_id: concept_neural_network_representation_versus_trainabilit
    kind: proposition
    claim: An unfavorable initialization can place relevant inputs in 
      zero-output ReLU regions, produce zero gradients through affected units, 
      and prevent gradient descent from reaching a known better solution.
    preconditions:
      - A ReLU network is trained by gradient-based updates.
      - Relevant activations lie in the zero-gradient portion of ReLU.
    postconditions:
      - Architectural capacity does not imply optimization reachability.
    applicability:
      - Diagnosing failed training trajectories in ReLU networks.
    positive_examples:
      - A small network loses usable folds and retains only a suboptimal linear 
        boundary.
    negative_examples:
      - Assuming further identical updates must recover a good solution after 
        the useful gradients become zero.
    non_goals:
      - Claiming that every large-network failure has the same local-minimum 
        mechanism.
    error_signatures:
      - Reasoning only from solution existence while ignoring activation 
        derivatives and initialization.
    instructional_repairs:
      - Trace initialization, activation support, derivatives, and the resulting
        parameter-update path.
    status: reviewed
    version: 1
    semantic_fingerprint: sf_83cad965fed6231f
