    description:
    tags: []
    concept_id: concept_geometric_expressivity_of_relu_networks
    kind: proposition
    claim: A composition of affine layers with no intervening nonlinear 
      activation is itself affine and therefore does not gain nonlinear 
      decision-boundary capacity merely by adding layers.
    preconditions:
      - Every composed layer is affine.
      - No nonlinear activation occurs between layers.
    postconditions:
      - The composed mapping can be rewritten as one affine mapping.
    applicability:
      - Stacks of linear or affine neural-network layers.
    positive_examples:
      - Substituting one affine layer into another and collecting coefficients.
    negative_examples:
      - A stack containing ReLU between affine layers.
    non_goals:
      - This claim does not apply to networks with nonlinear activations.
    error_signatures:
      - Assuming depth alone makes a fully affine network nonlinear.
    instructional_repairs:
      - Substitute the layer equations and collect coefficients of each input 
        and the constant term.
