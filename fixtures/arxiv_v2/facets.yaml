  - id: facet_a_causal_self_attention_head_projects_token_repr
    title:
    aliases:
      - scaled dot-product causal attention
    description:
    tags: []
    concept_id: concept_causal_self_attention_and_kv_caching
    kind: procedure_contract
    claim: A causal self-attention head projects token representations into 
      queries, keys, and values; forms scaled query-key scores; masks future 
      positions; applies row-wise softmax; and uses the resulting weights to 
      combine values.
    preconditions:
      - The input matrix has one row per token.
      - Compatible learned query, key, and value projection weights are 
        available.
    postconditions:
      - Each token position receives an attention output formed from eligible 
        value vectors.
    applicability:
      - Dense causal self-attention in autoregressive Transformers.
    positive_examples:
      - Computing softmax over masked, scaled QK^T scores and multiplying the 
        attention pattern by V.
    negative_examples:
      - Treating the attention-pattern matrix as the value matrix or final 
        attention output.
      - Allowing a position to attend to future tokens during causal next-token 
        processing.
    non_goals:
      - This procedure does not describe sparse-attention shortcuts or MLA cache
        compression.
    error_signatures:
      - Omitting the causal mask.
      - Omitting score scaling or softmax.
      - Stopping before multiplying by the value matrix.
    instructional_repairs:
      - Track the distinct roles and matrix shapes of Q, K, V, the score matrix,
        and the weighted-value output.
    status: reviewed
    version: 1
    semantic_fingerprint: sf_0f156600872cbd93
