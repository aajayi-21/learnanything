  - id: facet_given_token_features_and_learned_projection_matr
    title:
    aliases:
      - scaled dot-product attention procedure
    description:
    tags: []
    concept_id: concept_scaled_self_attention
    kind: procedure_contract
    claim: Given token features and learned projection matrices, scaled 
      self-attention projects queries, keys, and values; computes query-key dot 
      products; scales logits by 1/sqrt(d_k); applies softmax; and aggregates 
      value vectors into contextualized outputs.
    preconditions:
      - Token feature vectors and learned query, key, and value projection 
        matrices are available.
    postconditions:
      - Each position receives a contextualized representation formed from 
        normalized weighted values.
    applicability:
      - Transformer attention layers.
    positive_examples:
      - Tracing Q, K, and V projections followed by scaled logits, softmax, and 
        value aggregation.
    negative_examples:
      - Using unnormalized raw dot products directly as final attention weights.
    non_goals:
      - Specifying a particular model's learned attention weights.
    error_signatures:
      - The scaling factor is omitted.
      - Raw logits are treated as probabilities.
      - Values are not included in the weighted aggregation.
    instructional_repairs:
      - Separate relevance computation from content aggregation and normalize 
        the scaled relevance scores before weighting values.
    status: reviewed
    version: 1
