  - id: facet_increasing_sampling_temperature_makes_lower_valu
    title:
    aliases:
      - temperature-sharpness relationship
    description:
    tags: []
    concept_id: concept_sampling_temperature
    kind: interpretation
    claim: Increasing sampling temperature makes lower-valued logits relatively 
      more influential and produces a flatter, less predictable distribution, 
      whereas decreasing temperature sharpens the distribution around the 
      largest logits.
    preconditions:
      - A set of logits is available for temperature-scaled softmax.
    postconditions:
      - The relative sharpness of the sampling distribution changes.
    applicability:
      - Stochastic next-token generation.
    positive_examples:
      - Comparing generated continuations from the same seed at lower and higher
        temperatures.
    negative_examples:
      - Claiming higher temperature necessarily improves quality or coherence.
    non_goals:
      - Temperature does not guarantee originality, correctness, or coherence.
      - This facet does not specify an optimal temperature.
    error_signatures:
      - Equating higher temperature with uniformly better text.
      - Describing temperature as changing the learned model weights.
    instructional_repairs:
      - Frame temperature as a predictability-diversity tradeoff applied to 
        output scores, not as a quality guarantee.
    status: reviewed
    version: 1
    semantic_fingerprint: sf_62d2c236730147af
