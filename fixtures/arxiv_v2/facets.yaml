  - id: facet_given_logits_h_i_softmax_computes_exp_h_i_divide
    title:
    aliases:
      - normalized exponential
    description:
    tags: []
    concept_id: concept_softmax_function
    kind: procedure_contract
    claim: Given logits h_i, softmax computes exp(h_i) divided by the sum of 
      exp(h_j) over all classes, producing positive probabilities that sum to 
      one while preserving which logit is largest.
    preconditions:
      - A finite vector of class logits is available.
    postconditions:
      - Each output lies between zero and one.
      - The outputs sum to one.
      - The class with the largest logit also has the largest softmax 
        probability.
    applicability:
      - Mutually exclusive multiclass prediction from a vector of logits.
    positive_examples:
      - For logits 1, 2, and 1, all classes retain positive probability and the 
        middle class has the largest probability.
    negative_examples:
      - Replacing softmax with a hard argmax that assigns probability one to 
        only the largest logit.
    non_goals:
      - Softmax does not independently compute a training loss.
    error_signatures:
      - Normalizing each class with a different denominator.
      - Omitting a class from the shared denominator.
      - Returning a one-hot vector for ordinary finite logits.
    instructional_repairs:
      - Exponentiate every logit and divide each result by the same sum over all
        classes.
