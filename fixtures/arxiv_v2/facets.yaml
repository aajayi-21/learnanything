  - id: facet_visualize_predicted_decision_regions_by_building
    title:
    aliases:
      - probe-grid decision map
    description:
    tags: []
    concept_id: concept_decision_region_visualization
    kind: procedure_contract
    claim: Visualize predicted decision regions by building a dense 
      two-dimensional grid, evaluating all grid points as a batch, reshaping the
      two-output logits, taking argmax across the class dimension, and 
      overlaying the resulting class map on the coordinate domain.
    preconditions:
      - The model accepts two-feature tensors and returns two logits per sample.
      - The plotting domain and tensor device are defined.
    postconditions:
      - A two-dimensional class-region overlay is rendered.
    applicability:
      - Inspecting the learned geometry of a two-input classifier.
    positive_examples:
      - Probe coordinates from -1 to 1 and reshape predictions back to a square 
        grid.
    negative_examples:
      - Taking argmax over the grid-coordinate dimension.
      - Reshaping outputs without preserving probe-grid order.
    non_goals:
      - Training the model.
    error_signatures:
      - Incorrect output-axis argmax.
      - Device conversion errors before NumPy plotting.
      - An orientation mismatch between the grid and overlay.
    instructional_repairs:
      - Record grid shape, flattened sample order, logit shape, class axis, and 
        display orientation explicitly.
