  - id: facet_universal_approximation_is_a_representational_ex
    title:
    aliases:
      - capacity-versus-optimization distinction
    description:
    tags: []
    concept_id: concept_universal_approximation
    kind: interpretation
    claim: Universal approximation is a representational existence result for 
      sufficiently wide networks on the relevant continuous targets; it does not
      guarantee that training finds suitable parameters or provide a 
      problem-specific neuron count.
    preconditions:
      - The target and architecture meet the theorem's representational 
        conditions.
    postconditions:
      - Representational capacity is separated from optimization success and 
        width selection.
    applicability:
      - Interpreting universal-approximation claims about neural networks.
    positive_examples:
      - A suitable parameterization may exist even when a practical training run
        fails to find it.
    negative_examples:
      - Claiming that a very wide initialized network must train successfully.
    non_goals:
      - This facet does not give a quantitative width bound or convergence 
        theorem.
    error_signatures:
      - Treating existence as a learning guarantee.
      - Inferring a required neuron count directly from the theorem.
    instructional_repairs:
      - State separately what exists, what the training algorithm can guarantee,
        and what architecture size is known.
