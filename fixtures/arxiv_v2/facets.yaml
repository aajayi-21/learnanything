  - id: facet_multi_head_latent_attention_caches_a_compressed_
    title:
    aliases:
      - MLA latent KV cache
    description:
    tags: []
    concept_id: concept_multi_head_latent_attention
    kind: definition
    claim: Multi-head latent attention caches a compressed latent representation
      shared across heads and uses learned head-specific up-projections so that 
      heads can retain distinct key and value behavior.
    preconditions:
      - A learned down-projection into latent space and head-specific key and 
        value up-projections are available.
    postconditions:
      - A shared compressed representation can replace explicit per-head key and
        value cache entries.
      - Different heads need not use identical reconstructed keys and values.
    applicability:
      - Transformer attention blocks using the described MLA design.
    positive_examples:
      - Caching one latent vector per token and reconstructing head-specific 
        behavior through WUK and WUV.
    negative_examples:
      - Treating MLA as identical to multi-query attention merely because both 
        share information across heads.
    non_goals:
      - The claim does not imply that total model memory is independent of head 
        count.
    error_signatures:
      - Omitting the head-specific up-projections.
      - Assuming all heads consume identical key and value representations.
    instructional_repairs:
      - Trace the shared latent vector through the separate learned 
        up-projections for each head.
    status: reviewed
    version: 1
    semantic_fingerprint: sf_599b97adfa61bddb
