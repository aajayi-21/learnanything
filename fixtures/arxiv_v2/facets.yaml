      - Multiple head outputs are combined into one attention-layer output.
    applicability:
      - Transformer architectures requiring multiple attention subspaces.
    positive_examples:
      - Distinct heads representing different token relationships before 
        concatenation.
    negative_examples:
      - A single query-key-value projection set described as multi-head 
        attention.
    non_goals:
      - Guaranteeing a human-interpretable role for every head.
    error_signatures:
      - All heads are treated as sharing every projection while still claiming 
        standard MHA.
      - Head outputs are not combined.
    instructional_repairs:
      - Track the per-head projections and the concatenate-then-output-project 
        construction explicitly.
