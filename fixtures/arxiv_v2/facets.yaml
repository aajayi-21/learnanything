    description:
    tags: []
    concept_id: concept_affine_multiclass_classifier
    kind: definition
    claim: For class i with two inputs, the affine score is 
      h_i=m_{i1}x_1+m_{i2}x_2+b_i; a four-class model therefore has eight slopes
      and four biases.
    preconditions:
      - Two numerical inputs are available for every example.
      - One output neuron is assigned to each of four classes.
    postconditions:
      - Four scalar class scores are produced.
      - The model has twelve trainable parameters.
    applicability:
      - Two-input, four-class affine classifiers.
    positive_examples:
      - A geographic classifier using longitude and latitude for Madrid, Paris, 
        Berlin, and Barcelona.
    negative_examples:
      - A hidden-layer nonlinear classifier with additional parameters.
    non_goals:
      - This facet does not define probability normalization or an optimizer.
    error_signatures:
      - Counting only one slope per two-input neuron.
      - Counting neurons instead of trainable parameters.
    instructional_repairs:
      - Count one slope for each input plus one bias for every class neuron.
