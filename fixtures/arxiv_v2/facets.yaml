  - id: facet_softmax_converts_a_finite_list_of_logits_into_a_
    title:
    aliases:
      - softmax normalization
    description:
    tags: []
    concept_id: concept_softmax_function
    kind: procedure_contract
    claim: Softmax converts a finite list of logits into a probability 
      distribution by exponentiating each logit and dividing each exponential by
      the sum of all exponentials, yielding positive values that sum to one.
    preconditions:
      - A finite list of real-valued logits is available.
    postconditions:
      - Every output is positive.
      - The outputs sum to one.
    applicability:
      - Next-token vocabulary normalization.
      - Attention-score normalization when applied along the specified axis.
    positive_examples:
      - Applying softmax to one vocabulary logit per candidate token.
    negative_examples:
      - Using raw logits as probabilities.
      - Replacing softmax with a hard maximum when a distribution is required.
    non_goals:
      - Softmax does not itself sample or select the next token.
      - The outputs need not be calibrated probabilities.
    error_signatures:
      - Omitting exponentiation.
      - Normalizing raw signed values directly.
      - Returning only the maximum entry.
    instructional_repairs:
      - 'Apply the three-step procedure: exponentiate, sum, then divide each exponential
        by the sum.'
    status: reviewed
    version: 1
