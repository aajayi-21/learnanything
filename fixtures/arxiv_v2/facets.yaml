  - id: facet_tokenization_divides_input_into_discrete_pieces_
    title:
    aliases:
      - token definition
    description:
    tags: []
    concept_id: concept_tokenization
    kind: definition
    claim: Tokenization divides input into discrete pieces; text tokens may be 
      complete words, word pieces, or common character combinations rather than 
      necessarily whole words.
    preconditions:
      - An input has been selected for model processing.
    postconditions:
      - The input is represented as a token sequence.
    applicability:
      - Text and other transformer inputs.
    positive_examples:
      - A word piece used as one text token.
      - An image patch or audio chunk used as a token-like input unit.
    negative_examples:
      - Assuming every text token must be a complete word.
    non_goals:
      - This facet does not specify a particular tokenizer algorithm or 
        vocabulary.
    error_signatures:
      - Treating word-level lecture examples as a universal definition of 
        tokenization.
    instructional_repairs:
      - Separate pedagogical whole-word examples from the broader definition 
        that permits word pieces and character combinations.
