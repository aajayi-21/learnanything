  - id: facet_a_sparse_autoencoder_encodes_model_activations_i
    title:
    aliases:
      - sparse autoencoder feature extraction
    description:
    tags: []
    concept_id: concept_sparse_autoencoder_interpretability
    kind: procedure_contract
    claim: A sparse autoencoder encodes model activations into a wider feature 
      vector, suppresses most feature values, decodes the active features back 
      into activation space, and is trained to balance sparse representation 
      with accurate reconstruction.
    preconditions:
      - Activations from a chosen model location are available.
      - Encoder and decoder mappings and a sparsifying mechanism are specified.
    postconditions:
      - A sparse feature vector and reconstructed activation are produced.
      - Training can optimize reconstruction while maintaining sparsity.
    applicability:
      - Feature extraction from a selected residual-stream or layer activation 
        location.
    positive_examples:
      - Mapping a 2304-dimensional activation to 16,384 candidate features and 
        decoding back to 2304 dimensions.
    negative_examples:
      - Treating low reconstruction loss alone as proof that every learned 
        feature has a human-readable meaning.
    non_goals:
      - The procedure does not assign semantic labels to feature indices in 
        advance.
    error_signatures:
      - Ignoring the sparsity constraint.
      - Evaluating only feature count without reconstruction quality.
