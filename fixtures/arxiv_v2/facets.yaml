  - id: facet_for_class_i_and_input_features_x_j_an_affine_cla
    title:
    aliases:
      - linear neuron output
      - class score
      - logit
    description:
    tags: []
    concept_id: concept_affine_multiclass_classifier
    kind: definition
    claim: For class i and input features x_j, an affine classifier computes a 
      logit h_i as a weighted sum of the inputs plus a bias; with two inputs, 
      h_i=m_{i1}x_1+m_{i2}x_2+b_i and its graph is a plane.
    preconditions:
      - The numerical input features and the class-specific weights and bias are
        specified.
    postconditions:
      - One unbounded scalar logit is produced for each class.
    applicability:
      - One- or multiple-input linear classification models.
    positive_examples:
      - A four-city classifier uses one two-input affine logit for each city.
    negative_examples:
      - Treating a two-input affine logit as a one-dimensional line.
    non_goals:
      - The affine calculation alone does not produce normalized probabilities.
    error_signatures:
      - Omitting an input weight.
      - Equating a logit with a final class probability.
    instructional_repairs:
      - Write one weighted term per input feature and keep the logit distinct 
        from the softmax output.
