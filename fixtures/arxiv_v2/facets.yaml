  - id: facet_during_autoregressive_decoding_a_kv_cache_stores
    title:
    aliases:
      - KV-cache reuse contract
    description:
    tags: []
    concept_id: concept_kv_caching
    kind: procedure_contract
    claim: During autoregressive decoding, a KV cache stores prior tokens' keys 
      and values and reuses them for later tokens, while prior query vectors 
      need not be cached.
    preconditions:
      - Autoregressive causal decoding is underway.
      - Previously computed keys and values remain valid.
    postconditions:
      - Prior keys and values are reused instead of recomputed for every new 
        token.
    applicability:
      - Token-by-token Transformer decoding.
    positive_examples:
      - Computing the new token's query, key, and value while retrieving earlier
        keys and values from the cache.
    negative_examples:
      - Caching all prior queries as required decoding state.
      - Recomputing all prior keys and values for every generated token.
    non_goals:
      - Eliminating attention over preceding tokens.
    error_signatures:
      - The cache contains queries as though later outputs reused them.
      - Decode-time computation recreates every preceding key and value.
    instructional_repairs:
      - "Trace which side of the new token's attention calculation consumes prior-position
        vectors: earlier keys and values are reused, while the current query is newly
        computed."
