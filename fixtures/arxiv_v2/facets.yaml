  - id: facet_sparse_autoencoders_are_motivated_by_polysemanti
    title:
    aliases:
      - polysemanticity motivation for SAEs
    description:
    tags: []
    concept_id: concept_sparse_autoencoder_interpretability
    kind: applicability_condition
    claim: 'Sparse autoencoders are motivated by polysemanticity and superposition:
      individual neurons may mix unrelated concepts, so interpretable features may
      need to be represented as sparse directions or combinations rather than identified
      with single neurons.'
    preconditions:
      - Model activations exhibit polysemantic or distributed representation 
        behavior.
    postconditions:
      - Interpretability analysis targets learned sparse features rather than 
        assuming one concept per neuron.
    applicability:
      - Mechanistic interpretation of internal language-model activations.
    positive_examples:
      - A neuron causally affecting skeptical output also activating on 
        capitalization and proper nouns.
    negative_examples:
      - Naming a neuron a dedicated skepticism neuron from one intervention 
        alone.
      - Assuming one active neuron guarantees one disentangled concept.
    non_goals:
      - Polysemanticity does not imply that neuron activations are causally 
        irrelevant.
    error_signatures:
      - Inferring a unique semantic label from a single causal intervention.
      - Equating activation sparsity with representational disentanglement.
    instructional_repairs:
      - Inspect maximally activating examples across diverse inputs.
      - Distinguish causal effect, activation sparsity, and semantic uniqueness.
    status: reviewed
    version: 1
    semantic_fingerprint: sf_3a97edb11ae9fe6d
