  - id: facet_candidate_sparse_feature_meanings_are_inferred_f
    title:
    aliases:
      - sparse-feature interpretation and steering
    description:
    tags: []
    concept_id: concept_sparse_autoencoder_interpretability
    kind: interpretation
    claim: Candidate sparse-feature meanings are inferred from highly activating
      examples and tested through causal intervention; coherent steering 
      supports an interpretation, but extreme clamping and incomplete feature 
      coverage limit the conclusion.
    preconditions:
      - A trained sparse autoencoder and activation corpus are available.
      - Candidate features can be observed and intervened on.
    postconditions:
      - Evidence for a feature interpretation combines activation examples with 
        causal effects.
      - Intervention-strength and coverage limitations are reported.
    applicability:
      - Interpretation and steering of learned sparse features.
    positive_examples:
      - Identifying a questioning or uncertainty pattern among highly activating
        texts and testing it with moderate feature clamping.
    negative_examples:
      - Assuming maximally activating examples prove a unique exhaustive 
        meaning.
      - Assuming stronger clamping always yields stronger coherent behavior.
      - Treating millions of extracted features as a complete inventory of model
        knowledge.
    non_goals:
      - The method does not guarantee recovery of every represented concept.
    error_signatures:
      - Using correlational examples without intervention as conclusive proof.
      - Extrapolating linearly from moderate to extreme clamp strengths.
      - Equating a large feature count with semantic completeness.
    instructional_repairs:
      - Combine activation analysis with causal tests.
      - Vary intervention strength while monitoring generation quality.
      - Compare extracted features with independently observable model 
        capabilities.
    status: reviewed
    version: 1
