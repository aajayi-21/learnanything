  - id: facet_relu_clips_negative_affine_outputs_to_zero_and_p
    title:
    aliases:
      - ReLU bent-plane geometry
    description:
    tags: []
    concept_id: concept_geometric_expressivity_of_relu_networks
    kind: interpretation
    claim: ReLU clips negative affine outputs to zero and preserves nonnegative 
      outputs, bending each affine plane into a piecewise-linear surface; later 
      neurons can combine such surfaces to form more complex decision regions.
    preconditions:
      - An affine pre-activation has been computed.
      - ReLU is applied before the next affine layer.
    postconditions:
      - Negative regions become flat at zero.
      - The network can construct piecewise-linear output surfaces.
    applicability:
      - Feed-forward ReLU networks.
    positive_examples:
      - A first-layer fold line separates clipped and preserved regions of a 
        plane.
    negative_examples:
      - Passing a negative pre-activation forward unchanged.
    non_goals:
      - Additional expressivity does not guarantee successful training.
    error_signatures:
      - Applying ReLU before computing the affine pre-activation.
      - Failing to clip negative values.
    instructional_repairs:
      - Compute the affine value first, apply max(0,h), then evaluate the next 
        layer.
