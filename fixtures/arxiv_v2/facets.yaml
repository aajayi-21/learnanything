  - id: facet_for_differentiable_stages_composed_in_sequence_m
    title:
    aliases: []
    description:
    tags: []
    concept_id: concept_chain_rule
    kind: procedure_contract
    claim: For differentiable stages composed in sequence, multiply the local 
      derivatives along the dependency path to obtain the derivative of the 
      final output with respect to an earlier quantity.
    preconditions:
      - The computation is decomposed into differentiable stages.
      - The relevant local derivatives are available.
    postconditions:
      - A derivative through the composed computation is obtained.
    applicability:
      - Layered neural-network computations and other multistage differentiable 
        functions.
    positive_examples:
      - If y=2x and z=4y, then dz/dx=(dy/dx)(dz/dy)=2·4=8.
    negative_examples:
      - Treating the local derivatives as unrelated quantities that should be 
        added.
    non_goals:
      - The chain rule does not itself specify the model's loss or 
        parameter-update rule.
    error_signatures:
      - Omitting a dependency-path factor.
      - Multiplying derivatives from unrelated branches.
    instructional_repairs:
      - Trace the path from the parameter to the loss and multiply the 
        derivative contributed by each stage on that path.
