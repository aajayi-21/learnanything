  - id: facet_the_gradient_vector_contains_one_partial_derivat
    title:
    aliases: []
    description:
    tags: []
    concept_id: concept_gradient_vector
    kind: definition
    claim: The gradient vector contains one partial derivative of the loss for 
      each trainable model parameter and records the local direction and rate of
      loss change in parameter space.
    preconditions:
      - A differentiable loss and a collection of trainable parameters are 
        specified.
    postconditions:
      - Each trainable parameter has a corresponding gradient component.
    applicability:
      - Differentiable parameterized models.
    positive_examples:
      - A three-neuron model with one weight and one bias per neuron has a 
        six-component gradient.
    negative_examples:
      - Reporting only the derivative for the correct class while omitting the 
        remaining trainable parameters.
    non_goals:
      - The gradient does not by itself specify the learning rate.
    error_signatures:
      - Gradient dimension does not match parameter count.
      - A parameter derivative is omitted or duplicated.
    instructional_repairs:
      - Enumerate the model parameters and align exactly one derivative with 
        each parameter.
