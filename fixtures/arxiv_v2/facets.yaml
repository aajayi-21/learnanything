  - id: facet_dense_attention_pattern_storage_scales_quadratic
    title:
    aliases:
      - KV-cache memory scaling
    description:
    tags: []
    concept_id: concept_causal_self_attention_and_kv_caching
    kind: proposition
    claim: Dense attention-pattern storage scales quadratically with sequence 
      length, while a conventional autoregressive KV cache stores keys and 
      values with size proportional to sequence length, head dimension, head 
      count, and layer count.
    preconditions:
      - Attention is dense over eligible token pairs.
      - Distinct keys and values are cached for each head and layer in the 
        conventional design.
    postconditions:
      - Attention computation and KV-cache memory can be analyzed as separate 
        long-context resource costs.
    applicability:
      - Conventional multi-head causal attention without sparse attention or 
        shared latent caches.
    positive_examples:
      - Using 2 × n × DH × NH × L cached numbers for keys and values under the 
        stated architecture assumptions.
    negative_examples:
      - Concluding that KV caching makes incremental attention free.
      - Applying the conventional per-head cache formula unchanged to MLA.
    non_goals:
      - The formula does not describe all model memory or every attention 
        variant.
    error_signatures:
      - Ignoring cache reads after eliminating recomputation.
      - Claiming that every inference component has quadratic cost.
    instructional_repairs:
      - Separate attention-pattern entry count from KV-cache storage and 
        bandwidth.
      - State architecture and datatype assumptions with numerical estimates.
    status: reviewed
    version: 1
