  - id: facet_to_reduce_loss_by_gradient_descent_update_each_p
    title:
    aliases:
      - gradient update
    description:
    tags: []
    concept_id: concept_gradient_descent
    kind: procedure_contract
    claim: To reduce loss by gradient descent, update each parameter θ as 
      θ←θ-α∂L/∂θ, where the positive learning rate α scales the step; positive 
      gradients decrease their parameters and negative gradients increase them.
    preconditions:
      - Current parameter values and their loss gradients are available.
      - A positive learning rate is selected.
    postconditions:
      - Every parameter is moved opposite its local direction of increasing 
        loss.
    applicability:
      - Iterative minimization of a differentiable loss.
    positive_examples:
      - A parameter with a negative gradient increases after subtracting the 
        scaled gradient.
    negative_examples:
      - Adding the gradient while intending to minimize loss.
    non_goals:
      - A single local gradient does not describe the entire loss landscape or 
        guarantee convergence.
    error_signatures:
      - Updating in the same direction as the gradient.
      - Applying the learning rate inconsistently across corresponding 
        parameter-gradient pairs.
    instructional_repairs:
      - Write the subtraction explicitly and check the sign of each resulting 
        parameter change.
