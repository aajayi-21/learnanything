  - id: facet_under_its_continuity_and_sufficient_width_condit
    title:
    aliases:
      - universal approximation qualification
    description:
    tags: []
    concept_id: concept_neural_network_representation_versus_trainabilit
    kind: proposition
    claim: Under its continuity and sufficient-width conditions, the Universal 
      Approximation Theorem establishes the existence of arbitrarily accurate 
      representing networks; it does not guarantee that training will find their
      parameters or specify the width needed for a particular problem.
    preconditions:
      - The target representation satisfies the theorem's continuity framing.
      - The network is sufficiently wide.
    postconditions:
      - Representational existence is distinguished from optimization success.
    applicability:
      - Reasoning about what universal approximation does and does not 
        guarantee.
    positive_examples:
      - Continuous output surfaces can intersect to define the 
        town-classification border.
    negative_examples:
      - Inferring that gradient descent can learn every target merely because a 
        representing network exists.
    non_goals:
      - Guaranteeing global optimization.
      - Giving a neuron count for every target.
    error_signatures:
      - Treating a representation theorem as a convergence theorem.
    instructional_repairs:
      - State separately the representational claim, its conditions, and the 
        absence of an optimization guarantee.
