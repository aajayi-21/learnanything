  - id: facet_attention_allows_information_encoded_at_one_toke
    title:
    aliases:
      - attention-versus-MLP information flow
    description:
    tags: []
    concept_id: concept_contextualized_token_representation
    kind: proposition
    claim: Attention allows information encoded at one token position to 
      influence another, producing token representations that incorporate 
      relevant context; position-wise MLP processing transforms positions 
      independently rather than exchanging information between them.
    preconditions:
      - A sequence of token-position vectors is available.
    postconditions:
      - Representations may encode information from relevant surrounding 
        positions.
      - The distinct interaction roles of attention and the position-wise MLP 
        are identifiable.
    applicability:
      - Transformer attention and feed-forward processing.
    positive_examples:
      - Attention refining the representation of an ambiguous word using 
        surrounding words.
      - An MLP applying the same transformation independently at every token 
        position.
    negative_examples:
      - Attributing cross-token communication to the position-wise MLP.
    non_goals:
      - This facet does not specify the query-key-value equations.
      - It does not claim every learned attention head has a simple 
        human-interpretable role.
    error_signatures:
      - Saying that attention and the MLP exchange information between positions
        in the same way.
    instructional_repairs:
      - Attribute cross-position information flow to attention and 
        position-independent transformation to the MLP.
    status: reviewed
    version: 1
