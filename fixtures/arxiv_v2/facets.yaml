  - id: facet_for_affine_logits_h_i_σ_j_m_ij_x_j_b_i_with_soft
    title:
    aliases:
      - linear-softmax parameter gradients
    description:
    tags: []
    concept_id: concept_backpropagation
    kind: procedure_contract
    claim: For affine logits h_i=Σ_j m_{ij}x_j+b_i with softmax and one-hot 
      cross-entropy, backpropagation gives ∂L/∂m_{ij}=x_j(hat_y_i-y_i) and 
      ∂L/∂b_i=hat_y_i-y_i.
    preconditions:
      - Inputs, one-hot target, logits, and softmax probabilities are available.
      - The model uses affine class logits and cross-entropy loss.
    postconditions:
      - A loss derivative is available for every weight and bias.
    applicability:
      - One- or multiple-input affine softmax classifiers.
    positive_examples:
      - A four-class, two-input model has eight weight gradients and four bias 
        gradients.
    negative_examples:
      - Using m_{ij} instead of x_j as the derivative of h_i with respect to 
        m_{ij}.
    non_goals:
      - These formulas do not include a learning-rate-scaled parameter update.
    error_signatures:
      - Omitting the input factor from a weight gradient.
      - Multiplying a bias gradient by the input.
      - Computing fewer gradients than trainable parameters.
    instructional_repairs:
      - First compute hat_y-y, then multiply each class error component by the 
        corresponding input for weight gradients; copy the component directly 
        for the bias gradient.
