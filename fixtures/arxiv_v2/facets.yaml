  - id: facet_when_one_token_is_appended_during_causal_decodin
    title:
    aliases:
      - incremental KV-cache update
    description:
    tags: []
    concept_id: concept_causal_self_attention_and_kv_caching
    kind: procedure_contract
    claim: When one token is appended during causal decoding, reuse cached keys 
      and values for prior tokens, compute only the new token's query, key, and 
      value, form the new bottom attention row, and append the new key and value
      to the cache.
    preconditions:
      - Generation is autoregressive and causally masked.
      - Prior key and value rows are cached.
      - Projection operations are applied consistently to each token position.
    postconditions:
      - The newly appended token's attention output is computed without 
        recomputing earlier key and value rows.
      - The cache is extended for the next decoding step.
    applicability:
      - Incremental causal self-attention decoding.
    positive_examples:
      - Reusing nine prior key and value rows after appending a tenth token.
    negative_examples:
      - Caching every old query row for use in the new attention row.
      - Recomputing all previous key and value projections.
    non_goals:
      - KV caching does not eliminate memory storage or bandwidth costs.
    error_signatures:
      - Treating prior Q, K, and V rows as equally necessary to cache.
      - Computing the causally masked upper-right column for earlier positions.
    instructional_repairs:
      - Identify the single new output row required at the current decoding 
        step.
      - Cache prior K and V rows, but compute only the newest query.
    status: reviewed
    version: 1
    semantic_fingerprint: sf_219a3b4b148c97ca
