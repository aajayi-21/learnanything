  - id: facet_applying_relu_to_an_already_piecewise_planar_hid
    title:
    aliases:
      - recursive ReLU partitioning
    description:
    tags: []
    concept_id: concept_geometric_expressivity_of_relu_networks
    kind: interpretation
    claim: Applying ReLU to an already piecewise-planar hidden representation 
      can create multiple fold lines where the incoming surface crosses zero, so
      successive layers can recursively refine the input-space partition.
    preconditions:
      - An incoming hidden representation is piecewise planar.
      - The surface crosses zero in multiple regions.
    postconditions:
      - A later neuron may add several folds inherited from earlier-layer 
        geometry.
      - Depth can compound geometric complexity.
    applicability:
      - Interpreting stacked ReLU layers geometrically.
    positive_examples:
      - Two first-layer folds form four regions and later folds refine them into
        ten regions.
    negative_examples:
      - Treating every hidden neuron as contributing exactly one input-space 
        fold.
    non_goals:
      - Guaranteeing that every available neuron is active.
      - Claiming that a more complex partition necessarily gives a better 
        boundary.
    error_signatures:
      - Counting neurons as if each always contributed one independent line.
    instructional_repairs:
      - Trace zero crossings and region refinement separately at each layer.
