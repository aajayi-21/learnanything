    concept_id: concept_supervised_coordinate_data_preparation
    kind: procedure_contract
    claim: Prepare a binary coordinate dataset by sampling rows from both class 
      arrays, stacking the feature blocks, constructing label blocks in the same
      class order, applying one shared random permutation to features and 
      labels, and converting the results to PyTorch tensors.
    preconditions:
      - Both coordinate arrays exist, are indexable, and have compatible feature
        dimensions.
      - The label mapping is explicitly chosen to match the feature-stack order.
    postconditions:
      - Feature and label tensors remain positionally aligned after shuffling.
    applicability:
      - Preparing two-dimensional supervised examples for a PyTorch classifier.
    positive_examples:
      - One shuffled index array is applied to both X_sample and y_sample.
    negative_examples:
      - Shuffling features and labels independently.
      - Inferring label semantics from array-length expressions without checking
        stack order.
    non_goals:
      - Defining a model or training loop.
      - Claiming that the source excerpt unambiguously names the 
        country-to-label mapping.
    error_signatures:
      - Different feature and label permutations.
      - Label blocks ordered differently from feature blocks.
      - Using the malformed extracted identifier 'X sample'.
    instructional_repairs:
