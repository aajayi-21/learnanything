  - id: facet_logits_are_the_raw_unnormalized_vocabulary_score
    title:
    aliases:
      - raw vocabulary score
    description:
    tags: []
    concept_id: concept_logits
    kind: definition
    claim: Logits are the raw, unnormalized vocabulary scores produced before 
      softmax; they are not themselves probabilities.
    preconditions:
      - A final contextual representation has been mapped through the output 
        transformation.
    postconditions:
      - One unnormalized score is available for each vocabulary token.
    applicability:
      - Next-token output computation.
    positive_examples:
      - A negative or greater-than-one output score interpreted as a logit.
    negative_examples:
      - Interpreting unembedding outputs directly as probabilities.
    non_goals:
      - This facet does not prescribe a token-selection rule.
    error_signatures:
      - Calling raw scores probabilities even though they may be negative or 
        fail to sum to one.
    instructional_repairs:
      - Label the raw outputs as logits and apply softmax before probability 
        interpretation.
    status: reviewed
    version: 1
