  - id: facet_at_inference_fixed_mla_key_up_projection_weights
    title:
    aliases:
      - MLA inference weight absorption
    description:
    tags: []
    concept_id: concept_multi_head_latent_attention
    kind: procedure_contract
    claim: At inference, fixed MLA key up-projection weights can be absorbed 
      into query-side computation and fixed value up-projection weights into 
      output-side computation, allowing attention to operate directly against 
      the latent cache without explicit per-step key and value reconstruction.
    preconditions:
      - MLA projection weights are fixed for inference.
      - The matrix products permit algebraic reassociation.
    postconditions:
      - Absorbed weights are precomputed once.
      - Per-token attention uses the latent cache directly.
    applicability:
      - Inference with the described linear MLA formulation.
    positive_examples:
      - Folding WUK into the query-side operation before decoding begins.
    negative_examples:
      - Recomputing absorbed weights for every generated token.
      - Counting explicit per-head key and value reconstruction as unavoidable 
        inference work.
    non_goals:
      - The claim does not say that training avoids the additional learned 
        projections.
    error_signatures:
      - Reading the unreassociated training graph as the mandatory inference 
        graph.
      - Applying weight absorption when the relevant operation is not a fixed 
        linear map.
    instructional_repairs:
      - Write the matrix products and reassociate only fixed linear factors 
        before inference.
    status: reviewed
    version: 1
