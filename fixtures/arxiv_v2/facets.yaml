  - id: facet_to_differentiate_a_parameter_s_contribution_to_c
    title:
    aliases:
      - recursive chain-rule backpropagation
    description:
    tags: []
    concept_id: concept_backpropagation
    kind: procedure_contract
    claim: To differentiate a parameter's contribution to cost, multiply the 
      local derivatives along each dependency path, sum contributions from 
      alternative downstream paths, and recursively propagate the resulting 
      activation sensitivity toward earlier layers.
    preconditions:
      - The dependency path from a parameter or activation to the cost is known.
      - The required local derivatives exist.
    postconditions:
      - Cost sensitivities for earlier-layer activations, weights, and biases 
        are expressed in terms of local derivatives.
    applicability:
      - Differentiable layered computation graphs, including multi-neuron 
        fan-out.
    positive_examples:
      - Factoring ∂C/∂w^(L) through w^(L)→z^(L)→a^(L)→C.
      - Adding contributions when one activation feeds multiple neurons.
    negative_examples:
      - Multiplying mutually alternative path contributions together.
      - Discarding the scalar chain-rule structure when neuron indices are 
        introduced.
    non_goals:
      - This facet does not prescribe a particular loss or activation function.
    error_signatures:
      - Omitting a local derivative factor.
      - Failing to sum fan-out path contributions.
      - Reading layer superscripts as exponents.
    instructional_repairs:
      - Draw the dependency paths and label each edge with its local derivative.
      - Multiply within a path and add across distinct paths.
      - Treat superscripts as layer indices and subscripts as neuron indices.
    status: reviewed
    version: 1
