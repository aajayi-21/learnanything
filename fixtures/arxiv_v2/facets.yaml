  - id: facet_softmax_normalizes_class_scores_into_probabiliti
    title:
    aliases:
      - softmax preserves argmax
    description:
    tags: []
    concept_id: concept_affine_multiclass_classifier
    kind: interpretation
    claim: Softmax normalizes class scores into probabilities while preserving 
      their ordering, so it does not move decision boundaries defined by equal 
      scores or change the argmax class.
    preconditions:
      - All class scores are normalized jointly by softmax.
      - Prediction selects the largest output.
    postconditions:
      - Probabilities sum to one.
      - The winning class and equal-score boundary locations are preserved.
    applicability:
      - Argmax-based multiclass classification.
    positive_examples:
      - Two equal class scores remain equal after softmax.
    negative_examples: []
    non_goals:
      - Softmax does change output magnitudes.
    error_signatures:
      - Inferring that changed probability magnitudes imply a moved decision 
        boundary.
    instructional_repairs:
      - Compare score ordering and equality before and after softmax.
