  - id: facet_for_a_two_dimensional_relu_network_with_one_hidd
    title:
    aliases:
      - line-arrangement region formula
    description:
    tags: []
    concept_id: concept_relu_linear_region_count_analysis
    kind: procedure_contract
    claim: For a two-dimensional ReLU network with one hidden layer under the 
      source's convention, set K=1 and compute the maximum number of regions 
      formed by D first-layer folds as N_r=(D^2+D+2)/2.
    preconditions:
      - The input is two-dimensional.
      - The architecture has one hidden layer.
      - The D folds are treated as lines in general position for the maximum 
        calculation.
    postconditions:
      - The shallow planar upper bound is computed without a depth-dependent 
        exponential factor.
    applicability:
      - Analyzing maximum region counts for shallow two-dimensional ReLU 
        networks.
    positive_examples:
      - D=64 gives a maximum of 2,081 planar regions.
    negative_examples:
      - Applying exponential-in-depth growth when K=1.
    non_goals:
      - Describing empirical region counts after training.
    error_signatures:
      - Counting the output layer as a hidden layer.
    instructional_repairs:
      - First apply the K=1 special case, then evaluate the quadratic 
        expression.
