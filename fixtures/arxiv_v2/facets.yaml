schema_version: 2
facets:
  - id: facet_autoregressive_generation_repeatedly_predicts_a_
    title:
    aliases:
      - predict-sample-append-repeat procedure
    description:
    tags: []
    concept_id: concept_autoregressive_text_generation
    kind: procedure_contract
    claim: Autoregressive generation repeatedly predicts a next-token 
      distribution from the current text, samples a token, appends it to the 
      text, and uses the expanded text for the next prediction.
    preconditions:
      - Seed text and a next-token prediction model are available.
    postconditions:
      - The sequence grows by one sampled token per iteration.
    applicability:
      - Stochastic next-token text generation.
    positive_examples:
      - Predict, sample, append, and repeat from a seed prompt.
    negative_examples:
      - Discarding previously generated tokens before the next prediction.
      - Treating one next-token prediction as an entire generated passage.
    non_goals:
      - This procedure does not guarantee coherence or factuality.
    error_signatures:
      - Failing to feed the expanded sequence back into the model.
    instructional_repairs:
      - Write the generation state after each iteration and use that complete 
        state as the next input.
    status: reviewed
    version: 1
