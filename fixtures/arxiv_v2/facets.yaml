  - id: facet_an_embedding_matrix_associates_each_vocabulary_t
    title:
    aliases:
      - embedding-matrix lookup
    description:
    tags: []
    concept_id: concept_token_embedding
    kind: procedure_contract
    claim: An embedding matrix associates each vocabulary token with an initial 
      learned vector, obtained from the token's corresponding matrix entry; this
      initial lookup does not by itself incorporate surrounding lexical context.
    preconditions:
      - The input has been tokenized.
      - A learned embedding matrix and vocabulary are available.
    postconditions:
      - Each token has an initial vector representation.
    applicability:
      - Transformer input embedding.
    positive_examples:
      - Looking up the learned vector associated with a vocabulary token.
    negative_examples:
      - Claiming that the lookup vector already changes solely because 
        surrounding words differ.
    non_goals:
      - This facet does not deny that positional information may be added or 
        otherwise encoded at the model input.
      - This facet does not describe later contextual refinement.
    error_signatures:
      - Conflating an initial lookup vector with a later contextualized 
        representation.
    instructional_repairs:
      - 'Identify the computation stage: embedding lookup supplies the initial vector,
        while later attention and processing blocks incorporate context.'
    status: reviewed
