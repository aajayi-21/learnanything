  - id: facet_for_a_one_hot_target_cross_entropy_loss_is_the_n
    title:
    aliases:
      - token-level cross-entropy
      - correct-class negative log loss
    description:
    tags: []
    concept_id: concept_cross_entropy_loss
    kind: definition
    claim: 'For a one-hot target, cross-entropy loss is the negative natural logarithm
      of the predicted probability assigned to the correct class or next token: L=-ln(p_correct).'
    preconditions:
      - The model supplies a probability for the correct outcome.
    postconditions:
      - Probability one for the correct outcome gives zero loss.
      - Smaller correct-outcome probabilities produce larger loss.
    applicability:
      - Multiclass classification with a one-hot target.
      - Scored next-token predictions.
    positive_examples:
      - A correct-class probability of 0.086 yields a loss of approximately 
        2.45.
    negative_examples:
      - Using the probability of the model's top prediction when that prediction
        is not the correct outcome.
    non_goals:
      - The loss is not computed by averaging probabilities directly.
    error_signatures:
      - Selecting an incorrect-class probability.
      - Using the top-token probability instead of the correct-token 
        probability.
      - Dropping the negative sign or logarithm.
    instructional_repairs:
      - Locate the probability at the correct target index before applying -ln.
    status: reviewed
    version: 1
