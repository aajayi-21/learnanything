  - id: facet_when_the_training_cost_is_an_average_of_per_exam
    title:
    aliases:
      - gradient aggregation across examples
    description:
    tags: []
    concept_id: concept_backpropagation
    kind: proposition
    claim: When the training cost is an average of per-example costs, its 
      parameter gradient is the corresponding average of per-example gradients; 
      a mini-batch gradient is a cheaper approximation rather than the exact 
      full-data gradient.
    preconditions:
      - The full objective is defined as an average over training examples.
    postconditions:
      - Per-example backpropagation results can be combined into full-batch or 
        mini-batch updates.
    applicability:
      - Full-batch gradient descent and mini-batch stochastic gradient descent.
    positive_examples:
      - Averaging parameter gradients across the whole training set.
      - Shuffling data and using one small batch for each approximate update.
    negative_examples:
      - Treating the preferred update for one digit-2 example as the complete 
        training update.
      - Calling a mini-batch result the exact full-data gradient.
    non_goals:
      - This facet does not claim that every mini-batch step is the exact 
        steepest descent direction for the full objective.
    error_signatures:
      - Using one example's gradient as though it represented the whole dataset.
      - Failing to distinguish a mini-batch estimate from the full gradient.
    instructional_repairs:
      - State the dataset subset over which the gradient was averaged.
      - Label mini-batch gradients as stochastic approximations.
    status: reviewed
    version: 1
    semantic_fingerprint: sf_ebf74f75c387193f
