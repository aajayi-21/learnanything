  - id: facet_backpropagation_computes_the_partial_derivatives
    title:
    aliases:
      - gradient computation by backpropagation
    description:
    tags: []
    concept_id: concept_backpropagation
    kind: definition
    claim: Backpropagation computes the partial derivatives of a neural-network 
      cost with respect to its trainable weights and biases.
    preconditions:
      - A differentiable feedforward network, cost function, weights, and biases
        are specified.
    postconditions:
      - The gradient components associated with trainable parameters can be 
        obtained.
    applicability:
      - Gradient-based training of differentiable feedforward neural networks.
    positive_examples:
      - Computing derivatives for a handwritten-digit classifier before a 
        gradient-descent update.
    negative_examples:
      - Directly treating desired hidden activations as independently trainable 
        parameters.
    non_goals:
      - Backpropagation does not itself guarantee a global minimum of the cost.
    error_signatures:
      - Describing backpropagation as the parameter update rule rather than the 
        gradient-computation procedure.
      - Attempting to update intermediate activations directly.
    instructional_repairs:
      - Separate gradient computation by backpropagation from the optimizer step
        that uses the gradient.
      - Trace desired activation effects back to the weights and biases that 
        determine those activations.
