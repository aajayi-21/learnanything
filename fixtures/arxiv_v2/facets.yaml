  - id: facet_to_visualize_intermediate_representation_geometr
    title:
    aliases:
      - intermediate-activation probing
    description:
    tags: []
    concept_id: concept_neural_representation_geometry
    kind: procedure_contract
    claim: To visualize intermediate representation geometry, collect the final 
      residual-stream position at a selected intermediate layer for many labeled
      next-token contexts and project the high-dimensional vectors to two 
      dimensions with UMAP.
    preconditions:
      - Target next tokens are known.
      - Intermediate residual-stream activations can be sampled.
    postconditions:
      - A two-dimensional visualization of sampled intermediate activations is 
        produced.
      - Context-related clusters can be inspected.
    applicability:
      - Probing intermediate representations in a transformer language model.
    positive_examples:
      - Sampling layer-7 final-position vectors for contexts predicting Madrid, 
        Paris, or Berlin.
    negative_examples:
      - Treating arbitrary token positions as equivalent to the final position 
        used for next-token prediction.
    non_goals:
      - The projection is not the original high-dimensional representation 
        space.
    error_signatures:
      - Sampling only final-layer outputs when intermediate organization is the 
        target.
      - Interpreting UMAP coordinates as original embedding coordinates.
    instructional_repairs:
      - Record the sampled layer and token position, and explicitly label the 
        plot as a dimensionality-reduced view.
