  - id: facet_for_the_stated_equal_width_relu_architecture_ide
    title:
    aliases:
      - deep ReLU region-count upper bound
    description:
    tags: []
    concept_id: concept_relu_linear_region_count_analysis
    kind: procedure_contract
    claim: For the stated equal-width ReLU architecture, identify width D, input
      count D_i, and hidden-layer count K excluding the output layer, then 
      compute N_r=((D/D_i)+1)^(D_i(K-1))((D^2+D+2)/2) and interpret the result 
      only as a theoretical upper bound.
    preconditions:
      - The architecture matches the assumptions and notation of the source 
        formula.
    postconditions:
      - A theoretical maximum region count is computed.
      - The result is not presented as the expected learned count.
    applicability:
      - Comparing potential ReLU region counts across depth and width under the 
        stated convention.
    positive_examples:
      - D=2, D_i=2, and K=2 gives an upper bound of 16 regions, compared with 
        ten learned regions in the illustrated network.
    negative_examples:
      - Including the output layer in K.
      - Reporting the computed bound as the trained network's realized count.
    non_goals:
      - Predicting typical empirical region growth.
    error_signatures:
      - Using the wrong layer convention for K.
      - Equating maximum capacity with observed behavior.
    instructional_repairs:
      - Label every parameter before substitution and finish by comparing the 
        bound with an observed count.
