  - id: facet_to_reconstruct_an_example_level_language_model_l
    title:
    aliases:
      - example-level average cross-entropy
    description:
    tags: []
    concept_id: concept_cross_entropy_loss
    kind: procedure_contract
    claim: To reconstruct an example-level language-model loss, compute -ln(P_i)
      from the probability assigned to each correct next token and then take the
      arithmetic mean of the token losses included by the scoring convention.
    preconditions:
      - A correct-next-token probability is available at each scored position.
      - The set of token positions included in the reduction is known.
    postconditions:
      - A token loss is obtained at each scored position.
      - Their arithmetic mean can be compared with the framework-reported 
        example loss.
    applicability:
      - Causal-language-model examples with token probability tables.
    positive_examples:
      - Manually reconstructing a reported average cross-entropy loss from a 
        next-token table.
    negative_examples:
      - Averaging the correct-token probabilities before applying the negative 
        logarithm.
    non_goals:
      - The procedure does not assume that every framework configuration 
        includes exactly the same token positions.
    error_signatures:
      - Averaging probabilities directly.
      - Using top-prediction probabilities.
      - Ignoring token-shift or inclusion conventions when a manual result 
        differs from framework output.
    instructional_repairs:
      - Transform every included correct-token probability into a token loss 
        before averaging, then check the framework's scoring convention.
