  - id: facet_it_is_invalid_to_infer_that_gradient_descent_wil
    title:
    aliases:
      - existence-implies-convergence error
    description:
    tags: []
    concept_id: concept_representational_capacity_guarantees_successful_
    kind: interpretation
    claim: It is invalid to infer that gradient descent will find a good 
      solution solely from the fact that the architecture can represent one; 
      optimization depends on initialization, activation derivatives, and the 
      reachable update path.
    preconditions: []
    postconditions:
      - Representation and optimization claims are evaluated separately.
    applicability:
      - Critiquing claims that neural networks can learn anything.
    positive_examples:
      - A known representable solution remains unreachable after relevant ReLU 
        gradients become zero.
    negative_examples:
      - A successful initialization used as evidence that every initialization 
        succeeds.
    non_goals: []
    error_signatures:
      - Existence is used as a convergence guarantee.
    instructional_repairs:
      - Cite the representation theorem's scope, then separately analyze the 
        optimizer and gradient flow.
